// â”€â”€ CSV IMPORT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function ctImportCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const lines = text.split(/\r?\n/);
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));

      const idx = (name) => headers.indexOf(name);
      const idxFirst = idx('First Name'), idxLast = idx('Last Name'), idxBday = idx('Birthday');

      if (idxBday < 0) throw new Error('Colonne "Birthday" introuvable');

      const contacts = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = ctParseCSVLine(lines[i]);
        if (!cols || cols.length < 3) continue;
        const fname = (cols[idxFirst]||'').trim();
        const lname = (cols[idxLast]||'').trim();
        const bday  = (cols[idxBday]||'').trim();
        if (!bday || bday.startsWith('--') || (!fname && !lname)) continue;

        let by = null, bm = null, bd = null;
        const bp = bday.split('-');
        if (bp.length === 3 && bp[0]) { by = parseInt(bp[0]); bm = parseInt(bp[1]); bd = parseInt(bp[2]); }
        if (!bm || !bd) continue;

        // Find death date
        let dy = null, dm = null, dd = null;
        for (let ei = 1; ei <= 4; ei++) {
          const lbl = (cols[idx(`Event ${ei} - Label`)]||'').trim().toLowerCase();
          const val = (cols[idx(`Event ${ei} - Value`)]||'').trim();
          if (['dÃ©cÃ¨s','died','death','deces'].includes(lbl) && val) {
            const dp = val.split('-');
            try { dy = parseInt(dp[0]); dm = parseInt(dp[1]); dd = parseInt(dp[2]); } catch {}
            break;
          }
        }
        contacts.push({fn:fname, ln:lname, by, bm, bd, dy, dm, dd});
      }

      if (!contacts.length) throw new Error("Aucun contact avec date d'anniversaire trouvÃ©");

      if (confirm(`Importer ${contacts.length} contacts avec anniversaire ?\nCeci remplacera les contacts actuels.`)) {
        ctSaveContacts(contacts);
        ctInjectAllBirthdays();
        alert(`âœ… ${contacts.length} anniversaires importÃ©s !`);
        // Re-render weekly view to reflect new contacts
        if (window.renderWeeklyView) renderWeeklyView();
      }
    } catch(err) {
      alert('âŒ Erreur import : ' + err.message);
    }
  };
  reader.readAsText(file);
}

function ctParseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"' && !inQ) { inQ = true; }
    else if (ch === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
    else if (ch === '"' && inQ) { inQ = false; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

// â”€â”€ TAG PILLS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function ctRenderPills() {
  if (!_ctPillsEl) return;
  const groups = ctLoadGroups();
  const contacts = ctLoadContacts().map(ctMigrateContact);
  _ctPillsEl.innerHTML = '';

  const mkPill = (label, filterVal, count, color) => {
    const pill = document.createElement('button'); pill.className = 'ct-group-pill' + (ctTagFilter === filterVal ? ' active' : '');
    if (color && ctTagFilter !== filterVal) {
      pill.style.borderColor = color;
      pill.style.color = color;
    }
    if (color && ctTagFilter === filterVal) {
      pill.style.background = color;
      pill.style.borderColor = color;
    }

    if (color) {
      const dot = document.createElement('span'); dot.className = 'ct-pill-dot';
      dot.style.background = color; pill.appendChild(dot);
    }
    const lbl = document.createElement('span'); lbl.textContent = `${label} (${count})`; pill.appendChild(lbl);

    pill.addEventListener('click', () => {
      ctTagFilter = ctTagFilter === filterVal ? '' : filterVal;
      ctPage = 1; ctRenderPills(); ctRenderBody(); ctRenderPager();
    });
    _ctPillsEl.appendChild(pill);
  };

  mkPill('Tous', '', contacts.length, null);
  groups.forEach(g => {
    const n = contacts.filter(c => (c.tags||[]).includes(g)).length;
    mkPill(g, g, n, ctTagColor(g, groups));
  });
  const noTag = contacts.filter(c => !(c.tags||[]).length).length;
  if (noTag > 0) mkPill('Sans tag', '__none__', noTag, '#bbb');
}

// â”€â”€ TABLE BODY â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function ctRenderBody() {
  if (!_ctTableBody) return;
  const groups  = ctLoadGroups();
  let contacts  = ctLoadContacts().map(ctMigrateContact);

  // Tag filter
  if (ctTagFilter === '__none__') contacts = contacts.filter(c => !(c.tags||[]).length);
  else if (ctTagFilter) contacts = contacts.filter(c => (c.tags||[]).includes(ctTagFilter));

  // Text filter
  if (ctFilter) {
    const q = ctFilter.toLowerCase();
    contacts = contacts.filter(c => (c.fn||'').toLowerCase().includes(q) || (c.ln||'').toLowerCase().includes(q));
  }

  // Sort
  contacts.sort((a,b) => {
    let va, vb;
    if (ctSortField === 'bday') { va = (a.bm||0)*100+(a.bd||0); vb = (b.bm||0)*100+(b.bd||0); }
    else if (ctSortField === 'dday') { va = a.dy||0; vb = b.dy||0; }
    else if (ctSortField === 'tags') { va = (a.tags||[]).join(','); vb = (b.tags||[]).join(','); }
    else { va = (a[ctSortField]||'').toString().toLowerCase(); vb = (b[ctSortField]||'').toString().toLowerCase(); }
    if (va < vb) return ctSortAsc ? -1 : 1;
    if (va > vb) return ctSortAsc ? 1 : -1;
    return 0;
  });

  const total = contacts.length;
  const start = (ctPage-1) * CT_PAGE_SIZE;
  const pageContacts = contacts.slice(start, start + CT_PAGE_SIZE);

  _ctTableBody.innerHTML = '';
  if (!pageContacts.length) {
    const emptyRow = document.createElement('tr');
    const emptyTd = document.createElement('td'); emptyTd.colSpan = 6; emptyTd.className = 'ct-empty';
    emptyTd.textContent = ctFilter || ctTagFilter ? 'Aucun rÃ©sultat.' : 'Aucun contact.';
    emptyRow.appendChild(emptyTd); _ctTableBody.appendChild(emptyRow); return;
  }

  pageContacts.forEach(c => {
    const key = ctKey(c);
    const tr = document.createElement('tr'); tr.className = 'ct-tr' + (c.dy ? ' ct-tr-deceased' : '');

    const mkEditableTd = (field, displayVal, editVal) => {
      const td = document.createElement('td'); td.className = 'ct-td'; td.textContent = displayVal;
      td.title = 'Cliquer pour modifier'; td.style.cursor = 'pointer';
      td.addEventListener('click', () => {
        td.innerHTML = '';
        const inp = document.createElement('input'); inp.className = 'ct-inline-input';
        inp.value = editVal !== undefined ? editVal : displayVal;
        td.appendChild(inp); inp.focus(); inp.select();
        const commit = () => {
          const val = inp.value.trim();
          const all = ctLoadContacts().map(ctMigrateContact);
          const idx = all.findIndex(x => ctKey(x) === key);
          if (idx >= 0) { all[idx][field] = val; ctSaveContacts(all); }
          ctRenderBody(); ctRenderPager();
          if (window.ctInjectAllBirthdays) ctInjectAllBirthdays();
        };
        inp.addEventListener('blur', commit);
        inp.addEventListener('keydown', e => { if (e.key==='Enter') inp.blur(); if (e.key==='Escape') ctRenderBody(); });
      });
      return td;
    };

    const mkDateTd = (y, m, d, fieldY, fieldM, fieldD) => {
      const td = document.createElement('td'); td.className = 'ct-td';
      const isBday = fieldY === 'by'; // birthday gets age calculation
      let display = '';
      if (m && d) {
        display = `${String(d).padStart(2,'0')}-${String(m).padStart(2,'0')}`;
        if (y) {
          display += `-${y}`;
          if (isBday) {
            const thisYear = new Date().getFullYear();
            const age = thisYear - y;
            display += ` (${age} ans)`;
          }
        }
      }
      td.textContent = display; td.style.cursor = 'pointer'; td.title = 'Cliquer pour modifier';
      td.addEventListener('click', () => {
        td.innerHTML = '';
        const current = y&&m&&d ? `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}` : '';
        const inp = document.createElement('input'); inp.className = 'ct-inline-date';
        inp.type = 'text'; inp.placeholder = 'YYYY-MM-DD'; inp.value = current;
        td.appendChild(inp); inp.focus(); inp.select();
        const commit = () => {
          const val = inp.value.trim();
          const all = ctLoadContacts().map(ctMigrateContact);
          const idx = all.findIndex(x => ctKey(x) === key);
          if (idx >= 0) {
            if (!val) { all[idx][fieldY]=null; all[idx][fieldM]=null; all[idx][fieldD]=null; }
            else {
              const parts = val.split('-');
              if (parts.length===3) { all[idx][fieldY]=parseInt(parts[0])||null; all[idx][fieldM]=parseInt(parts[1])||null; all[idx][fieldD]=parseInt(parts[2])||null; }
            }
            ctSaveContacts(all);
          }
          ctRenderBody(); if (window.ctInjectAllBirthdays) ctInjectAllBirthdays();
        };
        inp.addEventListener('blur', commit);
        inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); if(e.key==='Escape') ctRenderBody(); });
      });
      return td;
    };

    // Tags cell â€” inline multi-tag editor
    const mkTagsTd = () => {
      const td = document.createElement('td'); td.className = 'ct-td';
      const renderTags = () => {
        td.innerHTML = '';
        const tags = c.tags || [];
        const cell = document.createElement('div'); cell.className = 'ct-tags-cell';
        tags.forEach(tag => {
          const badge = document.createElement('span'); badge.className = 'ct-grp-badge';
          const col = ctTagColor(tag, groups);
          badge.style.cssText = `background:${ctTagBg(tag,groups)};color:${col};border-color:${col};`;
          badge.textContent = tag; cell.appendChild(badge);
        });
        if (!tags.length) { const empty = document.createElement('span'); empty.style.color='#bbb'; empty.style.fontSize='.75rem'; empty.textContent='â€”'; cell.appendChild(empty); }
        td.appendChild(cell);
      };
      renderTags();
      td.style.cursor = 'pointer'; td.title = 'Cliquer pour modifier les tags';
      td.addEventListener('click', (e) => {
        e.stopPropagation();
        td.innerHTML = '';
        const picker = document.createElement('div'); picker.className = 'ct-tags-picker';
        const curTags = [...(c.tags||[])];
        groups.forEach(g => {
          const btn = document.createElement('button'); btn.className = 'ct-tag-toggle' + (curTags.includes(g)?' selected':'');
          btn.textContent = g;
          const col = ctTagColor(g, groups);
          if (curTags.includes(g)) btn.style.background = col;
          btn.addEventListener('click', e2 => { e2.stopPropagation();
            const idx = curTags.indexOf(g);
            if (idx >= 0) curTags.splice(idx,1); else curTags.push(g);
            btn.classList.toggle('selected', curTags.includes(g));
            btn.style.background = curTags.includes(g) ? col : '';
          });
          picker.appendChild(btn);
        });
        td.appendChild(picker);
        const save = () => {
          c.tags = curTags;
          const all = ctLoadContacts().map(ctMigrateContact);
          const idx = all.findIndex(x => ctKey(x) === key);
          if (idx >= 0) { all[idx].tags = curTags; ctSaveContacts(all); }
          ctRenderPills(); ctRenderBody();
        };
        // Save on click outside â€” use setTimeout to skip the current event
        setTimeout(() => document.addEventListener('click', function outsideClick(e) {
          if (!td.contains(e.target)) { document.removeEventListener('click', outsideClick); save(); }
        }), 0);
      });
      return td;
    };

    const bdayStr = c.bm&&c.bd ? `${String(c.bm).padStart(2,'0')}-${String(c.bd).padStart(2,'0')}${c.by?' ('+c.by+')':''}` : '';
    const ddayStr = c.dy&&c.dm&&c.dd ? `${c.dy}-${String(c.dm).padStart(2,'0')}-${String(c.dd).padStart(2,'0')}` : '';

    tr.appendChild(mkEditableTd('fn', c.fn||'', c.fn||''));
    tr.appendChild(mkEditableTd('ln', c.ln||'', c.ln||''));
    tr.appendChild(mkTagsTd());
    tr.appendChild(mkDateTd(c.by, c.bm, c.bd, 'by', 'bm', 'bd'));
    tr.appendChild(mkDateTd(c.dy, c.dm, c.dd, 'dy', 'dm', 'dd'));

    // Actions
    const actTd = document.createElement('td'); actTd.className = 'ct-td-actions';
    const editBtn = document.createElement('button'); editBtn.className = 'ct-row-btn'; editBtn.textContent = 'âœ'; editBtn.title = 'Modifier';
    editBtn.addEventListener('click', e => { e.stopPropagation(); ctShowContactModal(c); });
    const delBtn = document.createElement('button'); delBtn.className = 'ct-row-btn ct-row-btn-del'; delBtn.textContent = 'âœ•'; delBtn.title = 'Supprimer';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm(`Supprimer ${c.fn||''} ${c.ln||''} ?`)) {
        const all = ctLoadContacts().map(ctMigrateContact);
        ctSaveContacts(all.filter(x => ctKey(x) !== key));
        ctRenderPills(); ctRenderBody(); ctRenderPager();
        if (window.ctInjectAllBirthdays) ctInjectAllBirthdays();
      }
    });
    actTd.appendChild(editBtn); actTd.appendChild(delBtn); tr.appendChild(actTd);
    _ctTableBody.appendChild(tr);
  });
}

// â”€â”€ PAGER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function ctRenderPager() {
  if (!_ctPagerEl) return;
  const groups   = ctLoadGroups();
  let contacts   = ctLoadContacts().map(ctMigrateContact);
  if (ctTagFilter === '__none__') contacts = contacts.filter(c => !(c.tags||[]).length);
  else if (ctTagFilter) contacts = contacts.filter(c => (c.tags||[]).includes(ctTagFilter));
  if (ctFilter) { const q=ctFilter.toLowerCase(); contacts=contacts.filter(c=>(c.fn||'').toLowerCase().includes(q)||(c.ln||'').toLowerCase().includes(q)); }

  const total = contacts.length;
  const pages = Math.ceil(total / CT_PAGE_SIZE) || 1;
  if (ctPage > pages) ctPage = pages;
  _ctPagerEl.innerHTML = '';

  const info = document.createElement('span'); info.className = 'ct-pager-info';
  const s = (ctPage-1)*CT_PAGE_SIZE+1, e = Math.min(ctPage*CT_PAGE_SIZE, total);
  info.textContent = total ? `${s}â€“${e} sur ${total}` : '0 contact';
  _ctPagerEl.appendChild(info);

  if (pages <= 1) return;
  const btns = document.createElement('div'); btns.className = 'ct-pager-btns';

  const mk = (label, page, active=false, disabled=false) => {
    const b = document.createElement('button'); b.className = 'ct-pager-btn' + (active?' active':'');
    b.textContent = label; b.disabled = disabled;
    b.addEventListener('click', () => { ctPage = page; ctRenderBody(); ctRenderPager(); });
    btns.appendChild(b);
  };
  const dots = () => { const d=document.createElement('span'); d.className='ct-pager-dots'; d.textContent='â€¦'; btns.appendChild(d); };

  mk('â€¹', ctPage-1, false, ctPage<=1);
  for (let i=1; i<=pages; i++) {
    if (i===1||i===pages||Math.abs(i-ctPage)<=1) mk(i, i, i===ctPage);
    else if (i===2&&ctPage>4) dots();
    else if (i===pages-1&&ctPage<pages-3) dots();
  }
  mk('â€º', ctPage+1, false, ctPage>=pages);
  _ctPagerEl.appendChild(btns);
}

  document.getElementById('ctContactModal')?.remove();
  const isEdit = !!contact;

  const fnIn = mkInput(contact?.fn||'', 'PrÃ©nom');

  const bmIn = mkInput(contact?.bm||'', 'Mois (1-12)'); bmIn.type='number'; bmIn.min=1; bmIn.max=12;

// â”€â”€ DATA HELPERS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function htGetChecks(hi, year, month){
  // Returns array of booleans [day1..dayN] for habit index hi
  const days = new Date(year, month+1, 0).getDate();
  const result = [];
  for(let d=1; d<=days; d++){
    const dk = dkey(year, month, d);
    // Find which week this day belongs to
    const wk = htWeekKey(year, month, d);
    const wdata = loadWeekly(wk)||{};
    const checked = !!(wdata.habitChecks && wdata.habitChecks[dk] && wdata.habitChecks[dk][hi]);
    result.push(checked);
  }
  return result;
}

function htWeekKey(year, month, day){
  const d = new Date(year, month, day);
  // Find Monday of week
  const dow = d.getDay();
  const ws = getWS ? getWS() : 1;
  const diff = ws===0 ? dow : (dow===0?6:dow-1);
  const mon = new Date(d); mon.setDate(d.getDate()-diff);
  const wy = mon.getFullYear();
  // ISO week number approx
  const jan1 = new Date(wy,0,1);
  const wn = Math.ceil(((mon-jan1)/86400000+1)/7);
  return `${wy}-W${String(wn).padStart(2,'0')}`;
}

function htDoneNotDone(year, month){
  const habits = loadHabits();
  const days = new Date(year, month+1, 0).getDate();
  const done = [], notDone = [], pct = [];
  for(let d=1; d<=days; d++){
    let dc=0, nc=0;
    habits.forEach((_,hi)=>{
      const dk = dkey(year, month, d);
      const wk = htWeekKey(year, month, d);
      const wdata = loadWeekly(wk)||{};
      const checked = !!(wdata.habitChecks && wdata.habitChecks[dk] && wdata.habitChecks[dk][hi]);
      if(checked) dc++; else nc++;
    });
    done.push(dc);
    notDone.push(nc);
    pct.push(habits.length ? Math.round(dc/habits.length*100) : 0);
  }
  return {done, notDone, pct};
}

function htGoalAchievedCount(year, month){
  const habits = loadHabits();
  if(!habits.length) return 0;
  const days = new Date(year, month+1, 0).getDate();
  let count = 0;
  for(let d=1; d<=days; d++){
    let dc=0;
    habits.forEach((_,hi)=>{
      const dk = dkey(year, month, d);
      const wk = htWeekKey(year, month, d);
      const wdata = loadWeekly(wk)||{};
      if(wdata.habitChecks?.[dk]?.[hi]) dc++;
    });
    if(dc === habits.length) count++;
  }
  return count;
}

// â”€â”€ CHART â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function htDrawChart(canvas, pct, days){
  const dpr = window.devicePixelRatio||1;
  const w = days * 28; // align with day cells
  const h = 180;
  canvas.width  = w*dpr;
  canvas.height = h*dpr;
  canvas.style.width  = w+'px';
  canvas.style.height = h+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const pad = {top:20, right:16, bottom:30, left:40};
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top  - pad.bottom;

  // Y gridlines
  ctx.strokeStyle='#e8e8e8'; ctx.lineWidth=1;
  [0,25,50,75,100].forEach(v=>{
    const y = pad.top + ch*(1-v/100);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
    ctx.fillStyle='#aaa'; ctx.font='10px DM Sans,sans-serif'; ctx.textAlign='right';
    ctx.fillText(v+'%', pad.left-6, y+4);
  });

  if(!pct.length) return;
  const xStep = cw/(pct.length-1||1);

  // Area fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top+ch);
  grad.addColorStop(0,'rgba(100,180,255,0.35)');
  grad.addColorStop(1,'rgba(100,180,255,0.02)');
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top+ch);
  pct.forEach((v,i)=>{ const x=pad.left+i*xStep; const y=pad.top+ch*(1-v/100); i===0?ctx.lineTo(x,y):ctx.lineTo(x,y); });
  ctx.lineTo(pad.left+(pct.length-1)*xStep, pad.top+ch);
  ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();

  // Line
  ctx.beginPath(); ctx.strokeStyle='#64b4ff'; ctx.lineWidth=2;
  pct.forEach((v,i)=>{ const x=pad.left+i*xStep; const y=pad.top+ch*(1-v/100); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();

  // Dots + X-axis labels
  pct.forEach((v,i)=>{
    const x=pad.left+i*xStep, y=pad.top+ch*(1-v/100);
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle='#64b4ff'; ctx.fill();
    if((i+1)%5===0 || i===0){
      ctx.fillStyle='#999'; ctx.font='10px DM Sans,sans-serif'; ctx.textAlign='center';
      ctx.fillText(i+1, x, pad.top+ch+18);
    }
  });
}

    dayNumRow.appendChild(cell);
  }
  wrap.appendChild(dayNumRow);

  // Empty state
  if(!habits.length){
    const empty = document.createElement('div'); empty.className='ht-empty';
    empty.textContent='Aucune habitude dÃ©finie. Ajoutez-en dans la vue Semaine â†’ panneau gauche.';

  // Habit rows
  const WEEK_COLORS = ['#f8d7e3','#e8d5f0','#d5e8d4','#d5e4f0','#fde8c8','#e8f0d5'];

  habits.forEach((hab, hi)=>{

    nameSpan.style.cursor='text'; nameSpan.title='Cliquer pour renommer';
    nameSpan.addEventListener('click',()=>{
      const inp=document.createElement('input');
      inp.type='text'; inp.value=hab.name;
      inp.style.cssText='border:none;border-bottom:2px solid #6e9e7e;background:transparent;font-family:\'DM Sans\',sans-serif;font-size:.75rem;color:#444;outline:none;padding:1px 2px;width:100%;';
      nameSpan.replaceWith(inp);
      inp.focus(); inp.select();
      const commit=()=>{
        const txt=inp.value.trim();
        const h=loadHabits();
        if(txt){ if(h[hi].name!==txt){ h[hi].name=txt; if(typeof showToast==='function') showToast('Habitude renommÃ©e'); } }
        else { h.splice(hi,1); if(typeof showToast==='function') showToast('Habitude supprimÃ©e','ðŸ—‘'); }
        saveHabits(h); renderHabitsTracker();
      };
      inp.addEventListener('blur',commit);
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') inp.blur(); if(e.key==='Escape') renderHabitsTracker(); });
    });
    nameCell.appendChild(nameSpan);
    row.appendChild(nameCell);

    for(let d=1; d<=days; d++){
      const dk = dkey(y, m, d);
      const wk = htWeekKey(y, m, d);
      const wdata = loadWeekly(wk)||{};
      const checked = !!(wdata.habitChecks?.[dk]?.[hi]);
      const dow = new Date(y,m,d).getDay();
      const isWe = dow===0||dow===6;
      const isTod = isToday(m,d);

      // Week color index
      const weekIdx = Math.floor((d-1)/7);
      const weekColor = WEEK_COLORS[weekIdx % WEEK_COLORS.length];

      const cell = document.createElement('div');
      cell.className='ht-check-cell'+(isWe?' we':'')+(isTod?' today':'');
      cell.style.background = isWe ? htDarken(weekColor,0.07) : (isTod?'#fde68a':weekColor);

      const cb = document.createElement('input'); cb.type='checkbox'; cb.checked=checked;
      cb.className='ht-cb';
      cb.addEventListener('change',()=>{
        const wd2 = loadWeekly(wk)||{habitChecks:{}};
        if(!wd2.habitChecks) wd2.habitChecks={};
        if(!wd2.habitChecks[dk]) wd2.habitChecks[dk]={};
        wd2.habitChecks[dk][hi]=cb.checked;
        saveWeekly(wk,wd2);
        const _habDay = new Date(y, m, d).getDay();
        const _DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
        if(typeof showToast==='function') showToast((cb.checked?'âœ“ ':'âœ— ')+hab.name+', '+_DAYS[_habDay], '', 1600);
        renderHabitsTracker();
      });
      cell.appendChild(cb);
      row.appendChild(cell);
    }
    wrap.appendChild(row);
  });
}

function htDarken(hex, amt){
  // Simple darkening of pastel hex color
  let c=hex.replace('#','');
  if(c.length===3) c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  const r=Math.max(0,parseInt(c.slice(0,2),16)-Math.round(amt*255));
  const g=Math.max(0,parseInt(c.slice(2,4),16)-Math.round(amt*255));
  const b=Math.max(0,parseInt(c.slice(4,6),16)-Math.round(amt*255));
  return `rgb(${r},${g},${b})`;
}

// Export all localStorage data
function exportAllData() {
  const dataToExport = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('ap_')) {
      dataToExport[key] = localStorage.getItem(key);

  const blob = new Blob([jsonStr], { type: 'application/json' });

  link.download = `planner-backup-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);

}

// Import all localStorage data
function importAllData(file) {

  reader.onload = (e) => {
    try {

      for (const key in importedData) {

          localStorage.setItem(key, importedData[key]);
          count++;

      }
      
      console.log(`âœ… ${count} Ã©lÃ©ments importÃ©s avec succÃ¨s`);
      alert(`âœ… Importation rÃ©ussie!\n${count} Ã©lÃ©ments ont Ã©tÃ© restaurÃ©s.\nVeuillez rafraÃ®chir la page.`);
      
      // Optional: reload page after import
      setTimeout(() => {

}

function setupLoginForm() {
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const toggleForm = document.getElementById('toggleForm');
  const toggleText = document.getElementById('toggleText');
  const loginError = document.getElementById('loginError');
  const signupError = document.getElementById('signupError');

  // Debug logging
  console.log('âœ… setupLoginForm() called');
  console.log('loginForm:', loginForm);
  console.log('signupForm:', signupForm);
  console.log('toggleForm:', toggleForm);

  if (!loginForm || !signupForm || !toggleForm) {
    console.error('âŒ Required form elements not found!');
    return;
  }

  let isSignup = false;

  // Toggle between login and signup
  if (toggleForm) {
    toggleForm.addEventListener('click', (e) => {
      e.preventDefault();
      console.log('Toggle clicked, isSignup:', !isSignup);
      isSignup = !isSignup;
      
      if (isSignup) {
        loginForm.style.display = 'none';
        signupForm.style.display = 'flex';
        toggleText.textContent = 'DÃ©jÃ  inscrit?';
        toggleForm.textContent = 'Se connecter';
        console.log('âœ… Switched to signup form');
      } else {
        loginForm.style.display = 'flex';
        signupForm.style.display = 'none';
        toggleText.textContent = 'Pas encore inscrit?';
        toggleForm.textContent = 'CrÃ©er un compte';
        console.log('âœ… Switched to login form');
      }
    });
  }

  // Handle login
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.textContent = '';
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      loginError.textContent = 'Email et mot de passe requis';
      return;
    }

    const btn = loginForm.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Connexion...';

    const result = await signIn(email, password);
    
    if (!result.success) {
      loginError.textContent = result.error || 'Erreur de connexion';
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    } else {
      // Clear form on success
      loginForm.reset();
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
      btn.textContent = 'Se connecter';
    }
    // Success: showPlannerView will be called by auth state change
  });

  // Handle signup
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    signupError.textContent = '';
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const password2 = document.getElementById('signupPassword2').value;

    if (!email || !password || !password2) {
      signupError.textContent = 'Tous les champs sont requis';
      return;
    }

    if (password !== password2) {
      signupError.textContent = 'Les mots de passe ne correspondent pas';
      return;
    }

    if (password.length < 6) {
      signupError.textContent = 'Le mot de passe doit faire au moins 6 caractÃ¨res';
      return;
    }

    const btn = signupForm.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Inscription...';

    const result = await signUp(email, password);
    
    if (!result.success) {
      signupError.textContent = result.error || 'Erreur lors de l\'inscription';
      btn.disabled = false;
      btn.textContent = 'S\'inscrire';
    } else {
      signupError.textContent = 'Inscrit! Connexion en cours...';
      signupError.style.color = '#10b981';
      // Try to sign in automatically
      setTimeout(async () => {
        const loginResult = await signIn(email, password);
        if (!loginResult.success) {
          signupError.style.color = '#c0392b';
          signupError.textContent = 'Veuillez vous connecter avec vos identifiants';
          btn.disabled = false;
          btn.textContent = 'S\'inscrire';
        }
      }, 1000);
    }
  });

  // Logout is now handled by the user menu dropdown (setupUserMenu)
  // No longer needed here as we have setupUserMenu() called in showPlannerView()
}

  updateFooterVersion();
  
  // Wait for Supabase SDK to be available
  let retries = 0;
  while (!window.supabase && retries < 10) {
    console.log(`⏳ Waiting for Supabase SDK... (${retries + 1}/10)`);
    await new Promise(r => setTimeout(r, 100));
    retries++;
  }
  
  if (!window.supabase) {
    console.error('❌ Supabase SDK failed to load');
    return;
  }
  
  console.log('✅ Supabase SDK loaded');
  
  // Initialize Supabase client
  await initSupabaseClient();
  console.log('✅ Supabase client initialized');
  
  // Then initialize auth
  await initAuth();
  console.log('✅ Auth initialized');
  
  setupLoginForm();
  console.log('✅ Login form setup done');
});

function showLoginView() {
  document.getElementById('appView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
}

function showPlannerView() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'block';
  
  // Setup user menu dropdown
  setupUserMenu();
  
  // Load connection history
  loadConnectionHistory();
  
  // Save this login to history
  saveLoginToHistory();
  
  // Sync data from Supabase
  syncDataFromSupabase().then(() => {
    // Then initialize the app
    if (typeof initApp === 'function') {
      initApp();
    }
  });
}

function setupLoginForm() {
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const toggleForm = document.getElementById('toggleForm');
  const toggleText = document.getElementById('toggleText');
  const loginError = document.getElementById('loginError');
  const signupError = document.getElementById('signupError');

  // Debug logging
  console.log('✅ setupLoginForm() called');
  console.log('loginForm:', loginForm);
  console.log('signupForm:', signupForm);
  console.log('toggleForm:', toggleForm);

  if (!loginForm || !signupForm || !toggleForm) {
    console.error('❌ Required form elements not found!');
    return;
  }

  let isSignup = false;

  // Toggle between login and signup
  if (toggleForm) {
    toggleForm.addEventListener('click', (e) => {
      e.preventDefault();
      console.log('Toggle clicked, isSignup:', !isSignup);
      isSignup = !isSignup;
      
      if (isSignup) {
        loginForm.style.display = 'none';
        signupForm.style.display = 'flex';
        toggleText.textContent = 'Déjà inscrit?';
        toggleForm.textContent = 'Se connecter';
        console.log('✅ Switched to signup form');
      } else {
        loginForm.style.display = 'flex';
        signupForm.style.display = 'none';
        toggleText.textContent = 'Pas encore inscrit?';
        toggleForm.textContent = 'Créer un compte';
        console.log('✅ Switched to login form');
      }
    });
  }

  // Handle login
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.textContent = '';
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      loginError.textContent = 'Email et mot de passe requis';
      return;
    }

    const btn = loginForm.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Connexion...';

    const result = await signIn(email, password);
    
    if (!result.success) {
      loginError.textContent = result.error || 'Erreur de connexion';
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    } else {
      // Clear form on success
      loginForm.reset();
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
      btn.textContent = 'Se connecter';
    }
    // Success: showPlannerView will be called by auth state change
  });

  // Handle signup
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    signupError.textContent = '';
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const password2 = document.getElementById('signupPassword2').value;

    if (!email || !password || !password2) {
      signupError.textContent = 'Tous les champs sont requis';
      return;
    }

    if (password !== password2) {
      signupError.textContent = 'Les mots de passe ne correspondent pas';
      return;
    }

    if (password.length < 6) {
      signupError.textContent = 'Le mot de passe doit faire au moins 6 caractères';
      return;
    }

    const btn = signupForm.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Inscription...';

    const result = await signUp(email, password);
    
    if (!result.success) {
      signupError.textContent = result.error || 'Erreur lors de l\'inscription';
      btn.disabled = false;
      btn.textContent = 'S\'inscrire';
    } else {
      signupError.textContent = 'Inscrit! Connexion en cours...';
      signupError.style.color = '#10b981';
      // Try to sign in automatically
      setTimeout(async () => {
        const loginResult = await signIn(email, password);
        if (!loginResult.success) {
          signupError.style.color = '#c0392b';
          signupError.textContent = 'Veuillez vous connecter avec vos identifiants';
          btn.disabled = false;
          btn.textContent = 'S\'inscrire';
        }
      }, 1000);
    }
  });

  // Logout is now handled by the user menu dropdown (setupUserMenu)
  // No longer needed here as we have setupUserMenu() called in showPlannerView()
}

// Override save functions to sync with Supabase
// Keep original localStorage functions but also save to Supabase
const originalSaveData = (d) => localStorage.setItem('ap_data', JSON.stringify(d));
const originalLoadData = () => JSON.parse(localStorage.getItem('ap_data')||'{}');
const originalSaveWeekly = (k, v) => localStorage.setItem('ap_w_'+k, JSON.stringify(v));
const originalLoadWeekly = (k) => JSON.parse(localStorage.getItem('ap_w_'+k)||'null');
const originalSaveDayExtra = (dk, v) => localStorage.setItem('ap_de_'+dk, JSON.stringify(v));
const originalLoadDayExtra = (dk) => JSON.parse(localStorage.getItem('ap_de_'+dk)||'{\"events\":[]}');
const originalSaveHabits = (h) => localStorage.setItem('ap_habits', JSON.stringify(h));
const originalLoadHabits = () => JSON.parse(localStorage.getItem('ap_habits')||'[]');

// Wrapper: Save to both localStorage and Supabase
window.saveDataWithSync = async (data) => {
  // Always save to localStorage first (for instant feedback)
  originalSaveData(data);
  
  // If user is logged in, also save to Supabase (async, in background)
  if (currentUser) {
    const year = parseInt(localStorage.getItem('ap_year')||new Date().getFullYear());
    savePlannerData(year, data).catch(err => {
      console.error('Failed to sync to Supabase:', err);
      showToast('⚠️ Erreur de sauvegarde cloud');
    });
  }
};

window.saveWeeklyWithSync = async (k, v) => {
  originalSaveWeekly(k, v);
  if (currentUser) {
    saveWeeklyData(k, v).catch(err => console.error('Weekly sync error:', err));
  }
};

window.saveDayExtraWithSync = async (dk, v) => {
  originalSaveDayExtra(dk, v);
  if (currentUser) {
    saveDayExtra(dk, v.events || []).catch(err => console.error('Day extra sync error:', err));
  }
};

window.saveHabitsWithSync = async (h) => {
  originalSaveHabits(h);
  if (currentUser) {
    saveHabits(h).catch(err => console.error('Habits sync error:', err));
  }
};

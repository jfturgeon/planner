</div>

<!-- TRACKER VIEW -->
<div id="trackerView" style="display:none"></div>

<!-- KANBAN VIEW -->
<div id="kanbanView" style="display:none"></div>

<!-- CONTACTS VIEW -->
<div id="contactsView" style="display:none"></div>

<script>
const MONTHS_FR   = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MONTHS_SH   = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const DAYS_FULL   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAYS_SUN    = ['D','L','M','M','J','V','S'];
const COL_W       = 220;

// ── PERSISTENCE ────────────────────────────────────────────────────────────
function loadData()      { try{ return JSON.parse(localStorage.getItem('ap_data')||'{}'); }catch{ return {}; } }
function saveData(d)     { localStorage.setItem('ap_data', JSON.stringify(d)); }
function getYear()       { return parseInt(localStorage.getItem('ap_year')||new Date().getFullYear()); }
function storeYear(y)    { localStorage.setItem('ap_year', y); }
function getWS()         { return parseInt(localStorage.getItem('ap_ws')||'0'); }
function storeWS(v)      { localStorage.setItem('ap_ws', v); }

let appData = loadData();
let CY      = getYear();   // current year
let currentKey  = null;
let modalTasks  = [];
const TODAY = new Date();

// ── HELPERS ────────────────────────────────────────────────────────────────
function dkey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function dim(m)      { return new Date(CY,m+1,0).getDate(); }
function isToday(m,d){ return TODAY.getFullYear()===CY&&TODAY.getMonth()===m&&TODAY.getDate()===d; }
function isWE(dow)   { return dow===0||dow===6; }
function esc(s)      { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function pendingCount(m){
  let c=0;
  for(let d=1;d<=dim(m);d++){
    const e=appData[dkey(CY,m,d)];
    if(e&&e.tasks) c+=e.tasks.filter(t=>!t.done).length;
  }
  return c;
}
function monthOffset(m){
  const ws=getWS(), fd=new Date(CY,m,1).getDay();
  return ws===0 ? fd : (fd===0?6:fd-1);
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('yearDisp').textContent = CY;
  document.getElementById('weekStart').value      = getWS();
  renderStrip();
  renderColumns();
  bindScrollSync();
}

function renderStrip(){
  const strip = document.getElementById('strip');
  strip.innerHTML='';
  strip.style.width = `calc(${COL_W*12}px + ${13} * calc(var(--col-w) / 7))`;
  const GAP = COL_W/7;
  for(let m=0;m<12;m++){
    const tab=document.createElement('div');
    tab.className=`m-tab m-${m}`;
    tab.dataset.m=m;
    const p=pendingCount(m);
    tab.innerHTML=`<span>${MONTHS_SH[m]}</span>${p>0?`<span class="task-badge">${p}</span>`:''}`;
    tab.addEventListener('click',()=>{
      // scroll to column: padding + m * (col + gap)
      const scrollX = GAP + m * (COL_W + GAP);
      document.getElementById('scrollArea').scrollTo({left:scrollX,behavior:'smooth'});
    });
    strip.appendChild(tab);
  }
}

function renderColumns(){
  const ws   = getWS();
  const wrap = document.getElementById('colWrap');
  wrap.innerHTML='';
  // total width = 12 cols + 11 gaps + 2 side paddings, each gap/padding = COL_W/7
  wrap.style.width=`calc(${COL_W*12}px + ${13} * calc(var(--col-w) / 7))`;

  const dowLabels = ws===0 ? DAYS_SUN : [...DAYS_SUN.slice(1), DAYS_SUN[0]];

  for(let m=0;m<12;m++){
    const col=document.createElement('div');
    col.className=`month-col m-${m}`; col.id=`col-${m}`;

    // DOW header
    const dhr=document.createElement('div'); dhr.className='dow-row';
    for(let i=0;i<7;i++){
      const lbl=document.createElement('div'); lbl.className='dow-lbl';
      const dow=ws===0?i:(i+1)%7;
      lbl.textContent=DAYS_SUN[dow];
      if(isWE(dow)) lbl.classList.add('we');
      dhr.appendChild(lbl);
    }
    col.appendChild(dhr);

    // Mini-calendar
    const cal=document.createElement('div'); cal.className='mini-cal';
    const off=monthOffset(m);
    const days=dim(m);
    for(let i=0;i<off;i++){
      const e=document.createElement('div'); e.className='dc empty'; cal.appendChild(e);
    }
    for(let d=1;d<=days;d++){
      const dow=new Date(CY,m,d).getDay();
      const dc=document.createElement('div');
      const key=dkey(CY,m,d); const entry=appData[key];
      const dcHasData = !!(entry && ((entry.notes && entry.notes.trim()) || (entry.tasks && entry.tasks.length)));
      dc.className='dc'+(isWE(dow)?' we-day':'')+(isToday(m,d)?' is-today':'')+(dcHasData?' has-data':'');
      const num=document.createElement('div'); num.className='dc-num'; num.textContent=d;
      dc.appendChild(num);
      if(entry&&entry.tasks&&entry.tasks.length){
        const dots=document.createElement('div'); dots.className='dc-dots';
        entry.tasks.slice(0,4).forEach(t=>{
          const dot=document.createElement('div');
          dot.className='dot'+(t.done?' done':'')+(t.priority==='urgent'?' urgent':'');
          dots.appendChild(dot);
        });
        dc.appendChild(dots);
      }
      dc.addEventListener('click',()=>openModal(m,d));
      cal.appendChild(dc);
    }
    // pad to always 42 cells (6 rows)
    const totalCells = off + days;
    const remainder  = 42 - totalCells;
    for(let i=0;i<remainder;i++){
      const e=document.createElement('div'); e.className='dc empty'; cal.appendChild(e);
    }
    col.appendChild(cal);

    // Day list
    for(let d=1;d<=days;d++){
      const dow=new Date(CY,m,d).getDay();
      const key=dkey(CY,m,d); const entry=appData[key];
      const row=document.createElement('div');
      const hasData = !!(entry && ((entry.notes && entry.notes.trim()) || (entry.tasks && entry.tasks.length)));
      row.className='day-row'+(isWE(dow)?' we-row':'')+(isToday(m,d)?' today-row':'')+(hasData?' has-data':'');

      let cont='';
      if(entry&&entry.notes&&entry.notes.trim())
        cont+=`<div class="dr-note">📝 ${esc(entry.notes.trim().substring(0,38))}${entry.notes.trim().length>38?'…':''}</div>`;
      if(entry&&entry.tasks&&entry.tasks.length)
        entry.tasks.forEach(t=>{ cont+=`<div class="dr-task ${t.done?'done':''} ${t.priority==='urgent'?'urgent':''}">${esc(t.text)}</div>`; });
      else if(!(entry&&entry.notes&&entry.notes.trim()))
        cont=`<div class="dr-empty">+ ajouter</div>`;

      row.innerHTML=`<div class="dr-left"><span class="dr-dayname">${DAYS_FULL[dow].substring(0,3).toUpperCase()}</span><span class="dr-num">${d}</span></div><div class="dr-content">${cont}</div>`;
      row.addEventListener('click',()=>openModal(m,d));
      col.appendChild(row);
    }
    wrap.appendChild(col);
  }
}

// ── SCROLL SYNC ────────────────────────────────────────────────────────────
function bindScrollSync(){
  const sa=document.getElementById('scrollArea');
  const strip=document.getElementById('strip');
  // remove old listener by replacing element clone — instead use a flag
  sa.onscroll=()=>{
    strip.style.transform=`translateX(-${sa.scrollLeft}px)`;
    const GAP2 = COL_W/7;
    const idx=Math.min(11,Math.max(0,Math.round((sa.scrollLeft - GAP2/2) / (COL_W + GAP2))));
    strip.querySelectorAll('.m-tab').forEach((t,i)=>t.classList.toggle('active-tab',i===idx));
  };
  // init
  const idx=Math.min(11,Math.round(sa.scrollLeft/COL_W));
  strip.querySelectorAll('.m-tab')[idx]?.classList.add('active-tab');
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(m,d){
  const key=dkey(CY,m,d);
  currentKey=key;
  const dow=new Date(CY,m,d).getDay();
  document.getElementById('modalTitle').textContent=`${DAYS_FULL[dow]} ${d} ${MONTHS_FR[m]} ${CY}`;
  const entry=appData[key]||{notes:'',tasks:[]};
  document.getElementById('dayNotes').value=entry.notes||'';
  modalTasks=JSON.parse(JSON.stringify(entry.tasks||[]));
  document.getElementById('taskInput').value='';
  renderModalTasks();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('taskInput').focus(),80);
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); currentKey=null; }

function renderModalTasks(){
  const list=document.getElementById('taskList'); list.innerHTML='';
  modalTasks.forEach((t,i)=>{
    const el=document.createElement('div');
    el.className=`ti ${t.done?'done':''} ${t.priority==='urgent'?'urgent':''}`;
    el.innerHTML=`
      <input type="checkbox" ${t.done?'checked':''} data-i="${i}">
      <span class="ti-text">${esc(t.text)}</span>
      <span class="p-badge ${t.priority}">${t.priority==='normal'?'Normal':t.priority==='urgent'?'Urgent':'Faible'}</span>
      <button class="btn-del-t" data-i="${i}">✕</button>`;
    el.querySelector('input').addEventListener('change',e=>{ modalTasks[+e.target.dataset.i].done=e.target.checked; renderModalTasks(); });
    el.querySelector('.btn-del-t').addEventListener('click',e=>{ modalTasks.splice(+e.target.dataset.i,1); renderModalTasks(); });
    list.appendChild(el);
  });
}
function addTask(){
  const text=document.getElementById('taskInput').value.trim();
  if(!text) return;
  modalTasks.push({text,priority:document.getElementById('taskPriority').value,done:false});
  renderModalTasks();
  document.getElementById('taskInput').value='';
  document.getElementById('taskInput').focus();
}
function saveModal(){
  const notes=document.getElementById('dayNotes').value.trim();
  if(notes||modalTasks.length) appData[currentKey]={notes,tasks:modalTasks};
  else delete appData[currentKey];
  saveData(appData);
  closeModal();
  if(viewMode==='annual'){
    render();
    const m=parseInt(currentKey?.split('-')[1])-1;
    if(!isNaN(m)) setTimeout(()=>{ document.getElementById('scrollArea').scrollLeft=m*COL_W; },0);
  } else if(viewMode==='month'){
    renderMonthView();
  }
}

// ── VIEW MODE ───────────────────────────────────────────────────────────────
let viewMode = 'weekly'; // 'annual' | 'month' | 'weekly'
let weekOffset = 0;
let monthViewMonth = TODAY.getMonth(); // current displayed month in month view
let monthViewYear  = TODAY.getFullYear();

function switchView(mode){
  viewMode = mode;
  document.getElementById('btnAnnual').classList.toggle('active', mode==='annual');
  document.getElementById('btnMonth').classList.toggle('active',  mode==='month');
  document.getElementById('btnWeekly').classList.toggle('active', mode==='weekly');
  document.querySelector('.strip-wrapper').style.display = mode==='annual' ? '' : 'none';
  document.getElementById('scrollArea').style.display   = mode==='annual' ? '' : 'none';
  document.getElementById('monthView').style.display    = mode==='month'   ? '' : 'none';
  document.getElementById('weeklyView').style.display   = mode==='weekly'  ? '' : 'none';
  if(mode==='annual')  { render(); }
  if(mode==='month')   { renderMonthView(); }
  if(mode==='weekly')  { renderWeeklyView(); }
}

document.getElementById('btnAnnual').addEventListener('click',()=>switchView('annual'));
document.getElementById('btnMonth').addEventListener('click', ()=>switchView('month'));
document.getElementById('btnWeekly').addEventListener('click',()=>switchView('weekly'));

// ── MONTH VIEW ─────────────────────────────────────────────────────────────
function renderMonthView(){
  const mv = document.getElementById('monthView');
  const ws = getWS();
  const m  = monthViewMonth;
  const y  = monthViewYear;
  const days = new Date(y, m+1, 0).getDate();
  const fd   = new Date(y, m, 1).getDay();
  const off  = ws===0 ? fd : (fd===0?6:fd-1);
  const dowLabels = ws===0 ? DAYS_SUN : [...DAYS_SUN.slice(1), DAYS_SUN[0]];

  mv.innerHTML = `
    <div class="mv-header">
      <div class="mv-title">${MONTHS_FR[m]}<span>${y}</span></div>
      <div class="mv-nav-btns">
        <button class="mv-nav-btn" id="mvPrev">‹</button>
        <button class="mv-nav-btn today-btn" id="mvToday">Aujourd'hui</button>
        <button class="mv-nav-btn" id="mvNext">›</button>
      </div>
    </div>
    <div class="mv-body">
      <div class="mv-cal-wrap" id="mvCal"></div>
      <div class="mv-list-wrap" id="mvList">
        <div class="mv-list-hd">Journées de ${MONTHS_FR[m]}</div>
      </div>
    </div>`;

  document.getElementById('mvPrev').onclick=()=>{
    monthViewMonth--; if(monthViewMonth<0){monthViewMonth=11;monthViewYear--;} renderMonthView();
  };
  document.getElementById('mvNext').onclick=()=>{
    monthViewMonth++; if(monthViewMonth>11){monthViewMonth=0;monthViewYear++;} renderMonthView();
  };
  document.getElementById('mvToday').onclick=()=>{
    monthViewMonth=TODAY.getMonth(); monthViewYear=TODAY.getFullYear(); renderMonthView();
  };

  // ── Big calendar ──
  const cal = document.getElementById('mvCal');

  // DOW header
  const dhr = document.createElement('div'); dhr.className='mv-dow-row';
  for(let i=0;i<7;i++){
    const dow = ws===0?i:(i+1)%7;
    const lbl = document.createElement('div');
    lbl.className='mv-dow-lbl'+(isWE(dow)?' we':'');
    lbl.textContent = DAYS_SUN[dow];
    dhr.appendChild(lbl);
  }
  cal.appendChild(dhr);

  // Calendar grid
  const grid = document.createElement('div'); grid.className='mv-cal-grid';
  for(let i=0;i<off;i++){
    const e=document.createElement('div'); e.className='mv-dc mv-empty'; grid.appendChild(e);
  }
  for(let d=1;d<=days;d++){
    const dow   = new Date(y,m,d).getDay();
    const key   = dkey(y,m,d);
    const entry = appData[key];
    const hasData = !!(entry&&((entry.notes&&entry.notes.trim())||(entry.tasks&&entry.tasks.length)));
    const isTod = isToday(m,d) && y===TODAY.getFullYear();

    const dc = document.createElement('div');
    dc.className='mv-dc'+(isWE(dow)?' mv-we':'')+(isTod?' mv-today':'')+(hasData?' mv-has-data':'');

    const num = document.createElement('div'); num.className='mv-dc-num'; num.textContent=d;
    dc.appendChild(num);

    if(hasData){
      const taskBox = document.createElement('div'); taskBox.className='mv-dc-tasks';
      if(entry.notes&&entry.notes.trim()){
        const n=document.createElement('div'); n.className='mv-dc-note';
        n.textContent='📝 '+entry.notes.trim().substring(0,30); taskBox.appendChild(n);
      }
      const tasks=entry.tasks||[];
      tasks.slice(0,3).forEach(t=>{
        const tEl=document.createElement('div');
        tEl.className='mv-dc-task'+(t.done?' done':'')+(t.priority==='urgent'?' urgent':'');
        tEl.textContent=t.text; taskBox.appendChild(tEl);
      });
      if(tasks.length>3){
        const more=document.createElement('div'); more.className='mv-dc-more';
        more.textContent=`+${tasks.length-3} autre${tasks.length-3>1?'s':''}`; taskBox.appendChild(more);
      }
      dc.appendChild(taskBox);
    }
    dc.addEventListener('click',()=>{ openModal(m,d); });
    grid.appendChild(dc);
  }
  // pad to 42 cells
  const rem = 42 - (off+days);
  for(let i=0;i<rem;i++){
    const e=document.createElement('div'); e.className='mv-dc mv-empty'; grid.appendChild(e);
  }
  cal.appendChild(grid);

  // ── Day list ──
  const list = document.getElementById('mvList');
  for(let d=1;d<=days;d++){
    const dow   = new Date(y,m,d).getDay();
    const key   = dkey(y,m,d);
    const entry = appData[key];
    const hasData = !!(entry&&((entry.notes&&entry.notes.trim())||(entry.tasks&&entry.tasks.length)));
    const isTod = isToday(m,d) && y===TODAY.getFullYear();

    const row = document.createElement('div');
    row.className='mv-list-row'+(isWE(dow)?' mv-lr-we':'')+(isTod?' mv-lr-today':'')+(hasData?' mv-lr-data':'');

    let cont='';
    if(entry&&entry.notes&&entry.notes.trim())
      cont+=`<div class="mv-lr-note">📝 ${esc(entry.notes.trim().substring(0,45))}${entry.notes.trim().length>45?'…':''}</div>`;
    if(entry&&entry.tasks&&entry.tasks.length)
      entry.tasks.forEach(t=>{ cont+=`<div class="mv-lr-task ${t.done?'done':''} ${t.priority==='urgent'?'urgent':''}">${esc(t.text)}</div>`; });
    else if(!hasData)
      cont=`<div class="mv-lr-empty">Cliquer pour ajouter…</div>`;

    row.innerHTML=`<div class="mv-lr-left"><span class="mv-lr-dname">${DAYS_FULL[dow].substring(0,3).toUpperCase()}</span><span class="mv-lr-dnum">${d}</span></div><div class="mv-lr-content">${cont}</div>`;
    row.addEventListener('click',()=>{ openModal(m,d); });
    list.appendChild(row);
  }
}


// ── WEEKLY DATA HELPERS ────────────────────────────────────────────────────
function wkey(k){ return 'w_'+k; } // storage keys for weekly-specific data

function loadWeekly(k)    { return JSON.parse(localStorage.getItem('ap_w_'+k)||'null'); }
function saveWeekly(k,v)  { localStorage.setItem('ap_w_'+k, JSON.stringify(v)); }

// Get Monday (or Sunday) of week containing date
function getWeekStart(date){
  const ws=getWS(), d=new Date(date);
  const day=d.getDay();
  const diff = ws===1 ? (day===0?-6:1-day) : -day;
  d.setDate(d.getDate()+diff); d.setHours(0,0,0,0);
  return d;
}
function getWeekDates(offset=0){
  const start=getWeekStart(TODAY);
  start.setDate(start.getDate()+offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d; });
}
function weekKey(dates){ return `${dates[0].getFullYear()}-W${String(getISOWeek(dates[0])).padStart(2,'0')}`; }
function getISOWeek(d){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=date.getUTCDay()||7;
  date.setUTCDate(date.getUTCDate()+4-day);
  const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

// ── RENDER WEEKLY VIEW ─────────────────────────────────────────────────────
function renderWeeklyView(){
  const wv=document.getElementById('weeklyView');
  const dates=getWeekDates(weekOffset);
  const wk=weekKey(dates);
  const startD=dates[0], endD=dates[6];

  // Week data: habits list, weekly todos
  let wdata=loadWeekly(wk)||{habits:[],weekTodos:[]};

  const fmt=d=>`${d.getDate()} ${MONTHS_FR[d.getMonth()]}`;
  const weekLabel=`${fmt(startD)} – ${fmt(endD)} ${endD.getFullYear()}`;

  wv.innerHTML=`
  <div class="wv-week-nav">
    <div class="wv-week-label-wrap">
      <button class="wv-nav-btn wv-toggle-left-btn" id="wvToggleLeft" title="Afficher / masquer le panneau">◀</button>
      <div class="wv-week-label" id="wvWeekLabel">${weekLabel}</div>
    </div>
    <div class="wv-nav-btns">
      <button class="wv-nav-btn" id="wvPrev">‹ Semaine préc.</button>
      <button class="wv-nav-btn today-btn" id="wvToday">Aujourd'hui</button>
      <button class="wv-nav-btn" id="wvNext">Semaine suiv. ›</button>
    </div>
  </div>
  <div class="wv-layout">
    <div class="wv-left" id="wvLeft"></div>
    <div class="wv-right"><div class="wv-days-strip" id="wvDays"></div></div>
  </div>`;

  // Nav
  document.getElementById('wvPrev').onclick=()=>{ weekOffset--; calOffset=0; renderWeeklyView(); };
  document.getElementById('wvNext').onclick=()=>{ weekOffset++; calOffset=0; renderWeeklyView(); };
  document.getElementById('wvToday').onclick=()=>{ weekOffset=0; calOffset=0; renderWeeklyView(); };
  let leftVisible = localStorage.getItem('ap_left_panel')!=='0';
  const wvLeft=document.getElementById('wvLeft');
  const toggleBtn=document.getElementById('wvToggleLeft');
  const wvWeekLabel=document.getElementById('wvWeekLabel');
  const applyLeftState=()=>{
    wvLeft.style.display=leftVisible?'':'none';
    if(leftVisible){
      toggleBtn.textContent='◀';
      toggleBtn.title='Masquer le panneau';
      // Move button to be before the label (left side)
      const wrap=document.querySelector('.wv-week-label-wrap');
      wrap.insertBefore(toggleBtn, wvWeekLabel);
    } else {
      toggleBtn.textContent='▶';
      toggleBtn.title='Afficher le panneau';
      // Move button to be before the label (left side, same position)
      const wrap=document.querySelector('.wv-week-label-wrap');
      wrap.insertBefore(toggleBtn, wvWeekLabel);
    }
    toggleBtn.classList.toggle('active', !leftVisible);
    document.querySelector('.wv-layout').style.gridTemplateColumns=leftVisible?'auto 1fr':'1fr';
  };
  toggleBtn.addEventListener('click',()=>{ leftVisible=!leftVisible; localStorage.setItem('ap_left_panel',leftVisible?'1':'0'); applyLeftState(); });
  applyLeftState();

  renderWvLeft(dates, wk, wdata);
  renderWvDays(dates, wk, wdata);
}

// ── GLOBAL HABITS ─────────────────────────────────────────────────────────
const HABITS_KEY = 'ap_global_habits';
function loadHabits(){ try{ return JSON.parse(localStorage.getItem(HABITS_KEY)||'[]'); }catch{ return []; } }
function saveHabits(h){ localStorage.setItem(HABITS_KEY, JSON.stringify(h)); }

// Track the mini-calendar offset (months from current)
let calOffset = 0;

function renderWvLeft(dates, wk, wdata){
  const left=document.getElementById('wvLeft');
  left.innerHTML='';

  // ── 2 Mini calendars: calOffset month and calOffset+1 month ──
  // Base month from the current week's first day
  const baseDate = new Date(dates[0]);
  baseDate.setMonth(baseDate.getMonth() + calOffset);
  const baseYear  = baseDate.getFullYear();
  const baseMonth = baseDate.getMonth();

  // Calendars side by side in wv-cals-row
  const calsRow = document.createElement('div'); calsRow.className='wv-cals-row';

  // Build both calendars
  for(let ci=0;ci<2;ci++){
    let cm=baseMonth+ci, cy=baseYear;
    if(cm>11){ cm-=12; cy++; }

    const card=document.createElement('div'); card.className='wv-card';
    const hd=document.createElement('div'); hd.className='wv-card-hd';
    if(ci===0){
      hd.innerHTML=`<button class="mv-nav-btn" id="calNavPrev" style="padding:2px 8px;">‹</button><span>${MONTHS_FR[cm]} ${cy}</span><span></span>`;
    } else {
      hd.innerHTML=`<span></span><span>${MONTHS_FR[cm]} ${cy}</span><button class="mv-nav-btn" id="calNavNext" style="padding:2px 8px;">›</button>`;
    }
    card.appendChild(hd);
    const cal=document.createElement('div'); cal.className='wv-mini-cal';
    const dg=document.createElement('div'); dg.className='mc-grid';
    const ws=getWS();

    // DOW headers
    for(let i=0;i<7;i++){
      const dow=ws===0?i:(i+1)%7;
      const lbl=document.createElement('div');
      lbl.className='mc-dow'+(isWE(dow)?' we':'');
      lbl.textContent=DAYS_SUN[dow]; dg.appendChild(lbl);
    }

    const fd=new Date(cy,cm,1).getDay();
    const off=ws===0?fd:(fd===0?6:fd-1);
    const daysInM=new Date(cy,cm+1,0).getDate();

    // Empty cells
    for(let i=0;i<off;i++){
      const e=document.createElement('div'); e.className='mc-day'; dg.appendChild(e);
    }

    // Day cells – group by week row for hover effect
    // We'll attach data-weekstart to each cell for hover grouping
    for(let d=1;d<=daysInM;d++){
      const dow=new Date(cy,cm,d).getDay();
      const dt=new Date(cy,cm,d);
      const inWeek=dates.some(wd=>wd.toDateString()===dt.toDateString());
      const isTod=dt.toDateString()===TODAY.toDateString();

      // Compute week-start key for this day
      const ws2=getWS();
      const tmpDay=dt.getDay();
      const tmpDiff=ws2===1?(tmpDay===0?-6:1-tmpDay):-tmpDay;
      const wStart=new Date(dt); wStart.setDate(wStart.getDate()+tmpDiff);
      const wStartKey=wStart.toDateString();

      const cell=document.createElement('div');
      cell.className='mc-day'+(isWE(dow)?' mc-we':'')+(isTod?' mc-today':inWeek?' mc-in-week':'');
      cell.textContent=d;
      cell.dataset.weekstart=wStartKey;
      cell.dataset.date=dt.toDateString();
      dg.appendChild(cell);
    }

    // Week hover + click: delegate on the grid
    dg.addEventListener('mouseover',e=>{
      const cell=e.target.closest('.mc-day[data-weekstart]');
      if(!cell) return;
      const ws=cell.dataset.weekstart;
      dg.querySelectorAll('.mc-day[data-weekstart]').forEach(c=>{
        if(c.dataset.weekstart===ws && !c.classList.contains('mc-today') && !c.classList.contains('mc-in-week'))
          c.classList.add('mc-hover-week');
      });
    });
    dg.addEventListener('mouseout',e=>{
      const cell=e.target.closest('.mc-day[data-weekstart]');
      if(!cell) return;
      dg.querySelectorAll('.mc-hover-week').forEach(c=>c.classList.remove('mc-hover-week'));
    });
    dg.addEventListener('click',e=>{
      const cell=e.target.closest('.mc-day[data-weekstart]');
      if(!cell) return;
      // Compute weekOffset for the clicked week
      const clickedDate=new Date(cell.dataset.date);
      const currentWeekStart=getWeekStart(TODAY);
      const clickedWeekStart=getWeekStart(clickedDate);
      const diff=Math.round((clickedWeekStart-currentWeekStart)/(7*24*3600*1000));
      weekOffset=diff;
      calOffset=0;
      renderWeeklyView();
    });

    cal.appendChild(dg);
    card.appendChild(cal);
    calsRow.appendChild(card);
  }
  left.appendChild(calsRow);

  // Wire calendar nav buttons
  const prevBtn=left.querySelector('#calNavPrev');
  const nextBtn=left.querySelector('#calNavNext');
  if(prevBtn) prevBtn.onclick=()=>{ calOffset--; renderWvLeft(dates,wk,wdata); };
  if(nextBtn) nextBtn.onclick=()=>{ calOffset++; renderWvLeft(dates,wk,wdata); };

  // ── Daily habits (GLOBAL – shared across all weeks) ──

  const habCard=document.createElement('div'); habCard.className='wv-card';
  habCard.innerHTML=`<div class="wv-card-hd"><span>Habitudes quotidiennes</span></div>`;
  const habBody=document.createElement('div'); habBody.className='wv-habits-body';

  // Header row
  const hdr=document.createElement('div');
  hdr.className='wv-habits-header-row';
  hdr.innerHTML=`<span class="col-name">Habitude</span>${dates.map(d=>`<span>${DAYS_FULL[d.getDay()][0]}</span>`).join('')}<span></span>`;
  habBody.appendChild(hdr);

  const habList=document.createElement('div'); habList.id='habList';
  const renderHabitRows=()=>{
    const habits=loadHabits();
    habList.innerHTML='';
    if(habits.length===0){
      habList.innerHTML=`<div style="font-size:.72rem;color:#bbb;font-style:italic;padding:6px 0;">Aucune habitude — ajoutez-en ci-dessous</div>`;
    }
    habits.forEach((hab,hi)=>{
      const row=document.createElement('div'); row.className='wv-habit-row';

      // Name cell — click to edit
      const nameSpan=document.createElement('span');
      nameSpan.className='wv-habit-name'; nameSpan.title=hab.name; nameSpan.textContent=hab.name;
      nameSpan.style.cursor='text';
      nameSpan.addEventListener('click',()=>{
        const inp=document.createElement('input');
        inp.type='text'; inp.value=hab.name;
        inp.style.cssText='flex:1;border:none;border-bottom:2px solid var(--accent2);background:transparent;font-family:\'DM Sans\',sans-serif;font-size:.76rem;color:var(--text);outline:none;padding:1px 2px;width:100%;';
        nameSpan.replaceWith(inp);
        inp.focus(); inp.select();
        const commit=()=>{
          const txt=inp.value.trim();
          const h=loadHabits();
          if(txt) h[hi].name=txt; else h.splice(hi,1);
          saveHabits(h); renderHabitRows();
        };
        inp.addEventListener('blur',commit);
        inp.addEventListener('keydown',e=>{ if(e.key==='Enter') inp.blur(); if(e.key==='Escape') renderHabitRows(); });
      });
      row.appendChild(nameSpan);

      // Checkboxes per day
      dates.forEach((dt)=>{
        const dk=dkey(dt.getFullYear(),dt.getMonth(),dt.getDate());
        const checked=!!(wdata.habitChecks&&wdata.habitChecks[dk]&&wdata.habitChecks[dk][hi]);
        const cbColor=DAY_COLORS[dt.getDay()];
        const span=document.createElement('span'); span.className='wv-habit-cb';
        const cb=document.createElement('input'); cb.type='checkbox';
        cb.style.setProperty('--cb-color', cbColor);
        cb.dataset.hi=hi; cb.dataset.dk=dk;
        if(checked) cb.checked=true;
        cb.addEventListener('change',()=>{
          if(!wdata.habitChecks) wdata.habitChecks={};
          if(!wdata.habitChecks[dk]) wdata.habitChecks[dk]={};
          wdata.habitChecks[dk][hi]=cb.checked;
          saveWeekly(wk,wdata);
        });
        span.appendChild(cb); row.appendChild(span);
      });

      // Delete button
      const delBtn=document.createElement('button'); delBtn.className='wv-todo-del'; delBtn.textContent='✕'; delBtn.title='Supprimer';
      delBtn.addEventListener('click',()=>{
        const h=loadHabits(); h.splice(hi,1); saveHabits(h); renderHabitRows();
      });
      row.appendChild(delBtn);
      habList.appendChild(row);
    });
  };
  renderHabitRows();
  habBody.appendChild(habList);

  const addHab=document.createElement('div'); addHab.className='wv-habit-add';
  const habInput=document.createElement('input');
  habInput.type='text'; habInput.placeholder='Nouvelle habitude…';
  const habBtn=document.createElement('button'); habBtn.textContent='+';
  addHab.appendChild(habInput); addHab.appendChild(habBtn);
  const doAddHabit=()=>{
    const txt=habInput.value.trim(); if(!txt) return;
    const h=loadHabits(); h.push({name:txt}); saveHabits(h);
    habInput.value=''; renderHabitRows(); habInput.focus();
  };
  habBtn.addEventListener('click', doAddHabit);
  habInput.addEventListener('keydown',e=>{ if(e.key==='Enter') doAddHabit(); });
  habBody.appendChild(addHab);
  habCard.appendChild(habBody);
  left.appendChild(habCard);

  // ── Weekly todo ──
  const todoCard=document.createElement('div'); todoCard.className='wv-card';
  todoCard.innerHTML=`<div class="wv-card-hd"><span>À faire cette semaine</span></div>`;
  const todoBody=document.createElement('div'); todoBody.className='wv-todo-body';

  const todoList=document.createElement('div'); todoList.id='wkTodoList';
  const renderTodoRows=()=>{
    todoList.innerHTML='';
    (wdata.weekTodos||[]).forEach((t,ti)=>{
      const item=document.createElement('div'); item.className='wv-todo-item'+(t.done?' done':'');

      const cb=document.createElement('input'); cb.type='checkbox'; cb.dataset.ti=ti;
      if(t.done) cb.checked=true;
      cb.addEventListener('change',()=>{
        wdata.weekTodos[ti].done=cb.checked;
        saveWeekly(wk,wdata); renderTodoRows();
      });

      const labelSpan=document.createElement('span'); labelSpan.className='wv-todo-text';
      labelSpan.textContent=t.text; labelSpan.style.cursor='text';
      labelSpan.addEventListener('click',()=>{
        const inp=document.createElement('input'); inp.type='text'; inp.value=t.text;
        inp.style.cssText='flex:1;border:none;border-bottom:2px solid var(--accent2);background:transparent;font-family:\'DM Sans\',sans-serif;font-size:.82rem;color:var(--text);outline:none;padding:1px 2px;';
        labelSpan.replaceWith(inp);
        inp.focus(); inp.select();
        const commit=()=>{
          const txt=inp.value.trim();
          if(txt) wdata.weekTodos[ti].text=txt;
          else wdata.weekTodos.splice(ti,1);
          saveWeekly(wk,wdata); renderTodoRows();
        };
        inp.addEventListener('blur',commit);
        inp.addEventListener('keydown',e=>{ if(e.key==='Enter') inp.blur(); if(e.key==='Escape') renderTodoRows(); });
      });

      const delBtn=document.createElement('button'); delBtn.className='wv-todo-del'; delBtn.dataset.ti=ti; delBtn.textContent='✕';
      delBtn.addEventListener('click',()=>{
        wdata.weekTodos.splice(ti,1);
        saveWeekly(wk,wdata); renderTodoRows();
      });

      item.appendChild(cb); item.appendChild(labelSpan); item.appendChild(delBtn);
      todoList.appendChild(item);
    });
  };
  renderTodoRows();
  todoBody.appendChild(todoList);

  const addTodo=document.createElement('div'); addTodo.className='wv-todo-add';
  const todoInput=document.createElement('input');
  todoInput.type='text'; todoInput.placeholder='Ajouter une tâche…';
  const todoBtn=document.createElement('button'); todoBtn.textContent='+';
  addTodo.appendChild(todoInput); addTodo.appendChild(todoBtn);
  const doAddTodo=()=>{
    const txt=todoInput.value.trim(); if(!txt) return;
    if(!wdata.weekTodos) wdata.weekTodos=[];
    wdata.weekTodos.push({text:txt,done:false});
    saveWeekly(wk,wdata); todoInput.value=''; renderTodoRows(); todoInput.focus();
  };
  todoBtn.addEventListener('click', doAddTodo);
  todoInput.addEventListener('keydown',e=>{ if(e.key==='Enter') doAddTodo(); });
  todoBody.appendChild(addTodo);
  todoCard.appendChild(todoBody);
  left.appendChild(todoCard);
}

// Day palette (index = day of week 0-6)
const DAY_COLORS = ['#e8a87c','#7cb9e8','#8dd4a0','#c4a8e8','#e8d47c','#e889b8','#7ce8d4'];

function renderWvDays(dates, wk, wdata){
  const strip=document.getElementById('wvDays');
  strip.innerHTML='';

  // Update habit checkbox colors to match day colors
  // We'll store the dates globally for the habit renderer to use
  window._wvDates = dates;

  dates.forEach((dt,di)=>{
    const y=dt.getFullYear(), m=dt.getMonth(), d=dt.getDate();
    const dk=dkey(y,m,d);
    const isT=dt.toDateString()===TODAY.toDateString();
    const dow=dt.getDay();
    const dayColor=DAY_COLORS[dow];
    const entry=appData[dk]||{notes:'',tasks:[]};
    let dayExtra=JSON.parse(localStorage.getItem('ap_de_'+dk)||'{"events":[]}');
    if(!dayExtra.events) dayExtra.events=[];

    const col=document.createElement('div'); col.className='wv-day-col';

    // Header
    const hd=document.createElement('div');
    hd.className='wv-day-hd dc-'+dow+(isT?' today-hd':'');
    hd.innerHTML=`<div class="wdn">${DAYS_FULL[dow].toUpperCase()}</div><div class="wdd">${d}</div><div class="wdm">${MONTHS_FR[m]} ${y}</div>`;
    col.appendChild(hd);

    // ── EVENTS SECTION ──
    const evSec=document.createElement('div'); evSec.className='wv-day-section';
    evSec.style.borderTop=`3px solid ${dayColor}`;
    const evHd=document.createElement('div'); evHd.className='wv-sec-title';
    evHd.innerHTML=`<span>Événements</span>`;
    evSec.appendChild(evHd);

    const evList=document.createElement('div');
    evList.dataset.evlist = dk;
    evList.className='wv-ev-scroll';
    const NUM_EV_ROWS=6;

    const saveEvents=()=>{ localStorage.setItem('ap_de_'+dk,JSON.stringify(dayExtra)); };

    const renderEvRows=()=>{
      evList.innerHTML='';
      // Re-inject birthdays after clearing (contacts.js will handle this)
      const sorted=[...dayExtra.events].sort((a,b)=>{
        const aAll=a.allDay||!a.time; const bAll=b.allDay||!b.time;
        if(aAll&&!bAll) return -1; if(!aAll&&bAll) return 1;
        return (a.time||'').localeCompare(b.time||'');
      });
      const total=Math.max(NUM_EV_ROWS, sorted.length);
      for(let ri=0;ri<total;ri++){
        const ev=sorted[ri]||null;
        const row=document.createElement('div'); row.className='wv-event-row';
        const isAllDay=ev&&(ev.allDay||!ev.time);

        const timeSpan=document.createElement('span');
        timeSpan.className='wv-row-time'+(ev?'':' empty');
        if(!ev) timeSpan.textContent='--:--';
        else if(isAllDay){ timeSpan.textContent='Jour'; timeSpan.style.cssText='color:#aaa;font-size:.65rem;font-weight:600;min-width:58px;flex-shrink:0;'; }
        else timeSpan.textContent=ev.time;

        const labelSpan=document.createElement('span');
        labelSpan.className='wv-row-label'+(ev?'':' empty');
        labelSpan.textContent=ev?ev.title:'';

        const delBtn=document.createElement('button');
        delBtn.className='wv-row-del'; delBtn.textContent='✕';

        row.appendChild(timeSpan); row.appendChild(labelSpan); row.appendChild(delBtn);

        const startEdit=(focusTime=false)=>{
          row.innerHTML='';

          // All-day toggle checkbox
          const allDayWrap=document.createElement('label');
          allDayWrap.style.cssText='display:flex;align-items:center;gap:3px;flex-shrink:0;cursor:pointer;font-size:.65rem;color:var(--muted);white-space:nowrap;';
          const allDayCb=document.createElement('input'); allDayCb.type='checkbox';
          allDayCb.style.cssText='width:11px;height:11px;cursor:pointer;accent-color:var(--accent2);';
          allDayCb.checked=ev?!!(ev.allDay||!ev.time):false;
          const allDayLbl=document.createElement('span'); allDayLbl.textContent='Jour';
          allDayWrap.appendChild(allDayCb); allDayWrap.appendChild(allDayLbl);

          const timeIn=document.createElement('input');
          timeIn.type='time'; timeIn.className='wv-row-time-edit';
          timeIn.value=(ev&&!ev.allDay&&ev.time)?ev.time:'';
          timeIn.style.display=allDayCb.checked?'none':'';

          const labelIn=document.createElement('input');
          labelIn.type='text'; labelIn.className='wv-row-edit-input';
          labelIn.placeholder='Titre de l\'événement…';
          labelIn.value=ev?ev.title:'';

          allDayCb.addEventListener('change',()=>{ timeIn.style.display=allDayCb.checked?'none':''; if(!allDayCb.checked) timeIn.focus(); });

          row.appendChild(allDayWrap); row.appendChild(timeIn); row.appendChild(labelIn);
          if(focusTime&&!allDayCb.checked) timeIn.focus(); else { labelIn.focus(); labelIn.select(); }

          let committed=false;
          const commit=()=>{
            if(committed) return; committed=true;
            const t=labelIn.value.trim();
            const isAD=allDayCb.checked;
            const tm=isAD?'':timeIn.value||'00:00';
            if(ev){
              const idx=dayExtra.events.indexOf(ev);
              if(t){ if(idx>-1){ dayExtra.events[idx].title=t; dayExtra.events[idx].time=tm; dayExtra.events[idx].allDay=isAD; } }
              else { if(idx>-1) dayExtra.events.splice(idx,1); }
            } else if(t){ dayExtra.events.push({time:tm,title:t,allDay:isAD}); }
            saveEvents(); renderEvRows();
            // Re-inject birthdays
            if(window.ctInjectAllBirthdays) ctInjectAllBirthdays();
          };
          const blurHandler=()=>{ setTimeout(()=>{ if(!row.contains(document.activeElement)) commit(); }, 150); };
          timeIn.addEventListener('blur', blurHandler);
          labelIn.addEventListener('blur', blurHandler);
          allDayCb.addEventListener('blur', blurHandler);
          labelIn.addEventListener('keydown',e=>{ if(e.key==='Enter'){ labelIn.blur(); } if(e.key==='Escape'){ committed=true; renderEvRows(); if(window.ctInjectAllBirthdays) ctInjectAllBirthdays(); } });
          timeIn.addEventListener('keydown',e=>{ if(e.key==='Enter'){ labelIn.focus(); } if(e.key==='Escape'){ committed=true; renderEvRows(); if(window.ctInjectAllBirthdays) ctInjectAllBirthdays(); } });
        };

        timeSpan.addEventListener('click',e=>{ e.stopPropagation(); startEdit(true); });
        labelSpan.addEventListener('click',e=>{ e.stopPropagation(); startEdit(false); });
        row.addEventListener('click',e=>{ if(e.target===row) startEdit(false); });

        if(ev){
          delBtn.addEventListener('click',e=>{
            e.stopPropagation();
            const idx=dayExtra.events.indexOf(ev);
            if(idx>-1) dayExtra.events.splice(idx,1);
            saveEvents(); renderEvRows();
            if(window.ctInjectAllBirthdays) ctInjectAllBirthdays();
          });
        }

        evList.appendChild(row);
      }
    };
    renderEvRows();
    evSec.appendChild(evList);
    col.appendChild(evSec);

    // ── TASKS SECTION ──
    const taskSec=document.createElement('div'); taskSec.className='wv-day-section';
    taskSec.style.borderTop=`3px solid ${dayColor}`;
    const taskHd=document.createElement('div'); taskHd.className='wv-sec-title';
    taskHd.innerHTML=`<span>Tâches</span>`;
    taskSec.appendChild(taskHd);

    const taskList=document.createElement('div');
    taskList.className='wv-task-scroll';
    taskList.dataset.taskrows = dk;
    const NUM_TASK_ROWS=25;

    const saveTasks=()=>{ appData[dk]=entry; saveData(appData); };
    const deleteSaveTasks=()=>{
      if(entry.tasks&&entry.tasks.length===0&&!entry.notes){
        delete appData[dk];
      } else {
        appData[dk]=entry;
      }
      saveData(appData);
    };

    const renderTaskRows=()=>{
      taskList.innerHTML='';
      if(!entry.tasks) entry.tasks=[];
      const tasks=entry.tasks;
      const epCount=(dow>=1&&dow<=5)?6:0;
      const taskSlots=Math.max(0, NUM_TASK_ROWS - epCount);
      const total=Math.max(taskSlots, tasks.length);
      for(let ri=0;ri<total;ri++){
        const t=tasks[ri]||null;
        const row=document.createElement('div');
        row.className='wv-task-row'+(t&&t.done?' done':'');

        // Drag handle + draggable (only for real tasks)
        if(t){
          row.draggable=true;
          row.dataset.taskDk=dk;
          row.dataset.taskIdx=String(ri);
          row.addEventListener('dragstart',e=>{
            e.dataTransfer.effectAllowed='move';
            e.dataTransfer.setData('text/plain', JSON.stringify({srcDk:dk, taskIdx:ri, task:t}));
            row.classList.add('wv-drag-active');
          });
          row.addEventListener('dragend',()=>row.classList.remove('wv-drag-active'));
        }

        const cb=document.createElement('input');
        cb.type='checkbox'; cb.className='wv-row-cb';
        cb.style.cssText=`width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:${dayColor};`;
        cb.style.visibility=t?'visible':'hidden';
        if(t&&t.done) cb.checked=true;

        const labelSpan=document.createElement('span');
        labelSpan.className='wv-row-label'+(t?'':' empty');
        labelSpan.textContent=t?t.text:'';

        const delBtn=document.createElement('button');
        delBtn.className='wv-row-del'; delBtn.textContent='✕';
        delBtn.style.visibility=t?'visible':'hidden';

        row.appendChild(cb); row.appendChild(labelSpan); row.appendChild(delBtn);

        if(t){
          cb.addEventListener('change',()=>{
            tasks[ri].done=cb.checked;
            saveTasks(); renderTaskRows();
          });
          delBtn.addEventListener('click',e=>{
            e.stopPropagation();
            tasks.splice(ri,1);
            deleteSaveTasks();
            renderTaskRows();
          });
        }

        const startTaskEdit=()=>{
          row.innerHTML='';
          const cbNew=document.createElement('input');
          cbNew.type='checkbox'; cbNew.style.cssText=`width:14px;height:14px;flex-shrink:0;accent-color:${dayColor};`;
          cbNew.style.visibility=t?'visible':'hidden';
          if(t&&t.done) cbNew.checked=true;
          const labelIn=document.createElement('input');
          labelIn.type='text'; labelIn.className='wv-row-edit-input';
          labelIn.placeholder='Nouvelle tâche…';
          labelIn.value=t?t.text:'';
          row.appendChild(cbNew); row.appendChild(labelIn);
          labelIn.focus(); labelIn.select();

          const commit=()=>{
            const txt=labelIn.value.trim();
            if(t){
              if(txt) tasks[ri].text=txt;
              else { tasks.splice(ri,1); }
            } else if(txt){
              tasks.push({text:txt,priority:'normal',done:false});
            }
            deleteSaveTasks();
            renderTaskRows();
          };
          labelIn.addEventListener('blur',commit);
          labelIn.addEventListener('keydown',e=>{ if(e.key==='Enter') labelIn.blur(); if(e.key==='Escape') renderTaskRows(); });
        };

        row.addEventListener('click',e=>{ if(e.target!==cb&&e.target!==delBtn) startTaskEdit(); });

        taskList.appendChild(row);
      }

      // ── Drop zone setup on taskList ──
      taskList.addEventListener('dragover',e=>{
        e.preventDefault(); e.dataTransfer.dropEffect='move';
        taskList.classList.add('wv-drop-target');
      });
      taskList.addEventListener('dragleave',()=>taskList.classList.remove('wv-drop-target'));
      taskList.addEventListener('drop',e=>{
        e.preventDefault(); taskList.classList.remove('wv-drop-target');
        try {
          const data=JSON.parse(e.dataTransfer.getData('text/plain'));
          if(!data||!data.srcDk) return;
          if(data.srcDk===dk) return; // same day, no-op

          if(data.isEpisode) {
            // Episodes come from the scheduler — just add as plain task in dest
            const destEntry = appData[dk] || {notes:'', tasks:[]};
            if(!destEntry.tasks) destEntry.tasks=[];
            destEntry.tasks.push(data.task);
            appData[dk] = destEntry;
            saveData(appData);
            renderTaskRows();
          } else {
            // Regular task: remove from source, add to dest
            const srcEntry=appData[data.srcDk]||{tasks:[]};
            if(!srcEntry.tasks) srcEntry.tasks=[];
            if(data.taskIdx < 0 || data.taskIdx >= srcEntry.tasks.length) return;
            const removed=srcEntry.tasks.splice(data.taskIdx,1)[0];
            if(!removed) return;
            if(!srcEntry.tasks.length&&!srcEntry.notes) delete appData[data.srcDk];
            else appData[data.srcDk]=srcEntry;
            if(!entry.tasks) entry.tasks=[];
            entry.tasks.push(removed);
            appData[dk]=entry;
            saveData(appData);
            renderTaskRows();
            const srcTaskList=document.querySelector(`[data-taskrows="${data.srcDk}"]`);
            if(srcTaskList) srcTaskList.dispatchEvent(new CustomEvent('wv-rerender',{bubbles:false}));
          }
        } catch(err){ console.warn('drop error',err); }
      });

      // Re-inject episode rows after every task render
      if (window.renderDayScheduleInTasks) renderDayScheduleInTasks(taskList, dk, dow, dayColor);
    };
    renderTaskRows();
    taskList._rerender = renderTaskRows;
    taskList.addEventListener('wv-rerender', renderTaskRows);
    taskSec.appendChild(taskList);
    col.appendChild(taskSec);

    strip.appendChild(col);
  });
}

    ]
  }
];

// ── STORAGE ────────────────────────────────────────────────────────────────
const TR_KEY = 'ap_tracker_watched'; // { [showId_seriesId_s_e]: true }
const TR_SCHED_KEY = 'ap_tracker_sched'; // { [YYYY-MM-DD]: { trek: [{sid,sn,en}], xf: [{sn,en}] } }

function trLoadWatched() {
  return JSON.parse(localStorage.getItem(TR_KEY) || '{}');
}
function trSaveWatched(d) {
  localStorage.setItem(TR_KEY, JSON.stringify(d));
}
function epKey(showId, seriesId, sn, en) {
  return `${showId}_${seriesId}_s${sn}e${en}`;
}
function trLoadSched() {
  return JSON.parse(localStorage.getItem(TR_SCHED_KEY) || '{}');
}
function trSaveSched(d) {
  localStorage.setItem(TR_SCHED_KEY, JSON.stringify(d));
}

// ── STATE ──────────────────────────────────────────────────────────────────
let trCurrentShow = 'startrek';
let trCurrentSeries = 'tng';
let trShowTitles = true;
const trOpenSeasons = new Set(); // tracks 'seriesId_sn' keys

// Pre-check already-watched episodes (TNG S3E4-6, X-Files S6E4-6)
(function initWatched() {
  const w = trLoadWatched();
  let changed = false;
  // TNG S3 E4, E5, E6
  [4,5,6].forEach(e => {
    const k = epKey('startrek','tng',3,e);
    if (!w[k]) { w[k] = true; changed = true; }
  });
  // X-Files S6 E4, E5, E6
  [4,5,6].forEach(e => {
    const k = epKey('xfiles','xf',6,e);
    if (!w[k]) { w[k] = true; changed = true; }
  });
  if (changed) trSaveWatched(w);
})();

// ── RENDER TRACKER VIEW ────────────────────────────────────────────────────
function renderTracker() {
  const view = document.getElementById('trackerView');
  view.innerHTML = '';

  const watched = trLoadWatched();

  // Header
  const hdr = document.createElement('div'); hdr.className = 'tr-header';
  const title = document.createElement('div'); title.className = 'tr-title';
  title.textContent = '📺 Suivi d\'épisodes';
  hdr.appendChild(title);

  // Controls row: show tabs + toggle titles
  const ctrlRow = document.createElement('div');
  ctrlRow.style.cssText = 'display:flex;align-items:center;gap:12px;flex-wrap:wrap;';

  const tabs = document.createElement('div'); tabs.className = 'tr-show-tabs';
  TRACKER_SHOWS.forEach(show => {
    const tb = document.createElement('button');
    tb.className = 'tr-tab ' + show.tab + (trCurrentShow === show.id ? ' active' : '');
    tb.textContent = show.name;
    tb.addEventListener('click', () => { trCurrentShow = show.id; trCurrentSeries = show.series[0].id; renderTracker(); });
    tabs.appendChild(tb);
  });
  ctrlRow.appendChild(tabs);

  const toggleTitlesBtn = document.createElement('button');
  toggleTitlesBtn.style.cssText = 'padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.78rem;font-family:\'DM Sans\',sans-serif;color:var(--muted);transition:all .15s;white-space:nowrap;';
  toggleTitlesBtn.textContent = trShowTitles ? '🙈 Masquer titres' : '👁 Afficher titres';
  toggleTitlesBtn.addEventListener('click', () => { trShowTitles = !trShowTitles; renderTracker(); });
  ctrlRow.appendChild(toggleTitlesBtn);

  hdr.appendChild(ctrlRow);
  view.appendChild(hdr);

  const show = TRACKER_SHOWS.find(s => s.id === trCurrentShow);
  if (!show) return;

  // Stats bar
  const statsBar = document.createElement('div'); statsBar.className = 'tr-stats-bar';
  let totalAll = 0, watchedAll = 0;
  show.series.forEach(ser => {
    let tot = 0, wat = 0;
    ser.seasons.forEach(sn => sn.eps.forEach(ep => {
      tot++; totalAll++;
      if (watched[epKey(show.id, ser.id, sn.n, ep.e)]) { wat++; watchedAll++; }
    }));
    const pct = tot ? Math.round(wat/tot*100) : 0;
    const st = document.createElement('div'); st.className = 'tr-stat';
    st.innerHTML = `<div class="tr-stat-num">${wat}/${tot}</div><div class="tr-stat-lbl">${ser.name} (${pct}%)</div>`;
    statsBar.appendChild(st);
  });
  const stTotal = document.createElement('div'); stTotal.className = 'tr-stat';
  stTotal.innerHTML = `<div class="tr-stat-num" style="color:var(--accent)">${watchedAll}/${totalAll}</div><div class="tr-stat-lbl">Total (${totalAll ? Math.round(watchedAll/totalAll*100) : 0}%)</div>`;
  statsBar.appendChild(stTotal);
  view.appendChild(statsBar);

  // Content
  const content = document.createElement('div'); content.className = 'tr-content';

  // Series list (left sidebar)
  const serList = document.createElement('div'); serList.className = 'tr-series-list';
  show.series.forEach(ser => {
    let tot = 0, wat = 0;
    ser.seasons.forEach(sn => sn.eps.forEach(ep => {
      tot++;
      if (watched[epKey(show.id, ser.id, sn.n, ep.e)]) wat++;
    }));
    const pct = tot ? Math.round(wat/tot*100) : 0;
    const btn = document.createElement('button');
    btn.className = 'tr-series-btn' + (trCurrentSeries === ser.id ? ' active' : '');
    btn.innerHTML = `<span>${ser.name}</span><span class="tr-sb-pct">${pct}%</span>`;
    btn.addEventListener('click', () => { trCurrentSeries = ser.id; renderTracker(); });
    serList.appendChild(btn);
  });
  content.appendChild(serList);

  // Seasons + episodes
  const seasonsDiv = document.createElement('div'); seasonsDiv.className = 'tr-seasons';
  const series = show.series.find(s => s.id === trCurrentSeries);
  if (series) {
    series.seasons.forEach(sn => {
      let tot = sn.eps.length, wat = 0;
      sn.eps.forEach(ep => { if (watched[epKey(show.id, series.id, sn.n, ep.e)]) wat++; });
      const pct = Math.round(wat/tot*100);
      const openKey = `${series.id}_${sn.n}`;

      // Default open: in-progress, or S1 if nothing watched
      if (!trOpenSeasons.has('__init_'+openKey)) {
        if ((wat > 0 && wat < tot) || (sn.n === 1 && wat === 0)) trOpenSeasons.add(openKey);
        trOpenSeasons.add('__init_'+openKey);
      }
      const isOpen = trOpenSeasons.has(openKey);

      const seasonDiv = document.createElement('div');
      seasonDiv.className = 'tr-season' + (isOpen ? ' open' : '');

      const hd = document.createElement('div'); hd.className = 'tr-season-hd';
      const allChecked = wat === tot;
      const titleSpan = document.createElement('span'); titleSpan.className = 'tr-season-title';
      titleSpan.textContent = `Saison ${sn.n}`;

      const checkAllBtn = document.createElement('button');
      checkAllBtn.style.cssText = 'padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.68rem;font-family:\'DM Sans\',sans-serif;color:var(--muted);transition:all .15s;flex-shrink:0;';
      checkAllBtn.textContent = allChecked ? '☐ Tout décocher' : '☑ Tout cocher';

      const progSpan = document.createElement('span'); progSpan.className = 'tr-season-prog';
      progSpan.textContent = `${wat}/${tot}`;
      const barWrap = document.createElement('span'); barWrap.className = 'tr-season-bar-wrap';
      const bar = document.createElement('span'); bar.className = 'tr-season-bar'; bar.style.width = pct+'%';
      barWrap.appendChild(bar);
      const chevron = document.createElement('span'); chevron.className = 'tr-season-chevron'; chevron.textContent = '▼';
      const metaSpan = document.createElement('span'); metaSpan.className = 'tr-season-meta';
      metaSpan.appendChild(progSpan); metaSpan.appendChild(barWrap); metaSpan.appendChild(chevron);

      hd.appendChild(titleSpan); hd.appendChild(checkAllBtn); hd.appendChild(metaSpan);

      // Check-all: update in-place without re-rendering whole tracker
      checkAllBtn.addEventListener('click', e => {
        e.stopPropagation();
        const nowAllChecked = checkAllBtn.textContent.includes('décocher');
        const w = trLoadWatched();
        sn.eps.forEach(ep => {
          const k = epKey(show.id, series.id, sn.n, ep.e);
          if (nowAllChecked) delete w[k]; else w[k] = true;
        });
        trSaveWatched(w);
        // Update button label
        checkAllBtn.textContent = nowAllChecked ? '☑ Tout cocher' : '☐ Tout décocher';
        // Update progress bar and counter in-place
        const newWat = nowAllChecked ? 0 : tot;
        const newPct = nowAllChecked ? 0 : 100;
        progSpan.textContent = `${newWat}/${tot}`;
        bar.style.width = newPct + '%';
        // Update all episode checkboxes and styles in this season
        grid.querySelectorAll('.tr-ep').forEach((epDiv, idx) => {
          const cb = epDiv.querySelector('input[type=checkbox]');
          if (cb) cb.checked = !nowAllChecked;
          if (nowAllChecked) epDiv.classList.remove('watched');
          else epDiv.classList.add('watched');
        });
      });

      hd.addEventListener('click', () => {
        seasonDiv.classList.toggle('open');
        if (seasonDiv.classList.contains('open')) trOpenSeasons.add(openKey);
        else trOpenSeasons.delete(openKey);
      });

      const epsDiv = document.createElement('div'); epsDiv.className = 'tr-episodes';
      const grid = document.createElement('div'); grid.className = 'tr-ep-grid';
      grid.style.gridTemplateColumns = trShowTitles ? 'repeat(auto-fill, minmax(200px, 1fr))' : 'repeat(auto-fill, minmax(58px, 1fr))';

      sn.eps.forEach(ep => {
        const k = epKey(show.id, series.id, sn.n, ep.e);
        const isW = !!watched[k];
        const epDiv = document.createElement('div');
        epDiv.className = 'tr-ep' + (isW ? ' watched' : '');
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = isW;
        cb.style.accentColor = show.color;
        const num = document.createElement('span'); num.className = 'tr-ep-num';
        num.textContent = `E${String(ep.e).padStart(2,'0')}`;
        epDiv.appendChild(cb); epDiv.appendChild(num);
        if (trShowTitles) {
          const ttl = document.createElement('span'); ttl.className = 'tr-ep-title';
          ttl.textContent = ep.t;
          epDiv.appendChild(ttl);
        }

        const toggle = () => {
          const w = trLoadWatched();
          if (w[k]) delete w[k]; else w[k] = true;
          trSaveWatched(w);
          const nowW = !!w[k];
          cb.checked = nowW;
          if (nowW) epDiv.classList.add('watched'); else epDiv.classList.remove('watched');
          // Update progress in header in-place
          const curWat = grid.querySelectorAll('.tr-ep.watched').length;
          const curPct = Math.round(curWat/tot*100);
          progSpan.textContent = `${curWat}/${tot}`;
          bar.style.width = curPct + '%';
          checkAllBtn.textContent = curWat === tot ? '☐ Tout décocher' : '☑ Tout cocher';
        };
        epDiv.addEventListener('click', toggle);
        grid.appendChild(epDiv);
      });

      epsDiv.appendChild(grid);
      seasonDiv.appendChild(hd); seasonDiv.appendChild(epsDiv);
      seasonsDiv.appendChild(seasonDiv);
    });
  }
  content.appendChild(seasonsDiv);
  view.appendChild(content);
}

// ── WEEKLY SCHEDULE IN DAY COLUMNS ─────────────────────────────────────────
// Starting point: 2026-03-09 = TNG S3E4, XF S6E4
// Each weekday advances by 3 episodes per show

const SCHED_START = '2026-03-09';
const SCHED_TREK_START = { sn: 3, en: 4 }; // TNG S3E4
const SCHED_XF_START   = { sn: 6, en: 4 }; // XF S6E4

// Count weekdays (Mon-Fri) from SCHED_START to a given dk (inclusive if same day)
function weekdaysBetween(fromDk, toDk) {
  const a = new Date(fromDk + 'T00:00:00');
  const b = new Date(toDk + 'T00:00:00');
  if (b < a) return -1; // before start
  let count = 0;
  const cur = new Date(a);
  while (cur <= b) {
    const dow = cur.getDay();
    if (dow >= 1 && dow <= 5) count++;
    cur.setDate(cur.getDate() + 1);
  }
  // We want 0-based offset for the start day itself
  return count - 1;
}

// Get the Nth episode (0-based) in a series starting from (startSn, startEn)
function getNthEpFrom(showId, seriesId, startSn, startEn, n) {
  const show = TRACKER_SHOWS.find(s => s.id === showId);
  if (!show) return null;
  const series = show.series.find(s => s.id === seriesId);
  if (!series) return null;
  let counting = false, idx = 0;
  for (const sn of series.seasons) {
    for (const ep of sn.eps) {
      if (!counting && sn.n === startSn && ep.e === startEn) counting = true;
      if (counting) {
        if (idx === n) return { showId, seriesId, sn: sn.n, en: ep.e, title: ep.t, key: epKey(showId, seriesId, sn.n, ep.e) };
        idx++;
      }
    }
  }
  return null;
}

// Get 3 scheduled episodes for a day (offset weekdays from start)
// Returns grouped by show: all TNG first, then all X-Files
function getScheduledEpsForDay(dk) {
  const offset = weekdaysBetween(SCHED_START, dk);
  if (offset < 0) return [];
  const baseIdx = offset * 3;
  const trekEps = [], xfEps = [];
  for (let i = 0; i < 3; i++) {
    const trek = getNthEpFrom('startrek', 'tng', SCHED_TREK_START.sn, SCHED_TREK_START.en, baseIdx + i);
    const xf   = getNthEpFrom('xfiles',  'xf',  SCHED_XF_START.sn,   SCHED_XF_START.en,   baseIdx + i);
    if (trek) trekEps.push({ ...trek, label: 'TNG',    labelColor: '#2d6bbf' });
    if (xf)   xfEps.push({  ...xf,   label: 'X-Files', labelColor: '#7a3030' });
  }
  return [...trekEps, ...xfEps];
}

// Inject episodes as real task rows at the TOP of the task list
// Format: SHOW - SxxExx - Episode Title  (colored per show, with checkbox)
function renderDayScheduleInTasks(taskListEl, dk, dow, dayColor) {
  if (dow < 1 || dow > 5) return; // Mon-Fri only
  // Remove any already-injected episode rows to avoid duplicates
  taskListEl.querySelectorAll('.wv-ep-row').forEach(r => r.remove());
  const eps = getScheduledEpsForDay(dk);
  if (!eps.length) return;

  const watched = trLoadWatched();

  // Build episode rows in reverse order so prepending keeps original order
  const rows = [];
  eps.forEach(ep => {
    const isW = !!watched[ep.key];
    const row = document.createElement('div');
    row.className = 'wv-task-row wv-ep-row' + (isW ? ' done' : '');
    row.draggable = true;
    row.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      const epLabel = `${ep.label} S${String(ep.sn).padStart(2,'0')}E${String(ep.en).padStart(2,'0')} – ${ep.title}`;
      e.dataTransfer.setData('text/plain', JSON.stringify({
        srcDk: dk,
        taskIdx: -1,
        task: { text: epLabel, priority: 'normal', done: isW },
        isEpisode: true
      }));
      row.classList.add('wv-drag-active');
    });
    row.addEventListener('dragend', () => row.classList.remove('wv-drag-active'));

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'wv-row-cb';
    cb.style.cssText = `width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:${ep.labelColor};`;
    cb.checked = isW;

    const label = document.createElement('span');
    label.className = 'wv-row-label';
    // Format: SHOW - SxxExx - Title
    const showCode = ep.label.toUpperCase().replace('-','').replace(' ','');
    const epNum = `S${String(ep.sn).padStart(2,'0')}E${String(ep.en).padStart(2,'0')}`;
    label.innerHTML =
      `<span style="font-weight:700;color:${ep.labelColor};letter-spacing:.02em;">${ep.label}</span>` +
      `<span style="color:${ep.labelColor};opacity:.75;margin:0 3px;">—</span>` +
      `<span style="font-weight:600;color:${ep.labelColor};">${epNum}</span>` +
      `<span style="color:${ep.labelColor};opacity:.75;margin:0 3px;">—</span>` +
      `<span style="${isW ? 'text-decoration:line-through;color:var(--muted);' : `color:${ep.labelColor};opacity:.9;`}">${ep.title}</span>`;

    row.appendChild(cb);
    row.appendChild(label);

    const toggle = () => {
      const w = trLoadWatched();
      if (w[ep.key]) delete w[ep.key]; else w[ep.key] = true;
      trSaveWatched(w);
      const nowW = !!w[ep.key];
      cb.checked = nowW;
      row.classList.toggle('done', nowW);
      const titleSpan = label.querySelector('span:last-child');
      if (titleSpan) titleSpan.style.cssText = nowW
        ? 'text-decoration:line-through;color:var(--muted);'
        : `color:${ep.labelColor};opacity:.9;`;
    };
    cb.addEventListener('change', toggle);
    row.addEventListener('click', e => { if (e.target !== cb) toggle(); });

    rows.push(row);
  });

  // Prepend all episode rows before existing content (at top of task list)
  const firstChild = taskListEl.firstChild;
  rows.forEach(r => taskListEl.insertBefore(r, firstChild));
}

const _origRenderWvDays = renderWvDays;
window.renderWvDays = function(dates, wk, wdata) {
  _origRenderWvDays(dates, wk, wdata);

};

function _kbInjectEpisodes(dates) {
  const strip = document.getElementById('wvDays');
  if (!strip) return;
  dates.forEach((dt) => {
    const y = dt.getFullYear(), m = dt.getMonth(), d = dt.getDate();
    const dk = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = dt.getDay();
    const taskRows = strip.querySelector(`[data-taskrows="${dk}"]`);
    if (taskRows) renderDayScheduleInTasks(taskRows, dk, dow, DAY_COLORS[dow]);
  });
}

// Inject into the already-rendered weekly view on page load
// (renderWvDays runs before this script is parsed, so we patch retroactively)
(function injectOnLoad() {
  const strip = document.getElementById('wvDays');
  if (!strip) return;
  // Collect dates from already-rendered columns via their data-taskrows attributes
  const taskRowEls = strip.querySelectorAll('[data-taskrows]');
  taskRowEls.forEach(el => {
    const dk = el.dataset.taskrows;
    if (!dk) return;
    const parts = dk.split('-');
    const dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    const dow = dt.getDay();
    renderDayScheduleInTasks(el, dk, dow, DAY_COLORS[dow]);
  });
})();

// ── EXPORT / IMPORT ────────────────────────────────────────────────────────

function exportAllData() {
  const data = {
    version: 1,
    exportDate: new Date().toISOString(),
    appData:        localStorage.getItem('ap_data'),
    yearKey:        localStorage.getItem('ap_year'),
    weekStart:      localStorage.getItem('ap_ws'),
    trackerWatched: localStorage.getItem(TR_KEY),
    trackerSched:   localStorage.getItem(TR_SCHED_KEY),
    globalHabits:   localStorage.getItem('ap_global_habits'),
    weeklyData: {},
    dayEvents: {}
  };

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('ap_w_'))  data.weeklyData[key] = localStorage.getItem(key);
    if (key && key.startsWith('ap_de_')) data.dayEvents[key]  = localStorage.getItem(key);
  }

  const json = JSON.stringify(data, null, 2);
  const filename = 'planner-export-' + new Date().toISOString().slice(0,10) + '.json';

  // Try Blob + createObjectURL first (works locally), fall back to copy-to-clipboard modal
  try {
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) {
    // Fallback: show JSON in a copyable modal
    showExportModal(json, filename);
  }
}

function importAllData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version) throw new Error('Format invalide');

      if (!confirm(`Importer les données du ${data.exportDate?.slice(0,10) || '?'} ?\n⚠️ Ceci remplacera toutes vos données actuelles.`)) return;

      if (data.appData)        localStorage.setItem('ap_data', data.appData);
      if (data.yearKey)        localStorage.setItem('ap_year', data.yearKey);
      if (data.weekStart)      localStorage.setItem('ap_ws', data.weekStart);
      if (data.trackerWatched) localStorage.setItem(TR_KEY, data.trackerWatched);
      if (data.trackerSched)   localStorage.setItem(TR_SCHED_KEY, data.trackerSched);
      if (data.globalHabits)   localStorage.setItem('ap_global_habits', data.globalHabits);
      if (data.weeklyData)     Object.entries(data.weeklyData).forEach(([k,v]) => localStorage.setItem(k, v));
      if (data.dayEvents)      Object.entries(data.dayEvents).forEach(([k,v])  => localStorage.setItem(k, v));

      alert('✅ Données importées avec succès !');
      location.reload();
    } catch(err) {
      alert('❌ Erreur lors de l\'importation : ' + err.message);
    }
  };
  reader.readAsText(file);
}

// Hidden file input for import
(function setupImportInput() {
  let input = document.getElementById('importFileInput');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file'; input.accept = '.json'; input.id = 'importFileInput';
    input.style.display = 'none';
    document.body.appendChild(input);
    input.addEventListener('change', e => {
      if (e.target.files[0]) { importAllData(e.target.files[0]); e.target.value = ''; }
    });
  }
  // Wire header buttons (always visible)
  document.getElementById('btnExportData').addEventListener('click', exportAllData);
  document.getElementById('btnImportData').addEventListener('click', () => input.click());
})();

// Tracker button
document.getElementById('btnTracker').addEventListener('click', () => {
  // Hide all views
  document.getElementById('trackerView').style.display = 'block';
  document.querySelector('.strip-wrapper').style.display = 'none';
  document.getElementById('scrollArea').style.display = 'none';
  document.getElementById('monthView').style.display = 'none';
  document.getElementById('weeklyView').style.display = 'none';
  document.querySelectorAll('.btn-view').forEach(b => b.classList.remove('active'));
  document.getElementById('btnTracker').classList.add('active');
  renderTracker();
});

// ── STORAGE ────────────────────────────────────────────────────────────────
const TR_KEY = 'ap_tracker_watched'; // { [showId_seriesId_s_e]: true }
const TR_SCHED_KEY = 'ap_tracker_sched'; // { [YYYY-MM-DD]: { trek: [{sid,sn,en}], xf: [{sn,en}] } }

function trLoadWatched() {
  return JSON.parse(localStorage.getItem(TR_KEY) || '{}');
}
function trSaveWatched(d) {
  localStorage.setItem(TR_KEY, JSON.stringify(d));
}
function epKey(showId, seriesId, sn, en) {
  return `${showId}_${seriesId}_s${sn}e${en}`;
}
function trLoadSched() {
  return JSON.parse(localStorage.getItem(TR_SCHED_KEY) || '{}');
}
function trSaveSched(d) {
  localStorage.setItem(TR_SCHED_KEY, JSON.stringify(d));
}

// ── STATE ──────────────────────────────────────────────────────────────────
let trCurrentShow = 'startrek';
let trCurrentSeries = 'tng';
let trShowTitles = true;
const trOpenSeasons = new Set(); // tracks 'seriesId_sn' keys

// Pre-check already-watched episodes (TNG S3E4-6, X-Files S6E4-6)
(function initWatched() {
  const w = trLoadWatched();
  let changed = false;
  // TNG S3 E4, E5, E6
  [4,5,6].forEach(e => {
    const k = epKey('startrek','tng',3,e);
    if (!w[k]) { w[k] = true; changed = true; }
  });
  // X-Files S6 E4, E5, E6
  [4,5,6].forEach(e => {
    const k = epKey('xfiles','xf',6,e);
    if (!w[k]) { w[k] = true; changed = true; }
  });
  if (changed) trSaveWatched(w);
})();

// ── RENDER TRACKER VIEW ────────────────────────────────────────────────────
function renderTracker() {
  const view = document.getElementById('trackerView');
  view.innerHTML = '';

  const watched = trLoadWatched();

  // Header
  const hdr = document.createElement('div'); hdr.className = 'tr-header';
  const title = document.createElement('div'); title.className = 'tr-title';
  title.textContent = '📺 Suivi d\'épisodes';
  hdr.appendChild(title);

  // Controls row: show tabs + toggle titles
  const ctrlRow = document.createElement('div');
  ctrlRow.style.cssText = 'display:flex;align-items:center;gap:12px;flex-wrap:wrap;';

  const tabs = document.createElement('div'); tabs.className = 'tr-show-tabs';
  TRACKER_SHOWS.forEach(show => {
    const tb = document.createElement('button');
    tb.className = 'tr-tab ' + show.tab + (trCurrentShow === show.id ? ' active' : '');
    tb.textContent = show.name;
    tb.addEventListener('click', () => { trCurrentShow = show.id; trCurrentSeries = show.series[0].id; renderTracker(); });
    tabs.appendChild(tb);
  });
  ctrlRow.appendChild(tabs);

  const toggleTitlesBtn = document.createElement('button');
  toggleTitlesBtn.style.cssText = 'padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.78rem;font-family:\'DM Sans\',sans-serif;color:var(--muted);transition:all .15s;white-space:nowrap;';
  toggleTitlesBtn.textContent = trShowTitles ? '🙈 Masquer titres' : '👁 Afficher titres';
  toggleTitlesBtn.addEventListener('click', () => { trShowTitles = !trShowTitles; renderTracker(); });
  ctrlRow.appendChild(toggleTitlesBtn);

  hdr.appendChild(ctrlRow);
  view.appendChild(hdr);

  const show = TRACKER_SHOWS.find(s => s.id === trCurrentShow);
  if (!show) return;

  // Stats bar
  const statsBar = document.createElement('div'); statsBar.className = 'tr-stats-bar';
  let totalAll = 0, watchedAll = 0;
  show.series.forEach(ser => {
    let tot = 0, wat = 0;
    ser.seasons.forEach(sn => sn.eps.forEach(ep => {
      tot++; totalAll++;
      if (watched[epKey(show.id, ser.id, sn.n, ep.e)]) { wat++; watchedAll++; }
    }));
    const pct = tot ? Math.round(wat/tot*100) : 0;
    const st = document.createElement('div'); st.className = 'tr-stat';
    st.innerHTML = `<div class="tr-stat-num">${wat}/${tot}</div><div class="tr-stat-lbl">${ser.name} (${pct}%)</div>`;
    statsBar.appendChild(st);
  });
  const stTotal = document.createElement('div'); stTotal.className = 'tr-stat';
  stTotal.innerHTML = `<div class="tr-stat-num" style="color:var(--accent)">${watchedAll}/${totalAll}</div><div class="tr-stat-lbl">Total (${totalAll ? Math.round(watchedAll/totalAll*100) : 0}%)</div>`;
  statsBar.appendChild(stTotal);
  view.appendChild(statsBar);

  // Content
  const content = document.createElement('div'); content.className = 'tr-content';

  // Series list (left sidebar)
  const serList = document.createElement('div'); serList.className = 'tr-series-list';
  show.series.forEach(ser => {
    let tot = 0, wat = 0;
    ser.seasons.forEach(sn => sn.eps.forEach(ep => {
      tot++;
      if (watched[epKey(show.id, ser.id, sn.n, ep.e)]) wat++;
    }));
    const pct = tot ? Math.round(wat/tot*100) : 0;
    const btn = document.createElement('button');
    btn.className = 'tr-series-btn' + (trCurrentSeries === ser.id ? ' active' : '');
    btn.innerHTML = `<span>${ser.name}</span><span class="tr-sb-pct">${pct}%</span>`;
    btn.addEventListener('click', () => { trCurrentSeries = ser.id; renderTracker(); });
    serList.appendChild(btn);
  });
  content.appendChild(serList);

  // Seasons + episodes
  const seasonsDiv = document.createElement('div'); seasonsDiv.className = 'tr-seasons';
  const series = show.series.find(s => s.id === trCurrentSeries);
  if (series) {
    series.seasons.forEach(sn => {
      let tot = sn.eps.length, wat = 0;
      sn.eps.forEach(ep => { if (watched[epKey(show.id, series.id, sn.n, ep.e)]) wat++; });
      const pct = Math.round(wat/tot*100);
      const openKey = `${series.id}_${sn.n}`;

      // Default open: in-progress, or S1 if nothing watched
      if (!trOpenSeasons.has('__init_'+openKey)) {
        if ((wat > 0 && wat < tot) || (sn.n === 1 && wat === 0)) trOpenSeasons.add(openKey);
        trOpenSeasons.add('__init_'+openKey);
      }
      const isOpen = trOpenSeasons.has(openKey);

      const seasonDiv = document.createElement('div');
      seasonDiv.className = 'tr-season' + (isOpen ? ' open' : '');

      const hd = document.createElement('div'); hd.className = 'tr-season-hd';
      const allChecked = wat === tot;
      const titleSpan = document.createElement('span'); titleSpan.className = 'tr-season-title';
      titleSpan.textContent = `Saison ${sn.n}`;

      const checkAllBtn = document.createElement('button');
      checkAllBtn.style.cssText = 'padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.68rem;font-family:\'DM Sans\',sans-serif;color:var(--muted);transition:all .15s;flex-shrink:0;';
      checkAllBtn.textContent = allChecked ? '☐ Tout décocher' : '☑ Tout cocher';

      const progSpan = document.createElement('span'); progSpan.className = 'tr-season-prog';
      progSpan.textContent = `${wat}/${tot}`;
      const barWrap = document.createElement('span'); barWrap.className = 'tr-season-bar-wrap';
      const bar = document.createElement('span'); bar.className = 'tr-season-bar'; bar.style.width = pct+'%';
      barWrap.appendChild(bar);
      const chevron = document.createElement('span'); chevron.className = 'tr-season-chevron'; chevron.textContent = '▼';
      const metaSpan = document.createElement('span'); metaSpan.className = 'tr-season-meta';
      metaSpan.appendChild(progSpan); metaSpan.appendChild(barWrap); metaSpan.appendChild(chevron);

      hd.appendChild(titleSpan); hd.appendChild(checkAllBtn); hd.appendChild(metaSpan);

      // Check-all: update in-place without re-rendering whole tracker
      checkAllBtn.addEventListener('click', e => {
        e.stopPropagation();
        const nowAllChecked = checkAllBtn.textContent.includes('décocher');
        const w = trLoadWatched();
        sn.eps.forEach(ep => {
          const k = epKey(show.id, series.id, sn.n, ep.e);
          if (nowAllChecked) delete w[k]; else w[k] = true;
        });
        trSaveWatched(w);
        // Update button label
        checkAllBtn.textContent = nowAllChecked ? '☑ Tout cocher' : '☐ Tout décocher';
        // Update progress bar and counter in-place
        const newWat = nowAllChecked ? 0 : tot;
        const newPct = nowAllChecked ? 0 : 100;
        progSpan.textContent = `${newWat}/${tot}`;
        bar.style.width = newPct + '%';
        // Update all episode checkboxes and styles in this season
        grid.querySelectorAll('.tr-ep').forEach((epDiv, idx) => {
          const cb = epDiv.querySelector('input[type=checkbox]');
          if (cb) cb.checked = !nowAllChecked;
          if (nowAllChecked) epDiv.classList.remove('watched');
          else epDiv.classList.add('watched');
        });
      });

      hd.addEventListener('click', () => {
        seasonDiv.classList.toggle('open');
        if (seasonDiv.classList.contains('open')) trOpenSeasons.add(openKey);
        else trOpenSeasons.delete(openKey);
      });

      const epsDiv = document.createElement('div'); epsDiv.className = 'tr-episodes';
      const grid = document.createElement('div'); grid.className = 'tr-ep-grid';
      grid.style.gridTemplateColumns = trShowTitles ? 'repeat(auto-fill, minmax(200px, 1fr))' : 'repeat(auto-fill, minmax(58px, 1fr))';

      sn.eps.forEach(ep => {
        const k = epKey(show.id, series.id, sn.n, ep.e);
        const isW = !!watched[k];
        const epDiv = document.createElement('div');
        epDiv.className = 'tr-ep' + (isW ? ' watched' : '');
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = isW;
        cb.style.accentColor = show.color;
        const num = document.createElement('span'); num.className = 'tr-ep-num';
        num.textContent = `E${String(ep.e).padStart(2,'0')}`;
        epDiv.appendChild(cb); epDiv.appendChild(num);
        if (trShowTitles) {
          const ttl = document.createElement('span'); ttl.className = 'tr-ep-title';
          ttl.textContent = ep.t;
          epDiv.appendChild(ttl);
        }

        const toggle = () => {
          const w = trLoadWatched();
          if (w[k]) delete w[k]; else w[k] = true;
          trSaveWatched(w);
          const nowW = !!w[k];
          cb.checked = nowW;
          if (nowW) epDiv.classList.add('watched'); else epDiv.classList.remove('watched');
          // Update progress in header in-place
          const curWat = grid.querySelectorAll('.tr-ep.watched').length;
          const curPct = Math.round(curWat/tot*100);
          progSpan.textContent = `${curWat}/${tot}`;
          bar.style.width = curPct + '%';
          checkAllBtn.textContent = curWat === tot ? '☐ Tout décocher' : '☑ Tout cocher';
        };
        epDiv.addEventListener('click', toggle);
        grid.appendChild(epDiv);
      });

      epsDiv.appendChild(grid);
      seasonDiv.appendChild(hd); seasonDiv.appendChild(epsDiv);
      seasonsDiv.appendChild(seasonDiv);
    });
  }
  content.appendChild(seasonsDiv);
  view.appendChild(content);
}

// ── WEEKLY SCHEDULE IN DAY COLUMNS ─────────────────────────────────────────
// Starting point: 2026-03-09 = TNG S3E4, XF S6E4
// Each weekday advances by 3 episodes per show

const SCHED_START = '2026-03-09';
const SCHED_TREK_START = { sn: 3, en: 4 }; // TNG S3E4
const SCHED_XF_START   = { sn: 6, en: 4 }; // XF S6E4

// Count weekdays (Mon-Fri) from SCHED_START to a given dk (inclusive if same day)
function weekdaysBetween(fromDk, toDk) {
  const a = new Date(fromDk + 'T00:00:00');
  const b = new Date(toDk + 'T00:00:00');
  if (b < a) return -1; // before start
  let count = 0;
  const cur = new Date(a);
  while (cur <= b) {
    const dow = cur.getDay();
    if (dow >= 1 && dow <= 5) count++;
    cur.setDate(cur.getDate() + 1);
  }
  // We want 0-based offset for the start day itself
  return count - 1;
}

// Get the Nth episode (0-based) in a series starting from (startSn, startEn)
function getNthEpFrom(showId, seriesId, startSn, startEn, n) {
  const show = TRACKER_SHOWS.find(s => s.id === showId);
  if (!show) return null;
  const series = show.series.find(s => s.id === seriesId);
  if (!series) return null;
  let counting = false, idx = 0;
  for (const sn of series.seasons) {
    for (const ep of sn.eps) {
      if (!counting && sn.n === startSn && ep.e === startEn) counting = true;
      if (counting) {
        if (idx === n) return { showId, seriesId, sn: sn.n, en: ep.e, title: ep.t, key: epKey(showId, seriesId, sn.n, ep.e) };
        idx++;
      }
    }
  }
  return null;
}

// Get 3 scheduled episodes for a day (offset weekdays from start)
// Returns grouped by show: all TNG first, then all X-Files
function getScheduledEpsForDay(dk) {
  const offset = weekdaysBetween(SCHED_START, dk);
  if (offset < 0) return [];
  const baseIdx = offset * 3;
  const trekEps = [], xfEps = [];
  for (let i = 0; i < 3; i++) {
    const trek = getNthEpFrom('startrek', 'tng', SCHED_TREK_START.sn, SCHED_TREK_START.en, baseIdx + i);
    const xf   = getNthEpFrom('xfiles',  'xf',  SCHED_XF_START.sn,   SCHED_XF_START.en,   baseIdx + i);
    if (trek) trekEps.push({ ...trek, label: 'TNG',    labelColor: '#2d6bbf' });
    if (xf)   xfEps.push({  ...xf,   label: 'X-Files', labelColor: '#7a3030' });
  }
  return [...trekEps, ...xfEps];
}

// Inject episodes as real task rows at the TOP of the task list
// Format: SHOW - SxxExx - Episode Title  (colored per show, with checkbox)
function renderDayScheduleInTasks(taskListEl, dk, dow, dayColor) {
  if (dow < 1 || dow > 5) return; // Mon-Fri only
  const eps = getScheduledEpsForDay(dk);
  if (!eps.length) return;

  const watched = trLoadWatched();

  // Build episode rows in reverse order so prepending keeps original order
  const rows = [];
  eps.forEach(ep => {
    const isW = !!watched[ep.key];
    const row = document.createElement('div');
    row.className = 'wv-task-row' + (isW ? ' done' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'wv-row-cb';
    cb.style.cssText = `width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:${ep.labelColor};`;
    cb.checked = isW;

    const label = document.createElement('span');
    label.className = 'wv-row-label';
    // Format: SHOW - SxxExx - Title
    const showCode = ep.label.toUpperCase().replace('-','').replace(' ','');
    const epNum = `S${String(ep.sn).padStart(2,'0')}E${String(ep.en).padStart(2,'0')}`;
    label.innerHTML =
      `<span style="font-weight:700;color:${ep.labelColor};letter-spacing:.02em;">${ep.label}</span>` +
      `<span style="color:${ep.labelColor};opacity:.75;margin:0 3px;">—</span>` +
      `<span style="font-weight:600;color:${ep.labelColor};">${epNum}</span>` +
      `<span style="color:${ep.labelColor};opacity:.75;margin:0 3px;">—</span>` +
      `<span style="${isW ? 'text-decoration:line-through;color:var(--muted);' : `color:${ep.labelColor};opacity:.9;`}">${ep.title}</span>`;

    row.appendChild(cb);
    row.appendChild(label);

    const toggle = () => {
      const w = trLoadWatched();
      if (w[ep.key]) delete w[ep.key]; else w[ep.key] = true;
      trSaveWatched(w);
      const nowW = !!w[ep.key];
      cb.checked = nowW;
      row.classList.toggle('done', nowW);
      const titleSpan = label.querySelector('span:last-child');
      if (titleSpan) titleSpan.style.cssText = nowW
        ? 'text-decoration:line-through;color:var(--muted);'
        : `color:${ep.labelColor};opacity:.9;`;
    };
    cb.addEventListener('change', toggle);
    row.addEventListener('click', e => { if (e.target !== cb) toggle(); });

    rows.push(row);
  });

  // Prepend all episode rows before existing content (at top of task list)
  const firstChild = taskListEl.firstChild;
  rows.forEach(r => taskListEl.insertBefore(r, firstChild));
}

function _kbInjectEpisodes(dates) {
  const strip = document.getElementById('wvDays');
  if (!strip) return;
  dates.forEach((dt) => {
    const y = dt.getFullYear(), m = dt.getMonth(), d = dt.getDate();
    const dk = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = dt.getDay();
    const taskRows = strip.querySelector(`[data-taskrows="${dk}"]`);
    if (taskRows) renderDayScheduleInTasks(taskRows, dk, dow, DAY_COLORS[dow]);
  });
}

// Inject into the already-rendered weekly view on page load
// (renderWvDays runs before this script is parsed, so we patch retroactively)
(function injectOnLoad() {
  const strip = document.getElementById('wvDays');
  if (!strip) return;
  // Collect dates from already-rendered columns via their data-taskrows attributes
  const taskRowEls = strip.querySelectorAll('[data-taskrows]');
  taskRowEls.forEach(el => {
    const dk = el.dataset.taskrows;
    if (!dk) return;
    const parts = dk.split('-');
    const dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    const dow = dt.getDay();
    renderDayScheduleInTasks(el, dk, dow, DAY_COLORS[dow]);
  });
})();

function exportAllData() {
  const data = {
    version: 1,
    exportDate: new Date().toISOString(),
    appData:        localStorage.getItem('ap_data'),
    yearKey:        localStorage.getItem('ap_year'),
    weekStart:      localStorage.getItem('ap_ws'),
    trackerWatched: localStorage.getItem(TR_KEY),
    trackerSched:   localStorage.getItem(TR_SCHED_KEY),
    globalHabits:   localStorage.getItem('ap_global_habits'),
    weeklyData: {},
    dayEvents: {}
  };

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('ap_w_'))  data.weeklyData[key] = localStorage.getItem(key);
    if (key && key.startsWith('ap_de_')) data.dayEvents[key]  = localStorage.getItem(key);
  }

  const json = JSON.stringify(data, null, 2);
  const filename = 'planner-export-' + new Date().toISOString().slice(0,10) + '.json';

  // Try Blob + createObjectURL first (works locally), fall back to copy-to-clipboard modal
  try {
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) {
    // Fallback: show JSON in a copyable modal
    showExportModal(json, filename);
  }
}

function showExportModal(json, filename) {
  // Remove existing if any
  const existing = document.getElementById('exportModal');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'exportModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;padding:24px;width:90%;max-width:700px;max-height:80vh;display:flex;flex-direction:column;gap:12px;';

  const title = document.createElement('div');
  title.style.cssText = 'font-family:\'DM Serif Display\',serif;font-size:1.1rem;color:#25231f;';
  title.textContent = '⬇ Exporter données — ' + filename;

  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:.78rem;color:#888;';
  hint.textContent = 'Copiez ce JSON et sauvegardez-le dans un fichier .json sur votre disque.';

  const ta = document.createElement('textarea');
  ta.value = json;
  ta.style.cssText = 'flex:1;min-height:300px;font-family:monospace;font-size:.72rem;border:1px solid #ddd;border-radius:6px;padding:10px;resize:vertical;';
  ta.readOnly = true;

  const btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;';

  const copyBtn = document.createElement('button');
  copyBtn.textContent = '📋 Copier tout';
  copyBtn.style.cssText = 'padding:8px 18px;border-radius:6px;border:none;background:#2d6bbf;color:#fff;cursor:pointer;font-family:\'DM Sans\',sans-serif;font-size:.82rem;';
  copyBtn.addEventListener('click', () => {
    ta.select(); document.execCommand('copy');
    copyBtn.textContent = '✅ Copié !';
    setTimeout(() => copyBtn.textContent = '📋 Copier tout', 2000);
  });

  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'Fermer';
  closeBtn.style.cssText = 'padding:8px 18px;border-radius:6px;border:1px solid #ddd;background:#f7f5f0;cursor:pointer;font-family:\'DM Sans\',sans-serif;font-size:.82rem;';
  closeBtn.addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });

  btns.appendChild(copyBtn); btns.appendChild(closeBtn);
  box.appendChild(title); box.appendChild(hint); box.appendChild(ta); box.appendChild(btns);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  setTimeout(() => ta.select(), 100);
}

function importAllData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version) throw new Error('Format invalide');

      if (!confirm(`Importer les données du ${data.exportDate?.slice(0,10) || '?'} ?\n⚠️ Ceci remplacera toutes vos données actuelles.`)) return;

      if (data.appData)        localStorage.setItem('ap_data', data.appData);
      if (data.yearKey)        localStorage.setItem('ap_year', data.yearKey);
      if (data.weekStart)      localStorage.setItem('ap_ws', data.weekStart);
      if (data.trackerWatched) localStorage.setItem(TR_KEY, data.trackerWatched);
      if (data.trackerSched)   localStorage.setItem(TR_SCHED_KEY, data.trackerSched);
      if (data.globalHabits)   localStorage.setItem('ap_global_habits', data.globalHabits);
      if (data.weeklyData)     Object.entries(data.weeklyData).forEach(([k,v]) => localStorage.setItem(k, v));
      if (data.dayEvents)      Object.entries(data.dayEvents).forEach(([k,v])  => localStorage.setItem(k, v));

      alert('✅ Données importées avec succès !');
      location.reload();
    } catch(err) {
      alert('❌ Erreur lors de l\'importation : ' + err.message);
    }
  };
  reader.readAsText(file);
}

// Hidden file input for import
(function setupImportInput() {
  let input = document.getElementById('importFileInput');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file'; input.accept = '.json'; input.id = 'importFileInput';
    input.style.display = 'none';
    document.body.appendChild(input);
    input.addEventListener('change', e => {
      if (e.target.files[0]) { importAllData(e.target.files[0]); e.target.value = ''; }
    });
  }
  // Wire header buttons (always visible)
  document.getElementById('btnExportData').addEventListener('click', exportAllData);
  document.getElementById('btnImportData').addEventListener('click', () => input.click());
})();

// Tracker button
document.getElementById('btnTracker').addEventListener('click', () => {
  // Hide all views
  document.getElementById('trackerView').style.display = 'block';
  document.querySelector('.strip-wrapper').style.display = 'none';
  document.getElementById('scrollArea').style.display = 'none';
  document.getElementById('monthView').style.display = 'none';
  document.getElementById('weeklyView').style.display = 'none';
  document.querySelectorAll('.btn-view').forEach(b => b.classList.remove('active'));
  document.getElementById('btnTracker').classList.add('active');
  renderTracker();
});

</script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// KANBAN — Objectifs annuels
// localStorage keys:
//   ap_kb_statuses  → [{id, label, color}]
//   ap_kb_cards     → [{id, title, desc, year, statusId, order, createdAt}]
// ═══════════════════════════════════════════════════════════════════════════

const KB_STATUSES_KEY = 'ap_kb_statuses';
const KB_CARDS_KEY    = 'ap_kb_cards';

const KB_DEFAULT_STATUSES = [
  { id: 'todo',  label: 'À faire',  color: '#8b7355' },
  { id: 'doing', label: 'En cours', color: '#2d6bbf' },
  { id: 'done',  label: 'Complété', color: '#2a7a4b' },
];

let kbDragCard   = null;
let kbActiveYear = new Date().getFullYear();

// ── PERSISTENCE ──────────────────────────────────────────────────────────────
function kbLoadStatuses() {
  try { return JSON.parse(localStorage.getItem(KB_STATUSES_KEY)) || [...KB_DEFAULT_STATUSES]; }
  catch { return [...KB_DEFAULT_STATUSES]; }
}
function kbSaveStatuses(s) { localStorage.setItem(KB_STATUSES_KEY, JSON.stringify(s)); }

function kbLoadCards() {
  try { return JSON.parse(localStorage.getItem(KB_CARDS_KEY)) || []; }
  catch { return []; }
}
function kbSaveCards(c) { localStorage.setItem(KB_CARDS_KEY, JSON.stringify(c)); }

function kbUid() { return 'kb_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderKanban() {
  const view = document.getElementById('kanbanView');
  view.innerHTML = '';

  const statuses = kbLoadStatuses();
  const allCards = kbLoadCards();
  const allYears = Array.from(new Set([
    ...allCards.map(c => c.year),
    kbActiveYear,
    new Date().getFullYear()
  ])).sort((a,b)=>a-b);

  // ── Toolbar ──
  const toolbar = document.createElement('div');
  toolbar.className = 'kb-toolbar';

  // Year pills
  const yearWrap = document.createElement('div');
  yearWrap.className = 'kb-year-wrap';
  const yearIcon = document.createElement('span');
  yearIcon.textContent = '📅';
  yearIcon.style.fontSize = '.95rem';
  yearWrap.appendChild(yearIcon);

  allYears.forEach(yr => {
    const ybtn = document.createElement('button');
    ybtn.className = 'kb-year-btn' + (yr === kbActiveYear ? ' active' : '');
    ybtn.textContent = yr;
    ybtn.addEventListener('click', () => { kbActiveYear = yr; renderKanban(); });
    yearWrap.appendChild(ybtn);
  });

  const addYrBtn = document.createElement('button');
  addYrBtn.className = 'kb-year-btn kb-year-add';
  addYrBtn.textContent = '＋';
  addYrBtn.title = 'Ajouter une année';
  addYrBtn.addEventListener('click', () => {
    const yr = parseInt(prompt('Année :', new Date().getFullYear() + 1));
    if (yr && yr > 2000 && yr < 2100) { kbActiveYear = yr; renderKanban(); }
  });
  yearWrap.appendChild(addYrBtn);
  toolbar.appendChild(yearWrap);

  const spacer = document.createElement('div'); spacer.style.flex='1';
  toolbar.appendChild(spacer);

  const manageBtn = document.createElement('button');
  manageBtn.className = 'kb-manage-btn';
  manageBtn.textContent = '⚙ Colonnes';
  manageBtn.addEventListener('click', kbShowManageModal);
  toolbar.appendChild(manageBtn);

  view.appendChild(toolbar);

  // ── Board ──
  const board = document.createElement('div');
  board.className = 'kb-board';

  const cards = allCards.filter(c => c.year === kbActiveYear);

  statuses.forEach(status => {
    board.appendChild(kbBuildColumn(status, cards));
  });

  view.appendChild(board);
}

// ── COLUMN ───────────────────────────────────────────────────────────────────
function kbBuildColumn(status, cards) {
  const colCards = cards
    .filter(c => c.statusId === status.id)
    .sort((a,b) => (a.order||0) - (b.order||0));

  const col = document.createElement('div');
  col.className = 'kb-col';

  const hd = document.createElement('div');
  hd.className = 'kb-col-hd';

  const dot = document.createElement('span');
  dot.className = 'kb-col-dot';
  dot.style.background = status.color;

  const lbl = document.createElement('span');
  lbl.className = 'kb-col-label';
  lbl.textContent = status.label;

  const cnt = document.createElement('span');
  cnt.className = 'kb-col-count';
  cnt.style.background = status.color + '33';
  cnt.style.color = status.color;
  cnt.textContent = colCards.length;

  hd.appendChild(dot); hd.appendChild(lbl); hd.appendChild(cnt);
  col.appendChild(hd);

  const list = document.createElement('div');
  list.className = 'kb-list';
  list.dataset.statusId = status.id;

  // Drag events on list
  list.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const after = kbDragAfterElement(list, e.clientY);
    let ghost = list.querySelector('.kb-ghost');
    if (!ghost) { ghost = document.createElement('div'); ghost.className = 'kb-ghost'; }
    if (after) list.insertBefore(ghost, after);
    else {
      // insert before the add-button if it's there
      const addBtn = list.querySelector('.kb-add-card-btn');
      if (addBtn) list.insertBefore(ghost, addBtn);
      else list.appendChild(ghost);
    }
  });

  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) {
      const g = list.querySelector('.kb-ghost'); if (g) g.remove();
    }
  });

  list.addEventListener('drop', e => {
    e.preventDefault();
    const ghost = list.querySelector('.kb-ghost');
    const afterEl = ghost ? ghost.nextSibling : null;
    if (ghost) ghost.remove();
    kbDropCard(status.id, afterEl?.dataset?.cardId || null);
  });

  colCards.forEach(card => list.appendChild(kbBuildCard(card)));

  const addBtn = document.createElement('button');
  addBtn.className = 'kb-add-card-btn';
  addBtn.innerHTML = '<span style="font-size:1rem;line-height:1">＋</span> Ajouter un objectif';
  addBtn.addEventListener('click', () => kbShowCardModal(null, status.id));
  list.appendChild(addBtn);

  col.appendChild(list);
  return col;
}

// ── CARD ─────────────────────────────────────────────────────────────────────
function kbBuildCard(card) {
  const el = document.createElement('div');
  el.className = 'kb-card';
  el.dataset.cardId = card.id;
  el.draggable = true;

  el.addEventListener('dragstart', e => {
    kbDragCard = card.id;
    setTimeout(() => el.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.id);
  });
  el.addEventListener('dragend', () => {
    kbDragCard = null;
    el.classList.remove('dragging');
    document.querySelectorAll('.kb-ghost').forEach(g => g.remove());
  });

  const title = document.createElement('div');
  title.className = 'kb-card-title';
  title.textContent = card.title;
  el.appendChild(title);

  if (card.desc) {
    const desc = document.createElement('div');
    desc.className = 'kb-card-desc';
    desc.textContent = card.desc;
    el.appendChild(desc);
  }

  const footer = document.createElement('div');
  footer.className = 'kb-card-footer';

  const yearBadge = document.createElement('span');
  yearBadge.className = 'kb-card-year';
  yearBadge.textContent = card.year;

  const actions = document.createElement('div');
  actions.className = 'kb-card-actions';

  const editBtn = document.createElement('button');
  editBtn.className = 'kb-card-btn';
  editBtn.title = 'Modifier'; editBtn.textContent = '✏';
  editBtn.addEventListener('click', e => { e.stopPropagation(); kbShowCardModal(card); });

  const delBtn = document.createElement('button');
  delBtn.className = 'kb-card-btn kb-card-btn-del';
  delBtn.title = 'Supprimer'; delBtn.textContent = '✕';
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (confirm(`Supprimer l'objectif "${card.title}" ?`)) {
      kbSaveCards(kbLoadCards().filter(c => c.id !== card.id));
      renderKanban();
    }
  });

  actions.appendChild(editBtn); actions.appendChild(delBtn);
  footer.appendChild(yearBadge); footer.appendChild(actions);
  el.appendChild(footer);
  return el;
}

function kbDragAfterElement(container, y) {
  const els = [...container.querySelectorAll('.kb-card:not(.dragging)')];
  return els.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function kbDropCard(targetStatusId, beforeCardId) {
  if (!kbDragCard) return;
  const cards = kbLoadCards();
  const card  = cards.find(c => c.id === kbDragCard);
  if (!card) return;

  card.statusId = targetStatusId;

  const colCards = cards
    .filter(c => c.statusId === targetStatusId && c.id !== kbDragCard)
    .sort((a,b) => (a.order||0) - (b.order||0));

  const insertIdx = beforeCardId
    ? colCards.findIndex(c => c.id === beforeCardId)
    : colCards.length;

  colCards.splice(insertIdx < 0 ? colCards.length : insertIdx, 0, card);
  colCards.forEach((c,i) => { c.order = i; });

  kbSaveCards(cards);
  renderKanban();
}

// ── CARD MODAL ───────────────────────────────────────────────────────────────
function kbShowCardModal(card = null, defaultStatusId = null) {
  kbRemoveModal();
  const statuses = kbLoadStatuses();
  const isEdit   = !!card;

  const overlay = kbMakeOverlay();
  const modal   = document.createElement('div'); modal.className = 'kb-modal';

  // Header
  const mhd = document.createElement('div'); mhd.className = 'kb-modal-hd';
  const mtitle = document.createElement('div'); mtitle.className = 'kb-modal-title';
  mtitle.textContent = isEdit ? '✏ Modifier l\'objectif' : '＋ Nouvel objectif';
  const mclose = kbCloseBtn(); mhd.appendChild(mtitle); mhd.appendChild(mclose);

  // Body
  const mbd = document.createElement('div'); mbd.className = 'kb-modal-bd';

  const mkField = (lbl, el) => {
    const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;';
    const label = document.createElement('label'); label.className = 'kb-field-label'; label.textContent = lbl;
    wrap.appendChild(label); wrap.appendChild(el); return wrap;
  };

  const titleInput = document.createElement('input'); titleInput.className = 'kb-field-input';
  titleInput.placeholder = 'Nom de l\'objectif…'; titleInput.value = card?.title || '';

  const descInput = document.createElement('textarea'); descInput.className = 'kb-field-textarea';
  descInput.placeholder = 'Détails, notes…'; descInput.value = card?.desc || ''; descInput.rows = 3;

  const yearInput = document.createElement('input'); yearInput.className = 'kb-field-input';
  yearInput.type = 'number'; yearInput.min = 2020; yearInput.max = 2099;
  yearInput.value = card?.year || kbActiveYear;

  const statusSel = document.createElement('select'); statusSel.className = 'kb-field-select';
  statuses.forEach(s => {
    const opt = document.createElement('option'); opt.value = s.id; opt.textContent = s.label;
    if ((card?.statusId || defaultStatusId) === s.id) opt.selected = true;
    statusSel.appendChild(opt);
  });

  mbd.appendChild(mkField('Objectif *', titleInput));
  mbd.appendChild(mkField('Description', descInput));
  mbd.appendChild(mkField('Année', yearInput));
  mbd.appendChild(mkField('Statut', statusSel));

  // Footer
  const mft = document.createElement('div'); mft.className = 'kb-modal-ft';
  const cancelBtn = document.createElement('button'); cancelBtn.className = 'kb-btn-cancel'; cancelBtn.textContent = 'Annuler';
  cancelBtn.addEventListener('click', kbRemoveModal);
  const saveBtn = document.createElement('button'); saveBtn.className = 'kb-btn-save';
  saveBtn.textContent = isEdit ? 'Enregistrer' : 'Créer';

  saveBtn.addEventListener('click', () => {
    const title = titleInput.value.trim();
    if (!title) { titleInput.style.borderColor='#e05'; titleInput.focus(); return; }
    const cards = kbLoadCards();
    const yr    = parseInt(yearInput.value) || kbActiveYear;
    const stId  = statusSel.value;

    if (isEdit) {
      const idx = cards.findIndex(c => c.id === card.id);
      if (idx >= 0) Object.assign(cards[idx], { title, desc: descInput.value.trim(), year: yr, statusId: stId });
    } else {
      const colCards = cards.filter(c => c.statusId === stId && c.year === yr);
      const maxOrder = colCards.length ? Math.max(...colCards.map(c=>c.order||0)) + 1 : 0;
      cards.push({ id: kbUid(), title, desc: descInput.value.trim(), year: yr, statusId: stId, order: maxOrder, createdAt: new Date().toISOString() });
    }

    kbSaveCards(cards);
    if (yr !== kbActiveYear) kbActiveYear = yr;
    kbRemoveModal();
    renderKanban();
  });

  mft.appendChild(cancelBtn); mft.appendChild(saveBtn);
  modal.appendChild(mhd); modal.appendChild(mbd); modal.appendChild(mft);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('visible'));
  titleInput.focus();
  titleInput.addEventListener('keydown', e => { if (e.key==='Enter') saveBtn.click(); });
}

// ── MANAGE COLUMNS MODAL ─────────────────────────────────────────────────────
function kbShowManageModal() {
  kbRemoveModal();
  let statuses = kbLoadStatuses().map(s => ({...s})); // work on copies

  const overlay = kbMakeOverlay();
  const modal   = document.createElement('div'); modal.className = 'kb-modal'; modal.style.maxWidth='480px';

  const mhd = document.createElement('div'); mhd.className = 'kb-modal-hd';
  const mtitle = document.createElement('div'); mtitle.className = 'kb-modal-title'; mtitle.textContent = '⚙ Gérer les colonnes';
  const mclose = kbCloseBtn(); mhd.appendChild(mtitle); mhd.appendChild(mclose);

  const mbd = document.createElement('div'); mbd.className = 'kb-modal-bd';
  const hint = document.createElement('p');
  hint.style.cssText = 'font-size:.78rem;color:var(--muted);margin:0 0 14px;';
  hint.textContent = 'Glissez ⠿ pour réordonner. Cliquez sur la pastille pour changer la couleur.';
  mbd.appendChild(hint);

  let dragSrc = null;

  const buildList = () => {
    const old = mbd.querySelector('.kb-status-list'); if (old) old.remove();
    const list = document.createElement('div'); list.className = 'kb-status-list';

    statuses.forEach((s, idx) => {
      const row = document.createElement('div'); row.className = 'kb-status-row'; row.draggable = true;

      row.addEventListener('dragstart', e => { dragSrc = idx; row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
      row.addEventListener('dragend',   () => { row.classList.remove('dragging'); list.querySelectorAll('.kb-status-row').forEach(r=>r.classList.remove('drag-over')); });
      row.addEventListener('dragover',  e => { e.preventDefault(); row.classList.add('drag-over'); });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', e => {
        e.preventDefault(); row.classList.remove('drag-over');
        if (dragSrc === null || dragSrc === idx) return;
        const [moved] = statuses.splice(dragSrc, 1);
        statuses.splice(idx, 0, moved);
        dragSrc = null; buildList();
      });

      const handle = document.createElement('span'); handle.className = 'kb-status-handle'; handle.textContent = '⠿';

      // Color picker
      const colorWrap = document.createElement('span'); colorWrap.style.cssText='position:relative;display:inline-flex;';
      const colorDot = document.createElement('button'); colorDot.className='kb-status-color-btn';
      colorDot.style.background = s.color; colorDot.title = 'Changer la couleur';
      const colorPicker = document.createElement('input'); colorPicker.type='color'; colorPicker.value=s.color;
      colorPicker.style.cssText='position:absolute;opacity:0;width:0;height:0;top:0;left:0;';
      colorPicker.addEventListener('input', e => { s.color=e.target.value; colorDot.style.background=e.target.value; });
      colorDot.addEventListener('click', ()=>colorPicker.click());
      colorWrap.appendChild(colorDot); colorWrap.appendChild(colorPicker);

      const nameInput = document.createElement('input'); nameInput.className='kb-status-name-input';
      nameInput.value = s.label;
      nameInput.addEventListener('input', e => { s.label = e.target.value; });

      const delBtn = document.createElement('button'); delBtn.className='kb-status-del-btn'; delBtn.textContent='✕';
      delBtn.disabled = statuses.length <= 1;
      delBtn.addEventListener('click', () => {
        if (statuses.length <= 1) return;
        if (confirm(`Supprimer la colonne "${s.label}" ?`)) { statuses.splice(idx,1); buildList(); }
      });

      row.appendChild(handle); row.appendChild(colorWrap); row.appendChild(nameInput); row.appendChild(delBtn);
      list.appendChild(row);
    });

    const addBtn = document.createElement('button'); addBtn.className='kb-status-add-btn'; addBtn.textContent='＋ Ajouter un statut';
    addBtn.addEventListener('click', () => { statuses.push({id:kbUid(),label:'Nouveau',color:'#888888'}); buildList(); });
    list.appendChild(addBtn);
    mbd.appendChild(list);
  };

  buildList();

  const mft = document.createElement('div'); mft.className = 'kb-modal-ft';
  const cancelBtn = document.createElement('button'); cancelBtn.className='kb-btn-cancel'; cancelBtn.textContent='Annuler';
  cancelBtn.addEventListener('click', kbRemoveModal);
  const saveBtn = document.createElement('button'); saveBtn.className='kb-btn-save'; saveBtn.textContent='Enregistrer';
  saveBtn.addEventListener('click', () => { kbSaveStatuses(statuses); kbRemoveModal(); renderKanban(); });

  mft.appendChild(cancelBtn); mft.appendChild(saveBtn);
  modal.appendChild(mhd); modal.appendChild(mbd); modal.appendChild(mft);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('visible'));
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function kbMakeOverlay() {
  const o = document.createElement('div'); o.className='kb-modal-overlay'; o.id='kbModalOverlay';
  o.addEventListener('click', e => { if (e.target===o) kbRemoveModal(); });
  return o;
}
function kbCloseBtn() {
  const b = document.createElement('button'); b.className='kb-modal-close'; b.textContent='✕';
  b.addEventListener('click', kbRemoveModal); return b;
}
function kbRemoveModal() { const m=document.getElementById('kbModalOverlay'); if(m) m.remove(); }

// ── HOOK INTO HEADER BUTTON ───────────────────────────────────────────────────
document.getElementById('btnKanban').addEventListener('click', () => {
  // Hide all other views
  ['trackerView','kanbanView','scrollArea','monthView','weeklyView'].forEach(id => {
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  const sw = document.querySelector('.strip-wrapper'); if(sw) sw.style.display='none';
  document.querySelectorAll('.btn-view').forEach(b => b.classList.remove('active'));
  document.getElementById('btnKanban').classList.add('active');
  document.getElementById('kanbanView').style.display = 'flex';
  renderKanban();
});

// Patch switchView so kanban is hidden when switching to other views
const _kbOrigSwitchView = window.switchView;
window.switchView = function(mode) {
  const kv=document.getElementById('kanbanView'); if(kv) kv.style.display='none';
  _kbOrigSwitchView(mode);
};

</script>

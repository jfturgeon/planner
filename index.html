<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2d6bbf">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Planificateur Annuel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
:root {
  --bg: #f0ede6;
  --surface: #ffffff;
  --border: #ddd8cf;
  --text: #25231f;
  --muted: #8a8478;
  --accent: #c85a3a;
  --accent2: #2d6bbf;
  --today-bg: #fef3c7;
  --today-ring: #f59e0b;
  --weekend-bg: #fdf5f3;
  --weekend-num: #c85a3a;
  --col-w: 220px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  margin: 0;
  padding: 0;
  padding-bottom: 40px;
  display: flex;
  flex-direction: column;
}

/* HEADER */
/* ── HEADER ────────────────────────────────────────────────────────────── */
header {
  background: var(--text);
  color: #f4f1eb;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 16px rgba(0,0,0,.22);
  display: flex;
  flex-direction: column;
}

/* Top row */
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px; gap: 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.app-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.2rem; letter-spacing: .02em; white-space: nowrap;
  color: #f4f1eb;
  flex-shrink: 0;
}
.header-right {
  display: flex; align-items: center; gap: 16px; flex: 1; justify-content: flex-end;
}
.main-nav { display:flex; gap:4px; }

/* Sub row */
.header-sub { display: none; }
.sub-left  { display:flex; align-items:center; gap:4px; flex:1; }
.sub-right { display:flex; align-items:center; gap:8px; }

/* Nav buttons */
.sub-nav-btn {
  background: transparent; border: 1px solid rgba(255,255,255,.2); color: #ccc;
  border-radius: 5px; padding: 3px 8px; cursor: pointer;
  font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:500;
  transition: all .15s; white-space: nowrap; line-height:1.4;
}
.sub-nav-btn:hover { background:rgba(255,255,255,.12); color:#fff; }
.sub-today-btn { border-color:rgba(232,168,124,.5); color:#e8a87c; }
.sub-today-btn:hover { background:#e8a87c22; color:#e8a87c; }

/* Period label */
.sub-period-label {
  font-size:.78rem; color:rgba(255,255,255,.55); margin-left:6px;
  font-family:'DM Sans',sans-serif; white-space:nowrap;
}

/* Dropdowns */
.sub-dropdown-wrap { position: relative; }
.sub-dropdown-btn {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  color: #f4f1eb; border-radius: 7px; padding: 5px 11px;
  cursor: pointer; font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:600;
  transition: all .15s; white-space: nowrap; line-height:1;
}
.sub-dropdown-btn:hover { background:rgba(255,255,255,.18); border-color:rgba(255,255,255,.35); }
.sub-dd-arrow {
  width: 8px; height: 5px; flex-shrink:0; opacity:.6;
  transition: transform .15s;
}
.sub-dropdown-menu.open ~ .sub-dropdown-btn .sub-dd-arrow,
.sub-dropdown-btn:has(+ .sub-dropdown-menu.open) .sub-dd-arrow { transform: rotate(180deg); }

.sub-dropdown-menu {
  display:none; position:absolute; right:0; top:calc(100% + 5px);
  background:#2a2824; border:1px solid rgba(255,255,255,.15); border-radius:8px;
  box-shadow:0 6px 20px rgba(0,0,0,.4); min-width:140px; z-index:500;
  overflow:hidden; padding:4px 0;
}
.sub-dropdown-menu.open { display:block; animation: ddFadeIn .12s ease; }
@keyframes ddFadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

.sub-dd-item {
  padding: 8px 16px; font-size:.82rem; color:#d0cdc8;
  font-family:'DM Sans',sans-serif; cursor:pointer;
  transition: background .1s; white-space:nowrap;
}
.sub-dd-item:hover { background:rgba(255,255,255,.08); color:#fff; }
.sub-dd-item.active { color:#e8a87c; font-weight:600; }

/* Legacy hidden elements still referenced by old JS */
.sub-sep { display:none; }
.btn-subview { display:none; }
.year-display { display:none; }

/* Login and App Views */
#loginView {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--text) 0%, #3a3530 100%);
  min-height: calc(100vh - 40px);
  padding: 20px 20px 20px 20px;
  overflow-y: auto;
  overflow-x: hidden;
}

#appView {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 92px);
  background: var(--bg);
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
}

/* STICKY MONTH TABS STRIP */
.strip-wrapper {
  position:sticky; top:56px; z-index:150;
  background:var(--bg);
  border-bottom:2px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  overflow:hidden;
  height:36px;
}
.strip {
  display:flex;
  height:36px;
  will-change:transform;
  /* mirror the columns-wrap gap + padding */
  gap: calc(var(--col-w) / 7);
  padding-left: calc(var(--col-w) / 7);
}
.m-tab {
  flex:0 0 var(--col-w);
  padding:0 12px;
  font-family:'DM Serif Display',serif;
  font-size:.85rem; letter-spacing:.06em; text-transform:uppercase;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; border-right:1px solid rgba(0,0,0,.07);
  transition:filter .15s; user-select:none;
}
.m-tab:hover { filter:brightness(.94); }
.m-tab.active-tab { outline:2px solid rgba(0,0,0,.2); outline-offset:-2px; }
.task-badge {
  font-family:'DM Sans',sans-serif; font-size:.62rem; font-weight:700;
  background:rgba(0,0,0,.14); border-radius:20px; padding:1px 7px;
}
.m-0{background:#e8f0fb}.m-1{background:#fdeef6}.m-2{background:#e4f5ec}
.m-3{background:#fefce8}.m-4{background:#fef0e4}.m-5{background:#e8f6fd}
.m-6{background:#f2effe}.m-7{background:#fdecea}.m-8{background:#e4fbf5}
.m-9{background:#fefce8}.m-10{background:#fdeef6}.m-11{background:#e8f0fb}

/* SCROLL AREA */
.scroll-area {
  overflow-x:auto; overflow-y:auto;
  height:calc(100vh - 56px - 38px);
  scroll-behavior:smooth;
}
.scroll-area::-webkit-scrollbar { height:7px; width:7px; }
.scroll-area::-webkit-scrollbar-track { background:var(--bg); }
.scroll-area::-webkit-scrollbar-thumb { background:#c5bfb4; border-radius:4px; }


/* MONTH COLUMN */
.month-col {
  flex:0 0 var(--col-w);
  border-right:1px solid var(--border);
  background:var(--surface);
  padding: 0 0 8px;
}
.month-col:last-child { border-right:none; }

/* Gap between month columns = width of one day cell */
.columns-wrap {
  display:flex; align-items:flex-start;
  min-height:100%;
  gap: calc(var(--col-w) / 7);
  padding: 0 calc(var(--col-w) / 7);
  background: var(--bg);
}

/* DOW header row */
.dow-row {
  display:grid; grid-template-columns:repeat(7,1fr);
  background: var(--mc-we-bg, #f5f2ec);
  border-bottom:1px solid rgba(0,0,0,.08);
  position:sticky; top:0; z-index:5;
}
.dow-lbl {
  text-align:center; padding:4px 1px;
  font-size:.6rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.05em; color:var(--muted);
}
.dow-lbl.we { color:var(--accent); }

/* Mini calendar */
.mini-cal {
  display:grid; grid-template-columns:repeat(7,1fr);
  border-bottom:1px solid var(--border);
}
.dc {
  aspect-ratio:1;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  cursor:pointer;
  border-right:1px solid rgba(0,0,0,.06); border-bottom:1px solid rgba(0,0,0,.06);
  padding:2px 1px; transition:background .12s; min-width:0;
  background: var(--mc-bg, #f8f6f2);
}
.dc:hover { filter: brightness(.94); }
.dc.empty { cursor:default; background: var(--mc-empty, #f5f3ef) !important; }
.dc.we-day { background: var(--mc-we-bg, #f0ede6); }
.dc.is-today { background: #fde68a !important; outline:2px solid #f59e0b; outline-offset:-2px; }
.dc.has-data { background: var(--mc-data-bg, #d4e4f7); }
.dc.we-day.has-data { background: var(--mc-we-data-bg, #f0d4cc); }
.dc.is-today.has-data { background: #fde68a !important; }
.dc-num { font-size:.62rem; font-weight:600; color: var(--mc-text, var(--muted)); line-height:1.5; }
.dc.we-day .dc-num { color: var(--mc-we-text, var(--accent)); font-weight:700; }
.dc.is-today .dc-num { color:#92400e; font-weight:800; }
.dc-dots { display:flex; flex-wrap:wrap; justify-content:center; gap:1px; padding:0 1px; }
.dot { width:4px; height:4px; border-radius:50%; background: var(--mc-text, var(--accent2)); flex-shrink:0; opacity:.6; }
.dot.done { background:#6ee7b7; opacity:1; }

/* DOW header row — match month color */
.dow-lbl { color: var(--mc-text, var(--muted)); }
.dow-lbl.we { color: var(--mc-we-text, var(--accent)); font-weight:800; }
.dot.urgent { background:var(--accent); }

/* Day list */
/* ── ANNUAL VIEW — day list (screenshot style) ─────────────────────────── */
.ann-row {
  display: grid;
  grid-template-columns: 22px 16px 1fr;
  align-items: center;
  gap: 0;
  padding: 2px 6px 2px 4px;
  min-height: 24px;
  border-bottom: 1px solid rgba(0,0,0,.06);
  cursor: text;
  transition: filter .1s;
}
.ann-row:hover { filter: brightness(.93); }
.ann-num {
  font-family: 'DM Serif Display', serif;
  font-size: .82rem;
  text-align: right;
  padding-right: 4px;
  line-height: 1;
}
.ann-dow {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .03em;
  text-align: center;
  opacity: .75;
}
.ann-label {
  font-size: .75rem;
  padding-left: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-height: 18px;
  line-height: 1.8;
}
.ann-row:hover .ann-label { color: inherit !important; }
.ann-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: .75rem;
  padding: 0;
}

.day-row {
  display:flex; gap:8px; align-items:flex-start;
  padding:5px 7px; border-bottom:1px solid #f0ede6;
  cursor:pointer; transition:background .12s; min-height:34px;
}
.day-row:hover { background:#faf8f4; }
.day-row.we-row { background:var(--weekend-bg); }
.day-row.we-row:hover { background:#f5e9e6; }
.day-row.today-row { background:var(--today-bg); border-left:3px solid var(--today-ring); }
.day-row.has-data { background:#e8e4dc; }
.day-row.has-data:hover { background:#dedad1; }
.day-row.we-row.has-data { background:#e4d8d4; }
.day-row.we-row.has-data:hover { background:#daced0; }
.day-row.today-row.has-data { background:#fde89a; }
.dr-left { display:flex; flex-direction:column; align-items:center; min-width:26px; flex-shrink:0; }
.dr-dayname { font-size:.56rem; font-weight:700; text-transform:uppercase; color:var(--muted); letter-spacing:.04em; }
.dr-num { font-size:.9rem; font-family:'DM Serif Display',serif; line-height:1.15; }
.day-row.we-row .dr-num, .day-row.we-row .dr-dayname { color:var(--accent); }
.day-row.today-row .dr-num { color:var(--today-ring); }
.dr-content { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; padding-top:2px; }
.dr-empty { font-size:.67rem; color:#ccc; font-style:italic; }
.dr-note { font-size:.68rem; color:#888; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dr-task {
  font-size:.68rem; padding:2px 5px; border-radius:3px;
  border-left:2px solid var(--accent2); background:#eef3ff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.dr-task.done   { text-decoration:line-through; color:var(--muted); background:#f0fdf4; border-left-color:#6ee7b7; }
.dr-task.urgent { background:#fff0ee; border-left-color:var(--accent); }

/* MODAL */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.5); z-index:500;
  align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
.overlay.open { display:flex; }
.modal {
  background:var(--surface); border-radius:16px;
  width:min(520px,95vw); max-height:88vh; overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.3);
  animation:mIn .2s ease;
}
@keyframes mIn { from{opacity:0;transform:translateY(14px) scale(.97)} to{opacity:1;transform:none} }
.modal-hd {
  padding:16px 18px 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; background:var(--surface); z-index:2;
  border-radius:16px 16px 0 0;
}
.modal-hd h2 { font-family:'DM Serif Display',serif; font-size:1.2rem; }
.btn-x {
  background:none; border:none; cursor:pointer;
  font-size:1.3rem; color:var(--muted); padding:2px 7px; border-radius:6px;
  transition:background .15s; line-height:1;
}
.btn-x:hover { background:#f0ede6; }
.modal-bd { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.sec-label { font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:5px; }
textarea.notes-ta {
  width:100%; border:1px solid var(--border); border-radius:8px;
  padding:9px 12px; font-family:'DM Sans',sans-serif; font-size:.85rem;
  resize:vertical; min-height:65px; background:#fafaf8; color:var(--text);
  transition:border .15s;
}
textarea.notes-ta:focus { outline:none; border-color:var(--accent2); }
.task-add-row { display:flex; gap:7px; }
.task-add-row input[type=text] {
  flex:1; border:1px solid var(--border); border-radius:8px;
  padding:8px 11px; font-family:'DM Sans',sans-serif; font-size:.84rem;
  background:#fafaf8; color:var(--text); transition:border .15s;
}
.task-add-row input[type=text]:focus { outline:none; border-color:var(--accent2); }
.task-add-row select {
  border:1px solid var(--border); border-radius:8px;
  padding:8px 7px; font-family:'DM Sans',sans-serif; font-size:.8rem;
  background:#fafaf8; color:var(--text); cursor:pointer;
}
.btn-plus {
  background:var(--accent2); color:#fff; border:none; border-radius:8px;
  padding:8px 14px; font-size:.88rem; font-weight:700; cursor:pointer;
  transition:background .15s;
}
.btn-plus:hover { background:#2258a0; }
.task-items { display:flex; flex-direction:column; gap:5px; margin-top:8px; }
.ti {
  display:flex; align-items:center; gap:8px;
  background:#f7f5f0; border-radius:8px; padding:7px 10px;
  border-left:3px solid var(--accent2);
}
.ti.done   { background:#f0fdf4; border-left-color:#6ee7b7; }
.ti.urgent { background:#fff0ee; border-left-color:var(--accent); }
.ti input[type=checkbox] { width:14px; height:14px; cursor:pointer; flex-shrink:0; }
.ti .ti-text { flex:1; font-size:.83rem; }
.ti.done .ti-text { text-decoration:line-through; color:var(--muted); }
.p-badge {
  font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
  padding:1px 5px; border-radius:4px; flex-shrink:0;
}
.p-badge.normal { background:#deeeff; color:var(--accent2); }
.p-badge.urgent { background:#ffddd8; color:var(--accent); }
.p-badge.low    { background:#dcfce7; color:#166534; }
.btn-del-t {
  background:none; border:none; cursor:pointer;
  color:#ccc; font-size:.95rem; border-radius:4px; padding:0 3px; transition:color .15s;
}
.btn-del-t:hover { color:var(--accent); }
.modal-ft {
  padding:10px 18px 16px; display:flex; justify-content:flex-end; gap:8px;
  border-top:1px solid var(--border);
}
.btn-save {
  background:var(--text); color:#f4f1eb; border:none; border-radius:8px;
  padding:8px 20px; font-family:'DM Sans',sans-serif; font-weight:600;
  font-size:.86rem; cursor:pointer; transition:background .15s;
}
.btn-save:hover { background:#444; }
.btn-cancel {
  background:transparent; border:1px solid var(--border); border-radius:8px;
  padding:8px 14px; font-family:'DM Sans',sans-serif; font-size:.86rem;
  cursor:pointer; color:var(--muted); transition:all .15s;
}
.btn-cancel:hover { background:#f0ede6; }

/* ── VIEW TOGGLE BUTTONS ── */
.view-toggle { display:flex; gap:4px; }
.btn-view {
  background:transparent; border:1px solid #555; color:#aaa;
  border-radius:6px; padding:4px 12px; font-family:'DM Sans',sans-serif;
  font-size:.78rem; font-weight:600; cursor:pointer; transition:all .15s;
  letter-spacing:.03em;
}
.btn-view.active { background:#e8a87c; color:#25231f; border-color:#e8a87c; }
.btn-view:hover:not(.active) { background:#3d3a35; color:#f4f1eb; }

/* ── MONTH VIEW ── */
#monthView {
  padding: 20px 24px;
  min-height: calc(100vh - 56px - 38px);
  background: var(--bg);
}
.mv-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px; max-width:1100px; margin-left:auto; margin-right:auto;
}
.mv-title {
  font-family:'DM Serif Display',serif; font-size:1.6rem; letter-spacing:.04em;
}
.mv-title span { color:var(--accent); margin-left:8px; font-size:1.1rem; }
.mv-nav-btns { display:flex; gap:6px; }
.mv-nav-btn {
  background:var(--surface); border:1px solid var(--border); border-radius:6px;
  padding:6px 14px; font-size:.8rem; cursor:pointer; color:var(--text);
  font-family:'DM Sans',sans-serif; font-weight:500; transition:all .15s;
}
.mv-nav-btn:hover { background:var(--text); color:#f4f1eb; }
.mv-nav-btn.today-btn { background:var(--accent); color:#fff; border-color:var(--accent); }

.mv-body {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  max-width:1100px; margin:0 auto;
}
@media(max-width:760px){ .mv-body { grid-template-columns:1fr; } }

/* Big calendar */
.mv-cal-wrap {
  background:var(--surface); border-radius:14px;
  border:1px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,.07);
  overflow:hidden;
}
.mv-dow-row {
  display:grid; grid-template-columns:repeat(7,1fr);
  background:#f5f2ec; border-bottom:1px solid var(--border);
}
.mv-dow-lbl {
  text-align:center; padding:8px 2px;
  font-size:.72rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
}
.mv-dow-lbl.we { color:var(--accent); }
.mv-cal-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
}
.mv-dc {
  min-height:80px; padding:6px 8px;
  border-right:1px solid #f0ede6; border-bottom:1px solid #f0ede6;
  cursor:pointer; transition:background .12s; position:relative;
  display:flex; flex-direction:column;
}
.mv-dc:hover { background:#faf8f4; }
.mv-dc.mv-empty { cursor:default; background:#fafafa; }
.mv-dc.mv-we { background:var(--weekend-bg); }
.mv-dc.mv-we:hover { background:#f5e9e6; }
.mv-dc.mv-today { background:var(--today-bg) !important; outline:2px solid var(--today-ring); outline-offset:-2px; }
.mv-dc.mv-has-data { background:#e8f0fb; }
.mv-dc.mv-we.mv-has-data { background:#f5e0da; }
.mv-dc-num {
  font-size:.8rem; font-weight:700; color:var(--muted);
  line-height:1; margin-bottom:4px;
}
.mv-dc.mv-we .mv-dc-num { color:var(--accent); }
.mv-dc.mv-today .mv-dc-num { color:var(--today-ring); }
.mv-dc-tasks { display:flex; flex-direction:column; gap:2px; flex:1; }
.mv-dc-task {
  font-size:.65rem; padding:1px 5px;
  border-radius:3px; border-left:2px solid var(--accent2);
  background:#e8f0ff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  line-height:1.4;
}
.mv-dc-task.done { text-decoration:line-through; color:var(--muted); background:#f0fdf4; border-left-color:#6ee7b7; }
.mv-dc-task.urgent { background:#fff0ee; border-left-color:var(--accent); }
.mv-dc-note { font-size:.63rem; color:#999; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mv-dc-more { font-size:.62rem; color:var(--accent2); font-weight:600; margin-top:1px; }

/* Day list panel */
.mv-list-wrap {
  background:var(--surface); border-radius:14px;
  border:1px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,.07);

}
.mv-list-wrap::-webkit-scrollbar { width:5px; }
.mv-list-wrap::-webkit-scrollbar-thumb { background:#c5bfb4; border-radius:4px; }
.mv-list-hd {
  padding:12px 16px 10px; font-family:'DM Serif Display',serif;
  font-size:.95rem; letter-spacing:.06em; text-transform:uppercase;
  border-bottom:1px solid var(--border); background:var(--surface);
  position:sticky; top:0; z-index:2;
}
.mv-list-row {
  display:flex; gap:10px; align-items:flex-start;

  cursor:pointer; transition:background .12s; min-height:38px;
}
.mv-list-row:hover { background:#faf8f4; }
.mv-list-row.mv-lr-we { background:var(--weekend-bg); }
.mv-list-row.mv-lr-we:hover { background:#f5e9e6; }
.mv-list-row.mv-lr-today { background:var(--today-bg); border-left:3px solid var(--today-ring); }
.mv-list-row.mv-lr-data { background:#eef4fd; }
.mv-list-row.mv-lr-we.mv-lr-data { background:#f5e2dc; }
.mv-lr-left { display:flex; flex-direction:column; align-items:center; min-width:30px; flex-shrink:0; }
.mv-lr-dname { font-size:.58rem; font-weight:700; text-transform:uppercase; color:var(--muted); letter-spacing:.04em; }
.mv-lr-dnum  { font-size:1rem; font-family:'DM Serif Display',serif; line-height:1.15; }
.mv-list-row.mv-lr-we .mv-lr-dnum, .mv-list-row.mv-lr-we .mv-lr-dname { color:var(--accent); }
.mv-list-row.mv-lr-today .mv-lr-dnum { color:var(--today-ring); }
.mv-lr-content { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; padding-top:2px; }
.mv-lr-empty { font-size:.7rem; color:#ccc; font-style:italic; }
.mv-lr-note  { font-size:.7rem; color:#888; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mv-lr-task  {
  font-size:.72rem; padding:2px 6px; border-radius:3px;
  border-left:2px solid var(--accent2); background:#eef3ff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.mv-lr-task.done   { text-decoration:line-through; color:var(--muted); background:#f0fdf4; border-left-color:#6ee7b7; }
.mv-lr-task.urgent { background:#fff0ee; border-left-color:var(--accent); }

#weeklyView {
  padding: 12px 16px;
  min-height: calc(100vh - 56px);
  background: var(--bg);
}
.wv-layout {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 16px;
  max-width: 2200px;
  margin: 0 auto;
  align-items: start;
}
.wv-left {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 480px;
  flex-shrink: 0;
}
.wv-cals-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* Right panel - day columns */
.wv-right { overflow-x: auto; min-width: 0; }
.wv-right::-webkit-scrollbar { height:6px; }
.wv-right::-webkit-scrollbar-thumb { background:#c5bfb4; border-radius:4px; }

.wv-days-strip {
  display: grid;
  grid-template-columns: repeat(7, minmax(280px, 1fr));
  gap: 8px;
  min-width: max-content;
  width: 100%;
}
}
.wv-day-col {
  min-width: 0; display:flex; flex-direction:column; gap:12px;
}

.wv-card {
  background: var(--surface);
  border-radius:12px;
  border:1px solid var(--border);
  box-shadow:0 1px 6px rgba(0,0,0,.06);
  overflow:hidden;
}
.wv-card-hd {
  padding:8px 14px 7px;
  font-family:'DM Serif Display',serif;
  font-size:.85rem; letter-spacing:.08em; text-transform:uppercase;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.wv-card-hd-nav {
  display:flex; gap:4px;
}
.wv-card-hd-nav button {
  background:none; border:1px solid var(--border); border-radius:4px;
  width:22px; height:22px; cursor:pointer; font-size:.85rem;
  color:var(--muted); display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.wv-card-hd-nav button:hover { background:var(--text); color:#f4f1eb; border-color:var(--text); }

/* Mini month calendars in left panel */
.wv-mini-cal { padding:10px 10px 8px; }
.wv-mini-cal .mc-title {
  text-align:center; font-family:'DM Serif Display',serif;
  font-size:.8rem; letter-spacing:.06em; text-transform:uppercase;
  margin-bottom:6px; color:var(--text);
}
.wv-mini-cal .mc-grid {
  display:grid; grid-template-columns:repeat(7,1fr); gap:1px;
}
.wv-mini-cal .mc-dow {
  text-align:center; font-size:.58rem; font-weight:700;
  color:var(--muted); padding:2px 0; text-transform:uppercase;
}
.wv-mini-cal .mc-dow.we { color:var(--accent); }
.wv-mini-cal .mc-day {
  text-align:center; font-size:.68rem; padding:3px 1px;
  border-radius:4px; cursor:pointer; color:var(--muted);
  transition:background .12s;
}
.wv-mini-cal .mc-day:hover { background:#f0ede6; }
.wv-mini-cal .mc-day.mc-we { color:var(--accent); }
.wv-mini-cal .mc-day.mc-today { background:var(--today-ring); color:#fff; font-weight:700; }
.wv-mini-cal .mc-day.mc-in-week { background:#e8e4dc; font-weight:600; color:var(--text); }
.wv-mini-cal .mc-day.mc-in-week.mc-we { background:#f0d8d2; }
.wv-mini-cal .mc-day.mc-hover-week { background:#c8d8f0 !important; color:var(--text) !important; cursor:pointer; }
.wv-mini-cal .mc-day.mc-hover-week.mc-we { background:#e0c8c2 !important; }

/* Colored checkboxes for habits - colored border even when unchecked */
.wv-habit-cb { display:flex; justify-content:center; align-items:center; }
.wv-habit-cb input[type=checkbox] {
  appearance: none; -webkit-appearance: none;
  width: 15px; height: 15px; border-radius: 3px; cursor: pointer;
  border: 2px solid var(--cb-color, #aaa);
  background: white; position: relative; flex-shrink:0;
  transition: background .15s;
}
.wv-habit-cb input[type=checkbox]:checked {
  background: var(--cb-color, #aaa);
  border-color: var(--cb-color, #aaa);
}
.wv-habit-cb input[type=checkbox]:checked::after {
  content: ''; position:absolute; left:3px; top:0px;
  width:5px; height:9px;
  border: 2px solid white; border-top:none; border-left:none;
  transform: rotate(45deg);
}
/* Habits body padding */
.wv-habits-body { padding: 8px 14px 12px; }

.wv-habits-header-row {
  display:grid;
  grid-template-columns: 1fr repeat(7, 24px) 20px;
  align-items:center;
  font-size:.62rem; font-weight:700;
  color:var(--muted); text-transform:uppercase; letter-spacing:.04em;
  margin-bottom:2px; padding-bottom:4px;
  border-bottom:1px solid var(--border);
}
.wv-habits-header-row span { text-align:center; }
.wv-habits-header-row .col-name { text-align:left; font-size:.65rem; }
.wv-habit-row {
  display:grid;
  grid-template-columns: 1fr repeat(7, 24px) 20px;
  align-items:center;
  padding:4px 0; border-bottom:1px solid #f0ede6;
}
.wv-habit-row:last-child { border-bottom:none; }
.wv-habit-name { font-size:.76rem; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:4px; }
.wv-habit-cb { display:flex; justify-content:center; align-items:center; }
.wv-habit-cb input { cursor:pointer; width:14px; height:14px; }
.wv-habit-add { display:flex; gap:6px; margin-top:10px; }
.wv-habit-add input {
  flex:1; border:1px solid var(--border); border-radius:6px;
  padding:6px 10px; font-family:'DM Sans',sans-serif; font-size:.78rem;
  background:#fafaf8; color:var(--text);
}
.wv-habit-add input:focus { outline:none; border-color:var(--accent2); }
.wv-habit-add button {
  background:var(--accent2); color:#fff; border:none; border-radius:6px;
  padding:6px 12px; font-size:.82rem; font-weight:700; cursor:pointer;
}

/* Weekly todo */
.wv-todo-body { padding:10px 14px 12px; }
.wv-todo-item {
  display:flex; align-items:center; gap:8px;
  padding:5px 0; border-bottom:1px solid #f0ede6;
}
.wv-todo-item:last-child { border-bottom:none; }
.wv-todo-item input[type=checkbox] { width:15px; height:15px; cursor:pointer; flex-shrink:0; }
.wv-todo-text { flex:1; font-size:.82rem; }
.wv-todo-item.done .wv-todo-text { text-decoration:line-through; color:var(--muted); }
.wv-todo-del { background:none; border:none; cursor:pointer; color:#ccc; font-size:.85rem; padding:0 2px; }
.wv-todo-del:hover { color:var(--accent); }
.wv-todo-add { display:flex; gap:6px; margin-top:10px; }
.wv-todo-add input {
  flex:1; border:1px solid var(--border); border-radius:6px;
  padding:6px 10px; font-family:'DM Sans',sans-serif; font-size:.78rem;
  background:#fafaf8; color:var(--text);
}
.wv-todo-add input:focus { outline:none; border-color:var(--accent2); }
.wv-todo-add button {
  background:var(--accent2); color:#fff; border:none; border-radius:6px;
  padding:6px 12px; font-size:.82rem; font-weight:700; cursor:pointer;
}



.wv-day-hd .wdn { font-size:.7rem; }

.wv-day-section {
  background:var(--surface); border-radius:8px;
  border:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.05);
  overflow:hidden;
}
.wv-sec-title {
  padding:7px 12px 5px;
  font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); background:#f7f5f0; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.wv-sec-add-btn {
  background:none; border:none; cursor:pointer; color:var(--accent2);
  font-size:.9rem; font-weight:700; line-height:1; padding:0 2px;
  transition:color .15s;
}
.wv-sec-add-btn:hover { color:#1a4e8a; }

/* Events */
.wv-event-item {
  display:flex; gap:8px; align-items:flex-start;
  padding:6px 12px; border-bottom:1px solid #f5f2ec;
  font-size:.8rem;
}
.wv-event-item:last-child { border-bottom:none; }
.wv-event-time { color:var(--accent2); font-weight:600; min-width:46px; flex-shrink:0; font-size:.75rem; margin-top:1px; }
.wv-event-title { flex:1; color:var(--text); line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.wv-event-del { background:none; border:none; cursor:pointer; color:#ddd; font-size:.8rem; padding:0; }
.wv-event-del:hover { color:var(--accent); }
.wv-event-empty { padding:9px 12px; font-size:.76rem; color:#ccc; font-style:italic; }

/* Day tasks in weekly view */
.wv-task-item {
  display:flex; align-items:center; gap:8px;
  padding:6px 12px; border-bottom:1px solid #f5f2ec;
  font-size:.8rem;
}
.wv-task-item:last-child { border-bottom:none; }
.wv-task-item input[type=checkbox] { width:14px; height:14px; cursor:pointer; flex-shrink:0; }
.wv-task-text { flex:1; line-height:1.3; }
.wv-task-item.done .wv-task-text { text-decoration:line-through; color:var(--muted); }
.wv-task-del { background:none; border:none; cursor:pointer; color:#ddd; font-size:.8rem; padding:0; }
.wv-task-del:hover { color:var(--accent); }
.wv-task-empty { padding:9px 12px; font-size:.76rem; color:#ccc; font-style:italic; }

/* Inline add forms */
.wv-inline-form {
  display:flex; gap:6px; padding:7px 10px;
  border-top:1px solid #f0ede6; background:#fafaf8;
}
.wv-inline-form input {
  flex:1; border:1px solid var(--border); border-radius:6px;
  padding:6px 9px; font-size:.78rem; font-family:'DM Sans',sans-serif;
  background:#fff; color:var(--text);
}
.wv-inline-form input:focus { outline:none; border-color:var(--accent2); }
.wv-inline-form .time-in { flex:0 0 60px; }
.wv-inline-form button {
  background:var(--accent2); color:#fff; border:none; border-radius:6px;
  padding:6px 11px; font-size:.82rem; font-weight:700; cursor:pointer;
}

/* Week nav */
.wv-week-nav {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.wv-week-label-wrap {
  display:flex; align-items:center; gap:8px;
}
.wv-week-label {
  font-family:'DM Serif Display',serif; font-size:1.1rem; color:var(--text);
}
.wv-nav-btns { display:flex; gap:6px; }
.wv-nav-btn {
  background:var(--surface); border:1px solid var(--border); border-radius:6px;
  padding:5px 12px; font-size:.8rem; cursor:pointer; color:var(--text);
  font-family:'DM Sans',sans-serif; transition:all .15s;
}
.wv-nav-btn:hover { background:var(--text); color:#f4f1eb; }
.wv-nav-btn.today-btn { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Drag & drop task rows */
.wv-task-row[draggable="true"] { cursor:grab; }
.wv-task-row[draggable="true"]:active { cursor:grabbing; }
.wv-task-row.wv-drag-active { opacity:.4; }
.wv-task-scroll.wv-drop-target {
  background: rgba(124,185,232,.12);
  outline: 2px dashed var(--accent2);
  border-radius: 4px;
}

/* ── DAY COLOR PALETTE ── */
:root {
  --day0: #e8a87c; --day1: #7cb9e8; --day2: #8dd4a0;
  --day3: #c4a8e8; --day4: #e8d47c; --day5: #e889b8; --day6: #7ce8d4;
}
.wv-day-hd { background:var(--text); color:#f4f1eb; border-radius:10px 10px 0 0; padding:12px 14px 10px; text-align:center; }
.wv-day-hd.dc-0 { background:linear-gradient(135deg,#c97a40,var(--day0)); }
.wv-day-hd.dc-1 { background:linear-gradient(135deg,#2d6bbf,var(--day1)); }
.wv-day-hd.dc-2 { background:linear-gradient(135deg,#2e8a50,var(--day2)); }
.wv-day-hd.dc-3 { background:linear-gradient(135deg,#6a38bf,var(--day3)); }
.wv-day-hd.dc-4 { background:linear-gradient(135deg,#a8880a,var(--day4)); color:#333; }
.wv-day-hd.dc-5 { background:linear-gradient(135deg,#bf2d78,var(--day5)); }
.wv-day-hd.dc-6 { background:linear-gradient(135deg,#1a9e8a,var(--day6)); color:#333; }
.wv-day-hd.today-hd { background:linear-gradient(135deg,#c85a3a,#e8834a) !important; color:#f4f1eb !important; }
/* Current day focus styling */
.wv-day-col.today { border-left:4px solid #e8834a; padding-left:8px; }
.wv-day-hd .wdn { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; opacity:.75; }
.wv-day-hd .wdd { font-family:'DM Serif Display',serif; font-size:1.5rem; line-height:1.1; }
.wv-day-hd .wdm { font-size:.72rem; opacity:.7; }

/* ── EDITABLE ROWS ── */
.wv-event-row, .wv-task-row {
  display:flex; align-items:center; gap:6px;
  padding:4px 10px; border-bottom:1px solid #f2efea;
  min-height:30px; cursor:text; transition:background .1s;
}
.wv-event-row:hover, .wv-task-row:hover { background:#f8f6f2; }
.wv-row-time { font-size:.75rem; font-weight:600; color:var(--accent2); min-width:58px; flex-shrink:0; cursor:pointer; }
.wv-row-time.empty { color:#ddd; font-weight:400; cursor:text; }
.wv-row-label { flex:1; font-size:.77rem; color:var(--text); min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wv-row-label.empty { color:#d0ccc6; font-style:italic; }
.wv-row-cb { flex-shrink:0; }
.wv-row-del { background:none; border:none; cursor:pointer; color:transparent; font-size:.7rem; padding:0 2px; flex-shrink:0; }
.wv-event-row:hover .wv-row-del, .wv-task-row:hover .wv-row-del { color:#ccc; }
.wv-row-del:hover { color:var(--accent) !important; }
.wv-task-row.done .wv-row-label { text-decoration:line-through; color:var(--muted); }
/* Inline edit */
.wv-row-edit-input {
  flex:1; border:none; border-bottom:2px solid var(--accent2);
  background:transparent; font-family:'DM Sans',sans-serif;
  font-size:.77rem; color:var(--text); outline:none; padding:1px 2px;
}
.wv-row-time-edit {
  width:90px; flex-shrink:0; border:none; border-bottom:2px solid var(--accent2);
  background:transparent; font-family:'DM Sans',sans-serif;
  font-size:.75rem; font-weight:600; color:var(--accent2); outline:none; padding:1px 2px;
}

/* ── EPISODE TRACKER ── */
.btn-tracker { background:#1a3a5c !important; border-color:#2d6bbf !important; color:#7cb9e8 !important; }
.btn-tracker.active { background:#2d6bbf !important; color:#fff !important; }

#calendarsView {
  display: flex !important;
  flex-direction: column;
  height: 100vh;
}

#trackerView {
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
  height: calc(100vh - 56px);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.tr-header {
  display: flex; align-items: center; justify-content: space-between;

}
.tr-tab {

.tr-content { display: flex; gap: 16px; flex: 1; min-height: 0; overflow: hidden; }

.tr-seasons {

  transition: background .1s;
}
.kb-status-row.drag-over { background: #e8f0ff; border-color: var(--accent); }
.kb-status-row.dragging  { opacity: .4; }

.kb-status-handle {
  color: var(--muted);
  font-size: 1rem;
  cursor: grab;
  flex-shrink: 0;
}

.kb-status-color-btn {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,.15);
  cursor: pointer;
  flex-shrink: 0;
  transition: transform .12s;
  position: relative;
}
.kb-status-color-btn:hover { transform: scale(1.15); }

.kb-status-name-input {
  flex: 1;
  padding: 5px 9px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: .83rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
}
.kb-status-name-input:focus { border-color: var(--accent); }

.kb-status-del-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: .8rem;
  flex-shrink: 0;
  transition: all .12s;
}
.kb-status-del-btn:hover { background: #fde8e8; color: #c0392b; }
.kb-status-del-btn:disabled { opacity: .3; cursor: not-allowed; }

.kb-status-add-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: .8rem;
  cursor: pointer;
  width: 100%;
  transition: all .15s;
  margin-top: 4px;
}
.kb-status-add-btn:hover { border-color: var(--accent); color: var(--accent); }

.hdr-btn-contacts {
  padding:5px 10px; border-radius:6px; font-size:.75rem; font-weight:600;
  font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .15s; white-space:nowrap;
  background:#3d3a35; border:1px solid #7a5c3a; color:#c89060;
}
.hdr-btn-contacts:hover { background:#7a5c3a; color:#fff; }

/* Birthday rows in event list */
.ct-bday-row { cursor:default !important; }
.ct-bday-row .wv-row-label { font-style:normal; }

/* ── EVENT LIST SCROLLABLE ── */
.wv-ev-scroll {
  max-height: calc(6 * 30px);
  overflow-y: auto;
  overflow-x: hidden;
}
.wv-ev-scroll::-webkit-scrollbar { width:4px; }
.wv-ev-scroll::-webkit-scrollbar-thumb { background:#d4cfc8; border-radius:2px; }

/* ── TASK LIST SCROLLABLE ── */
.wv-task-scroll {
  max-height: calc(25 * 30px);
  overflow-y: auto;
  overflow-x: hidden;
}
.wv-task-scroll::-webkit-scrollbar { width:4px; }
.wv-task-scroll::-webkit-scrollbar-thumb { background:#d4cfc8; border-radius:2px; }

/* ── ALL-DAY TOGGLE IN EVENT EDIT ── */
.wv-row-time-edit[style*="display: none"],
.wv-row-time-edit[style*="display:none"] { display:none !important; }

/* ── TOGGLE LEFT PANEL BUTTON ── */
.wv-toggle-left-btn {
  font-size:.85rem; color:var(--muted);
  min-width:28px; padding:5px 8px;
  border-radius:6px;
}
.wv-toggle-left-btn.active { background:var(--text); color:#f4f1eb; }

/* ── KANBAN ADDITIONS ── */

/* + button in column header */
.kb-col-add-btn {
  margin-left:auto;
  width:26px; height:26px;
  border-radius:7px;
  border:1px solid var(--col-color, #aaa);
  background:transparent;
  color:var(--col-color, #aaa);
  font-size:1rem; font-weight:700;
  cursor:pointer; line-height:1;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
}
.kb-col-add-btn:hover {
  background:var(--col-color, #aaa);
  color:#fff;
}

/* Completion progress bar */
.kb-progress-wrap {
  display:flex; align-items:center; gap:10px;
  padding:0 4px;
}
.kb-progress-label {
  font-family:'DM Sans',sans-serif;
  font-size:.75rem; font-weight:600;
  color:var(--muted); white-space:nowrap;
  min-width:80px;
}
.kb-progress-track {
  width:120px; height:6px;
  background:var(--border);
  border-radius:3px; overflow:hidden;
}
.kb-progress-fill {
  height:100%; border-radius:3px;
  transition:width .3s ease;
}

/* Compact card */
.kb-card-compact {
  padding:7px 12px;
  flex-direction:row;
  align-items:center;
  gap:8px;
}
.kb-card-compact .kb-card-title {
  font-size:.82rem; font-weight:500;
  flex:1; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.kb-card-compact .kb-card-actions {
  opacity:0; flex-shrink:0;
}
.kb-card-compact:hover .kb-card-actions { opacity:1; }

/* Card actions no longer in a footer — inline at bottom */
.kb-card .kb-card-actions {
  display:flex; gap:4px;
  opacity:0; transition:opacity .15s;
  justify-content:flex-end;
  margin-top:4px;
}
.kb-card:hover .kb-card-actions { opacity:1; }

/* Compact board columns slightly narrower */
.kb-board-compact .kb-col { min-width:300px; max-width:300px; }

/* ═══════════════════════════════════════════════════════
   CONTACTS TAB VIEW
   ═══════════════════════════════════════════════════════ */

#contactsView {
  flex-direction: column;
  padding: 24px 28px;
  height: calc(100vh - 56px);
  overflow: hidden;
  box-sizing: border-box;
}

.ct-view { display:flex; flex-direction:column; gap:16px; height:100%; }

/* Toolbar */
.ct-toolbar {
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.ct-view-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem; color: var(--text);
  white-space: nowrap;
}
.ct-search-wrap { position: relative; }
.ct-search-input {
  width: 260px; padding: 7px 12px;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: .85rem;
  background: var(--surface); color: var(--text);
  outline: none; transition: border-color .15s;
}
.ct-search-input:focus { border-color: var(--accent2); }
.ct-add-btn {
  padding: 7px 16px; border-radius: 8px;
  background: var(--accent2); color: #fff;
  border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem; font-weight: 600;
  white-space: nowrap; transition: opacity .15s;
}
.ct-add-btn:hover { opacity: .85; }

/* Table */
.ct-table-wrap {
  flex: 1; overflow-y: auto; overflow-x: auto;
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--surface);
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
}
.ct-table-wrap::-webkit-scrollbar { width: 5px; height: 5px; }
.ct-table-wrap::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

.ct-table {
  width: 100%; border-collapse: collapse;
  font-family: 'DM Sans', sans-serif; font-size: .83rem;
}
.ct-th {
  padding: 10px 14px; text-align: left;
  font-size: .72rem; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); background: #f7f5f0;
  border-bottom: 2px solid var(--border);
  white-space: nowrap; position: sticky; top: 0; z-index: 1;
}
.ct-th-sort { cursor: pointer; user-select: none; }
.ct-th-sort:hover { color: var(--accent2); }
.ct-sort-icon { font-size: .65rem; margin-left: 4px; opacity: .6; }

.ct-tr { border-bottom: 1px solid #f0ede6; transition: background .1s; }
.ct-tr:last-child { border-bottom: none; }
.ct-tr:hover { background: #faf8f4; }
.ct-tr-deceased { opacity: .7; }
.ct-tr-deceased:hover { background: #f5f0ea; }

.ct-td {
  padding: 9px 14px; color: var(--text);
  vertical-align: middle; white-space: nowrap;
}
.ct-td-actions {
  display: flex; gap: 6px; align-items: center;
  justify-content: flex-end; padding-right: 12px;
}
.ct-age { font-size: .72rem; color: var(--muted); }
.ct-empty { padding: 32px; text-align: center; color: var(--muted); font-style: italic; }

.ct-row-btn {
  background: none; border: 1px solid transparent; border-radius: 5px;
  cursor: pointer; color: #bbb; font-size: .8rem; padding: 3px 6px;
  transition: all .15s; opacity: 0;
}
.ct-tr:hover .ct-row-btn { opacity: 1; }
.ct-row-btn:hover { color: var(--accent2); border-color: var(--accent2); background: #f0f5ff; }
.ct-row-btn-del:hover { color: var(--accent); border-color: var(--accent); background: #fff0f0; }

/* Pagination */
.ct-pager {
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; padding: 4px 2px;
}
.ct-pager-info { font-size: .78rem; color: var(--muted); }
.ct-pager-btns { display: flex; align-items: center; gap: 4px; }
.ct-pager-btn {
  min-width: 32px; height: 30px; padding: 0 8px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: .8rem;
  cursor: pointer; transition: all .15s;
}
.ct-pager-btn:hover:not(:disabled) { background: var(--text); color: #f4f1eb; }
.ct-pager-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); font-weight: 700; }
.ct-pager-btn:disabled { opacity: .35; cursor: default; }
.ct-pager-dots { font-size: .8rem; color: var(--muted); padding: 0 2px; }

/* Contacts tab button style */
.btn-contacts-tab { background: var(--surface) !important; }
.btn-contacts-tab.active { background: #4a3060 !important; color: #d4b8f0 !important; border-color: #6b4a90 !important; }

/* Calendars button style */
.btn-calendars { background: var(--surface) !important; }
.btn-calendars.active { background: #1a5490 !important; color: #b8d4f0 !important; border-color: #2d6bbf !important; }

/* ── Contacts: group pills & badges ── */
.ct-group-pills {
  display: flex; flex-wrap: wrap; gap: 8px;
  flex-shrink: 0; padding: 2px 0;
}
.ct-group-pill {
  padding: 5px 14px; border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.ct-group-pill:hover { border-color: var(--accent2); color: var(--accent2); }
.ct-group-pill.active {
  background: var(--accent2); color: #fff;
  border-color: var(--accent2); font-weight: 700;
}

.ct-grp-badge {
  display: inline-block; padding: 2px 9px; border-radius: 12px;
  font-size: .72rem; font-weight: 600; border: 1px solid;
  white-space: nowrap;
}

/* Groups modal list */
.ct-grp-list { display: flex; flex-direction: column; gap: 8px; }
.ct-grp-row { display: flex; gap: 8px; align-items: center; }

/* ═══════════════════════════════════════════════════════
   KANBAN — New additions (column drag, card color, menus)
   ═══════════════════════════════════════════════════════ */

.kb-col-dragging { opacity: .4; cursor: grabbing; }
.kb-col-drop-target { outline: 2px dashed var(--accent2); border-radius: 10px; }

.kb-col-menu-btn {
  width: 26px; height: 26px; border-radius: 6px;
  border: none; background: transparent;
  color: var(--muted); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s; flex-shrink: 0; letter-spacing: .05em;
}
.kb-col-menu-btn:hover { background: var(--border); color: var(--text); }

.kb-col-dropdown {
  min-width: 180px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.14);
  display: flex; flex-direction: column; overflow: hidden;
}
.kb-dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; font-family: 'DM Sans', sans-serif;
  font-size: .84rem; color: var(--text); background: none; border: none;
  cursor: pointer; width: 100%; text-align: left; transition: background .1s;
}
.kb-dropdown-item:hover { background: var(--surface); }
.kb-dropdown-item:last-child { color: #c0392b; }
.kb-dropdown-item:last-child:hover { background: #fde8e8; }

/* Card color dot */
.kb-card-color-dot {
  width: 10px; height: 10px; border-radius: 50%;
  display: inline-block; flex-shrink: 0;
  cursor: pointer; align-self: flex-start; margin-top: 3px;
  border: 1.5px solid rgba(0,0,0,.15); transition: transform .12s;
}
.kb-card-color-dot:hover { transform: scale(1.3); }

/* Header buttons for kanban (prefs + compact) */
.hdr-btn-prefs, .hdr-btn-compact {
  padding: 5px 10px; border-radius: 6px; font-size: .82rem;
  font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .15s;
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
}
.hdr-btn-prefs:hover, .hdr-btn-compact:hover { background: var(--text); color: #f4f1eb; }
.hdr-btn-compact { font-size: 1rem; }

/* ═══════════════════════════════════════════════════════
   CONTACTS — Multi-tags, soft edit, clear button
   ═══════════════════════════════════════════════════════ */

/* Search box clear ×  */
.ct-search-clear {
  position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: .85rem; padding: 2px 4px;
  border-radius: 4px; line-height: 1; transition: color .12s;
  display: none;
}
.ct-search-clear:hover { color: var(--accent); }
.ct-search-wrap.has-value .ct-search-clear { display: block; }
.ct-search-wrap.has-value .ct-search-input { padding-right: 28px; }

/* Tag pills in filter row — color variant */
.ct-group-pill {
  display: flex; align-items: center; gap: 5px;
}
.ct-group-pill .ct-pill-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

/* Multi-tag cell: wrap of badges */
.ct-tags-cell { display: flex; flex-wrap: wrap; gap: 4px; }
.ct-grp-badge { cursor: default; }

/* Inline soft-edit: input that appears in the cell */
.ct-inline-input {
  width: 100%; padding: 3px 6px; border: 1px solid var(--accent2);
  border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: .83rem;
  color: var(--text); background: #fff; outline: none; box-sizing: border-box;
}
.ct-inline-date {
  width: 130px; padding: 3px 6px; border: 1px solid var(--accent2);
  border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: .83rem;
  color: var(--text); background: #fff; outline: none;
}

/* Multi-tag selector in modal */
.ct-tags-picker {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.ct-tag-toggle {
  padding: 4px 12px; border-radius: 16px;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: .78rem;
  cursor: pointer; transition: all .12s;
}
.ct-tag-toggle.selected {
  color: #fff; border-color: transparent; font-weight: 600;
}

/* ═══════════════════════════════════════════════════════════════════════════
   GCAL — Vue Calendrier (agenda.js)
   ═══════════════════════════════════════════════════════════════════════════ */

/* Sub-header gcal button */
.sub-sep { color: rgba(255,255,255,.3); margin: 0 4px; font-size:.9rem; }
.btn-gcal { font-size: .95rem !important; padding: 3px 8px !important; }

/* Root */
.gc-root {
  display: flex; flex-direction: column;
  height: calc(100vh - 52px); /* sub-header nav handles top */
  background: #fff;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

/* ── Inner bar ── */
/* ── gc-bar (shared by classic + calendar views) ── */
.gc-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid #e8e8e8;
  flex-shrink: 0; gap: 8px;
  background: #fff;
}
.gc-bar-left  { display: flex; align-items: center; gap: 6px; flex: 1; }
.gc-bar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.gc-btn-today {
  padding: 5px 13px; border: 1px solid #d0d0d0; border-radius: 6px;
  background: #fff; font-size: .82rem; font-weight: 500; cursor: pointer;
  font-family: 'DM Sans', sans-serif; color: #3c4043; transition: all .12s;
}
.gc-btn-today:hover { background: #f5f5f5; border-color: #bbb; }

.gc-nav-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: none; background: transparent; font-size: 1.2rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #555; transition: background .12s; line-height: 1;
}
.gc-nav-btn:hover { background: #f0f0f0; }

.gc-bar-label {
  font-size: 1rem; font-weight: 600; color: #3c4043;
  letter-spacing: -.01em; margin-left: 2px; white-space: nowrap;
}

/* ── gc-bar dropdowns (Vue + Style) ── */
.gc-dd-wrap { position: relative; }

.gc-dd-btn {
  display: flex; align-items: center; gap: 6px;
  background: #fff; border: 1px solid #d0d0d0; border-radius: 7px;
  padding: 5px 11px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: .8rem; font-weight: 600;
  color: #3c4043; transition: all .15s; white-space: nowrap; line-height: 1;
}
.gc-dd-btn:hover { background: #f5f5f5; border-color: #bbb; }

.gc-dd-arrow {
  width: 8px; height: 5px; flex-shrink: 0; opacity: .5;
  transition: transform .15s;
}
.gc-dd-menu.open ~ .gc-dd-btn .gc-dd-arrow,
.gc-dd-wrap:has(.gc-dd-menu.open) .gc-dd-arrow { transform: rotate(180deg); }

.gc-dd-menu {
  display: none; position: absolute; right: 0; top: calc(100% + 5px);
  background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.12); min-width: 130px;
  z-index: 600; overflow: hidden; padding: 4px 0;
}
.gc-dd-menu.open { display: block; animation: gcDdFadeIn .12s ease; }

@keyframes gcDdFadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.gc-dd-item {
  padding: 8px 16px; font-size: .82rem; color: #3c4043;
  font-family: 'DM Sans', sans-serif; cursor: pointer;
  transition: background .1s; white-space: nowrap;
}
.gc-dd-item:hover  { background: #f5f5f5; }
.gc-dd-item.active { color: #6659d4; font-weight: 700; }


.gc-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── MONTH ── */
.gcm-wrap { display: flex; flex-direction: column; height: 100%; }
.gcm-dow-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  border-bottom: 1px solid #e8e8e8;
  flex-shrink: 0;
}
.gcm-dow {
  padding: 8px 0 6px; text-align: center;
  font-size: .72rem; font-weight: 600; letter-spacing: .06em;
  color: #70757a; text-transform: uppercase;
}
.gcm-dow.we { color: #c5392a; }

.gcm-grid {
  flex: 1; display: grid; grid-template-columns: repeat(7,1fr);
  grid-auto-rows: 1fr; border-left: 1px solid #e8e8e8;
}
.gcm-cell {
  border-right: 1px solid #e8e8e8; border-bottom: 1px solid #e8e8e8;
  padding: 4px 4px 2px; min-height: 90px;
  cursor: pointer; transition: background .1s;
  display: flex; flex-direction: column; gap: 2px;
}
.gcm-cell:hover { background: #fafafa; }
.gcm-overflow .gcm-num-row { color: #c0c0c0; }
.gcm-overflow { background: #fafafa; }
.gcm-we .gcm-num-row { color: #c5392a; }
.gcm-today .gcm-num-row { color: inherit; }

.gcm-num-row {
  font-size: .8rem; font-weight: 500; color: #3c4043;
  padding: 2px 4px; line-height: 1;
  display: flex; justify-content: flex-end;
}
.gcm-today-badge {
  width: 24px; height: 24px; border-radius: 50%;
  background: #6659d4; color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 700; flex-shrink: 0;
}

.gcm-chip {
  font-size: .72rem; padding: 2px 5px; border-radius: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; transition: filter .1s; font-weight: 500;
}
.gcm-chip:hover { filter: brightness(.9); }
.gcm-chip.gcm-event { background: #e8f0fe; color: #1a56db; }
.gcm-chip.gcm-task  { background: #e8f5e9; color: #1e6e37; }
.gcm-chip.gcm-done  { background: #f0f0f0; color: #aaa; text-decoration: line-through; }
.gcm-chip.gcm-urgent{ background: #fdecea; color: #c5221f; }
.gcm-chip.gcm-note  { background: #fff8e1; color: #b06a00; }

.gcm-more {
  font-size: .7rem; color: #70757a; padding: 1px 5px;
  cursor: pointer; font-weight: 500; border-radius: 3px;
}
.gcm-more:hover { background: #f0f0f0; }

/* ── WEEK ── */
.gcw-wrap { display: flex; flex-direction: column; height: 100%; }

.gcw-hdr-outer {
  display: grid; grid-template-columns: 56px repeat(7,1fr);
  border-bottom: 2px solid #e8e8e8; flex-shrink: 0;
}
.gcw-gutter-hdr { border-right: 1px solid #e8e8e8; }
.gcw-hdr-col {
  border-right: 1px solid #e8e8e8; padding: 6px 4px 4px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  min-height: 0;
}
.gcw-hdr-top { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.gcw-hdr-abbr { font-size: .7rem; font-weight: 600; color: #70757a; text-transform: uppercase; letter-spacing: .04em; }
.gcw-hdr-col.we .gcw-hdr-abbr { color: #c5392a; }
.gcw-hdr-num { font-size: 1.2rem; font-weight: 400; color: #3c4043; line-height: 1; }
.gcw-hdr-col.we .gcw-hdr-num { color: #c5392a; }
.gcw-today-badge {
  width: 32px; height: 32px; border-radius: 50%;
  background: #6659d4; color: #fff; font-size: 1rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center; line-height: 1;
}
.gcw-allday-row {
  display: flex; flex-wrap: wrap; gap: 2px; width: 100%;
  min-height: 20px; padding: 0 2px;
}
.gcw-allday-chip {
  font-size: .68rem; padding: 2px 5px; border-radius: 3px;
  background: #e8f0fe; color: #1a56db; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  cursor: pointer;
}
.gcw-allday-chip:hover { filter: brightness(.92); }
.gcw-chip-done  { background: #f0f0f0 !important; color: #aaa !important; text-decoration: line-through; }
.gcw-chip-urgent{ background: #fdecea !important; color: #c5221f !important; }

.gcw-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
.gcw-body::-webkit-scrollbar { width: 6px; }
.gcw-body::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }

.gcw-time-grid { position: relative; display: flex; flex-direction: column; }
.gcw-row {
  display: grid; grid-template-columns: 56px repeat(7,1fr);
  min-height: 52px; border-bottom: 1px solid #f0f0f0;
}
.gcw-gutter {
  border-right: 1px solid #e8e8e8; display: flex;
  align-items: flex-start; padding-top: 0; justify-content: flex-end; padding-right: 8px;
}
.gcw-time-lbl { font-size: .68rem; color: #70757a; margin-top: -8px; white-space: nowrap; }
.gcw-cell {
  border-right: 1px solid #f0f0f0; padding: 2px;
  position: relative; cursor: pointer; transition: background .1s;
  display: flex; flex-direction: column; gap: 1px;
}
.gcw-cell:hover { background: #f8f9ff; }
.gcw-cell.today { background: #fffde7; }
.gcw-cell.today:hover { background: #fff9c4; }
.gcw-cell.we { background: #fafafa; }
.gcw-timed-chip {
  font-size: .7rem; padding: 2px 5px; border-radius: 3px;
  background: #6659d4; color: #fff; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; z-index: 1;
}
.gcw-now-line {
  position: absolute; height: 2px; background: #ea4335; z-index: 5;
  border-radius: 1px;
}
.gcw-now-line::before {
  content:''; position:absolute; left:-5px; top:-4px;
  width:10px; height:10px; border-radius:50%; background:#ea4335;
}

/* ── DAY ── */
.gcd-wrap { display: flex; flex-direction: column; height: 100%; }
.gcd-hdr-outer {
  display: grid; grid-template-columns: 56px 1fr;
  border-bottom: 2px solid #e8e8e8; flex-shrink: 0;
}
.gcd-gutter-hdr { border-right: 1px solid #e8e8e8; }
.gcd-hdr-col { padding: 8px 12px 6px; display: flex; flex-direction: column; gap: 4px; }
.gcd-hdr-top { display: flex; align-items: center; gap: 10px; }
.gcd-hdr-abbr { font-size: .85rem; font-weight: 600; color: #70757a; text-transform: uppercase; letter-spacing: .06em; }
.gcd-hdr-col.today .gcd-hdr-abbr { color: #6659d4; }
.gcd-hdr-num { font-size: 2rem; font-weight: 300; color: #3c4043; line-height: 1; }
.gcd-today-badge {
  width: 48px; height: 48px; border-radius: 50%;
  background: #6659d4; color: #fff; font-size: 1.6rem; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
}
.gcd-allday-row {
  display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap;
  padding: 4px 0 2px;
}
.gcd-allday-label { font-size: .7rem; color: #70757a; font-weight: 500; white-space: nowrap; padding-top: 3px; }
.gcd-allday-chips { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
.gcd-allday-chip {
  font-size: .75rem; padding: 3px 8px; border-radius: 4px;
  background: #e8f0fe; color: #1a56db; font-weight: 500; cursor: pointer;
}
.gcd-allday-chip:hover { filter: brightness(.92); }
.gcd-allday-hint { font-size: .75rem; color: #b0b0b0; font-style: italic; cursor: pointer; padding-top: 3px; }
.gcd-allday-hint:hover { color: #6659d4; }

.gcd-body { flex: 1; overflow-y: auto; }
.gcd-body::-webkit-scrollbar { width: 6px; }
.gcd-body::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
.gcd-time-grid { position: relative; display: flex; flex-direction: column; }
.gcd-row {
  display: grid; grid-template-columns: 56px 1fr;
  min-height: 52px; border-bottom: 1px solid #f0f0f0;
}
.gcd-gutter {
  border-right: 1px solid #e8e8e8; display: flex;
  align-items: flex-start; justify-content: flex-end; padding-right: 8px;
}
.gcd-time-lbl { font-size: .68rem; color: #70757a; margin-top: -8px; white-space: nowrap; }
.gcd-cell {
  padding: 2px 8px; cursor: pointer; transition: background .1s;
  display: flex; flex-direction: column; gap: 2px;
  position: relative;
}
.gcd-cell:hover { background: #f8f9ff; }
.gcd-cell.today { background: #fffde7; }
.gcd-cell.today:hover { background: #fff9c4; }
.gcd-timed-chip {
  font-size: .78rem; padding: 4px 10px; border-radius: 4px;
  background: #6659d4; color: #fff; font-weight: 500; cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px; width: fit-content;
}
.gcd-timed-chip:hover { filter: brightness(.9); }
.gcd-chip-time { font-weight: 700; opacity: .85; }
.gcd-now-line {
  position: absolute; left: 56px; right: 0; height: 2px;
  background: #ea4335; z-index: 5;
}
.gcd-now-dot {
  position: absolute; left: 44px; width: 12px; height: 12px;
  border-radius: 50%; background: #ea4335; z-index: 5;
  transform: translateY(-5px);
}

/* ── YEAR VIEW ── */
.gc-content { overflow-y: auto; }

.gcy-wrap {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(20px, 3vw, 44px) clamp(16px, 3.5vw, 52px);
  padding: clamp(16px, 2vw, 32px) clamp(20px, 3vw, 48px) 40px;
  width: 100%;
  box-sizing: border-box;
}
@media (max-width: 900px){ .gcy-wrap{ grid-template-columns: repeat(3,1fr); } }
@media (max-width: 600px){ .gcy-wrap{ grid-template-columns: repeat(2,1fr); } }

.gcy-block { display: flex; flex-direction: column; gap: 8px; }

.gcy-title {
  font-size: clamp(.9rem, 1.2vw, 1.1rem); font-weight: 600; color: #3c4043;
  font-family: 'DM Sans', sans-serif;
  padding-bottom: 2px; cursor: pointer;
  letter-spacing: -.01em;
}
.gcy-title:hover { color: #6659d4; }

.gcy-dow-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  margin-bottom: 3px;
}
.gcy-dow {
  text-align: center; font-size: clamp(.6rem, .8vw, .75rem); font-weight: 600;
  color: #9aa0a6; text-transform: uppercase; padding-bottom: 4px;
}
.gcy-dow.we { color: #c5392a; }

.gcy-grid {
  display: grid; grid-template-columns: repeat(7,1fr); gap: 2px 0;
}
.gcy-cell {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: clamp(.7rem, 1vw, .9rem); color: #3c4043; cursor: pointer; border-radius: 50%;
  transition: background .1s; position: relative; font-family: 'DM Sans', sans-serif;
}
.gcy-cell:hover { background: #f0eeff; color: #6659d4; }
.gcy-overflow { color: #c8c8c8; cursor: default; }
.gcy-overflow:hover { background: transparent; color: #c8c8c8; }
.gcy-we { color: #c5392a; }
.gcy-today {
  background: #6659d4 !important; color: #fff !important;
  font-weight: 700;
}
.gcy-today:hover { background: #5548c0 !important; }
.gcy-has-data::after {
  content: ''; position: absolute; bottom: 2px; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: #6659d4;
}
.gcy-today.gcy-has-data::after { background: rgba(255,255,255,.7); }

/* ══════════════════════════════════════════════════════════════════════════
   HABITS TRACKER VIEW
   ══════════════════════════════════════════════════════════════════════════ */
.ht-root {
  display: flex; flex-direction: column;
  height: calc(100vh - 52px); background: #f9f7f4;
  overflow-y: auto; overflow-x: auto;
}
.ht-content {
  display: flex; flex-direction: column;
  min-width: fit-content;
}

/* ── Left: goal + chart + stats ── */
.ht-left {
  display: flex; flex-direction: column; gap: 0;
  padding: 16px 20px 12px; flex-shrink: 0;
  min-width: fit-content;
}

/* Badge + chart side by side */
.ht-chart-row {
  display: flex; align-items: stretch; margin-bottom: 10px;
}
.ht-goal-badge {
  width: 160px; min-width: 160px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  background: #e8f5e9; border: 2px solid #a5d6a7;
  border-radius: 8px 0 0 8px; padding: 10px 8px;
  text-align: center;
}
.ht-goal-plant  { font-size: 1.8rem; line-height: 1; }
.ht-goal-label  { font-family:'DM Sans',sans-serif; font-size:.58rem; font-weight:700; color:#2e7d32; letter-spacing:.06em; line-height:1.3; }
.ht-goal-count  { font-family:'DM Serif Display',serif; font-size:1.8rem; color:#2e7d32; line-height:1; }

.ht-chart-wrap {
  background:#fff; border-radius:0 8px 8px 0; padding:8px 12px 6px;
  box-shadow:0 1px 6px rgba(0,0,0,.06); flex-shrink:0;
  border-left: none;
}
.ht-chart-title { font-family:'DM Sans',sans-serif; font-size:.58rem; font-weight:700; color:#999; letter-spacing:.1em; margin-bottom:4px; text-align:center; }
.ht-canvas { display:block; }

/* ── Stats rows ── */
.ht-stats-wrap { margin-bottom: 10px; }
.ht-stats-row  { display: flex; align-items: stretch; margin-bottom: 2px; }
.ht-stats-label {
  width: 160px; min-width: 160px; flex-shrink: 0;
  font-family:'DM Sans',sans-serif; font-size:.6rem; font-weight:700;
  color:#555; letter-spacing:.06em; display:flex; align-items:center;
  padding: 0 10px; border-radius:4px 0 0 4px;
}
.ht-stats-cells { display:flex; }
.ht-stats-cell {
  width:28px; min-width:28px; height:26px;
  font-family:'DM Sans',sans-serif; font-size:.62rem; font-weight:600; color:#444;
  display:flex; align-items:center; justify-content:center;
  border-left:1px solid rgba(255,255,255,.6);
}

/* ── Plants row ── */
.ht-plants-row {
  display:flex; align-items:center; gap:0;
  padding: 4px 0; margin-bottom:4px;
}
.ht-plants-spacer {
  width:160px; min-width:160px; flex-shrink:0;
}
.ht-plant-cell {
  width:28px; min-width:28px; font-size:1rem; text-align:center;
  cursor:default; transition: transform .15s;
}
.ht-plant-cell:hover { transform:scale(1.3); }

/* ── Right: habit grid ── */
.ht-right {
  padding: 0 20px 20px; flex-shrink: 0;
}
.ht-grid-wrap {
  display: flex; flex-direction: column; min-width: fit-content;
}

.ht-grid-top { display:flex; align-items:stretch; margin-bottom:0; }
.ht-hab-header {
  width:160px; min-width:160px; flex-shrink:0;
  font-family:'DM Sans',sans-serif; font-size:.6rem; font-weight:700;
  color:#fff; background:#6e9e7e; letter-spacing:.08em;
  display:flex; align-items:center; padding:0 10px;
  border-radius:6px 0 0 0;
}
.ht-weeks-row { display:flex; }
.ht-week-cell {
  font-family:'DM Sans',sans-serif; font-size:.6rem; font-weight:700;
  color:#555; background:#e8f5e9; letter-spacing:.06em;
  text-align:center; padding:6px 4px;
  border-left:2px solid #fff; display:flex; align-items:center; justify-content:center;
}
.ht-week-cell:first-child { border-left: none; }

/* Day numbers row */
.ht-day-num-row { display:flex; align-items:center; margin-bottom:2px; }
.ht-hab-spacer  { width:160px; min-width:160px; flex-shrink:0; }
.ht-day-num {
  width:28px; min-width:28px; height:22px;
  font-family:'DM Sans',sans-serif; font-size:.65rem; font-weight:600; color:#777;
  display:flex; align-items:center; justify-content:center;
}
.ht-day-num.we    { color:#e0a0b0; }
.ht-day-num.today { background:#fde68a; color:#92400e; border-radius:4px; font-weight:800; }

/* Habit rows */
.ht-hab-row  { display:flex; align-items:center; margin-bottom:2px; }
.ht-hab-name {
  width:160px; min-width:160px; flex-shrink:0;
  font-family:'DM Sans',sans-serif; font-size:.75rem; color:#444;
  padding:0 10px; height:28px; display:flex; align-items:center;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  background:#f0f0ec; border-radius:4px 0 0 4px;
}
.ht-check-cell {
  width:28px; min-width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
  border-left:1px solid rgba(255,255,255,.7);
}
.ht-check-cell.today { outline:2px solid #f59e0b; outline-offset:-2px; border-radius:2px; }
.ht-cb {
  width:14px; height:14px; cursor:pointer; accent-color:#6e9e7e;
  border-radius:3px;
}

.ht-empty {
  font-family:'DM Sans',sans-serif; font-size:.85rem; color:#aaa;
  font-style:italic; padding:24px 10px; text-align:center;
}

.ht-left  { border-right: none; border-bottom: 1px solid #e8e8e8; }

/* ── TOAST ───────────────────────────────────────────────────────────────────── */
#appToast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
  background: #2a2824; color: #f0ede6;
  font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 500;
  padding: 9px 18px; border-radius: 20px;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 18px rgba(0,0,0,.22);
  pointer-events: none; z-index: 9999;
  opacity: 0; transition: opacity .15s ease, transform .15s ease;
}
#appToast.toast-show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}
#appToast.toast-hide {
  opacity: 0; transform: translateX(-50%) translateY(8px);
}
/* Compact mode for checkboxes — smaller pill, no text */
#appToast.toast-compact {
  padding: 7px 14px; font-size: 1rem; gap: 0;
  background: rgba(42,40,36,.85); backdrop-filter: blur(4px);
}
.toast-icon { font-size: .9rem; line-height: 1; }

/* ── OSCARS ──────────────────────────────────────────────────────────────────── */
.tr-oscars-tab { background: #fff8e1 !important; color: #b8860b !important; border-color: #f0c040 !important; }
.tr-oscars-tab.active { background: #f0c040 !important; color: #5a4000 !important; }

.os-panel {
  flex: 1; overflow-y: auto; padding: 12px 20px 24px;
  background: #fafaf8; display: flex; flex-direction: column; gap: 10px;
}

/* Year row */
.os-year-row {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding-bottom: 6px; border-bottom: 2px solid #f0ede6;
}
.os-year-label { font-family: 'DM Sans', sans-serif; }
.os-year-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
.os-year-pill {
  padding: 3px 10px; border-radius: 12px; border: 1px solid #e0dcd4;
  background: #fff; cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: .72rem; font-weight: 600; color: #666; transition: all .12s;
}
.os-year-pill:hover { background: #f5f0e8; }
.os-year-pill.active { background: #f0c040; color: #5a4000; border-color: #d4a800; font-weight: 700; }

/* Category filter */
.os-cat-bar {
  display: flex; gap: 5px; flex-wrap: wrap;
}
.os-cat-pill {
  padding: 4px 11px; border-radius: 14px; border: 1px solid #e0dcd4;
  background: #fff; cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: .68rem; font-weight: 600; color: #555; transition: all .12s; white-space: nowrap;
}
.os-cat-pill:hover { background: #f5f0e8; }
.os-cat-pill.active { background: #6e9e7e; color: #fff; border-color: #5a8a6a; }

/* Stats */
.os-stats-row {
  display: flex; align-items: center; gap: 16px;
  background: #fff; border-radius: 10px; padding: 10px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.os-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.os-stat-num { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: #4a6741; line-height: 1; }
.os-stat-lbl { font-family: 'DM Sans', sans-serif; font-size: .6rem; font-weight: 700; color: #999; letter-spacing: .06em; }
.os-stat-bar-wrap { flex: 1; }
.os-stat-bar { height: 8px; background: #e8e4dc; border-radius: 4px; overflow: hidden; }
.os-stat-bar-fill { height: 100%; background: linear-gradient(90deg, #6e9e7e, #f0c040); border-radius: 4px; transition: width .4s ease; }

/* Grid of category cards */
.os-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.os-card {
  background: #fff; border-radius: 10px; overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,.07); display: flex; flex-direction: column;
}
.os-card-hdr {
  padding: 8px 12px; background: #25231f; color: #f0ede6;
  font-family: 'DM Sans', sans-serif; font-size: .65rem; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
}

/* Nominee rows */
.os-nominee {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; border-bottom: 1px solid #f0ede6;
  transition: background .12s;
}
.os-nominee:last-child { border-bottom: none; }
.os-nominee:hover { background: #fafaf6; }
.os-nominee.winner { background: #fffde6; }
.os-nominee.winner:hover { background: #fff8c0; }
.os-nominee.seen .os-film-name { text-decoration: line-through; color: #aaa; }
.os-nominee.seen .os-person-name { color: #bbb; }

.os-cb { width: 14px; height: 14px; flex-shrink: 0; cursor: pointer; accent-color: #6e9e7e; }

.os-nominee-label { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.os-film-name {
  font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 600; color: #333;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.os-person-name {
  font-family: 'DM Sans', sans-serif; font-size: .68rem; color: #777; margin-top: 1px;
}
.os-trophy { font-size: .9rem; flex-shrink: 0; margin-left: 4px; }

.os-empty { padding: 40px; text-align: center; color: #aaa; font-family: 'DM Sans', sans-serif; font-size: .85rem; }

/* ═══════════════════════════════════════════════════════════════════
   LOGIN / SIGNUP
═══════════════════════════════════════════════════════════════════ */

.login-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, var(--bg) 0%, #e6e3dc 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.login-container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.login-card {
  background: white;
  border-radius: 16px;
  padding: 40px 32px;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
  border: 1px solid rgba(0, 0, 0, 0.06);
}

.login-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  text-align: center;
  margin-bottom: 32px;
  color: var(--text);
  font-weight: 700;
}

.login-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  text-transform: capitalize;
}

.form-group input {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  background: #fafaf8;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-group input:focus {
  outline: none;
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(45, 107, 191, 0.08);
  background: white;
}

.btn-submit {
  padding: 11px 16px;
  background: var(--accent2);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;

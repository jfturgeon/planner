<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificateur Annuel</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  
  <!-- Modular CSS Imports -->
  <link rel="stylesheet" href="./src/styles/base.css">
  <link rel="stylesheet" href="./src/styles/layout.css">
  <link rel="stylesheet" href="./src/styles/components.css">
  <link rel="stylesheet" href="./src/styles/modals.css">
  <link rel="stylesheet" href="./src/styles/views.css">
  
  <!-- CSS Variables and Base Styles -->
  <style>
    :root {
      --bg: #f0ede6;
      --surface: #ffffff;
      --border: #ddd8cf;
      --text: #25231f;
      --muted: #8a8478;
      --accent: #c85a3a;
      --accent2: #2d6bbf;
      --today-bg: #fef3c7;
      --today-ring: #f59e0b;
      --weekend-bg: #fdf5f3;
      --weekend-num: #c85a3a;
      --col-w: 220px;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      padding-bottom: 40px;
      display: flex;
      flex-direction: column;
    }
    
    /* Loading indicator */
    .app-loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      z-index: 9999;
    }
    
    .app-loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top: 3px solid var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .app-loader p {
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
  
  <!-- External Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="supabase-auth-ui.js"></script>
  <script src="version.js"></script>
  <script src="update-checker.js"></script>
  <script src="calendars-system.js"></script>
</head>

<body>
  <!-- Loading indicator (shown while fragments load) -->
  <div class="app-loader" id="appLoader">
    <div class="app-loader-spinner"></div>
    <p>Chargement de l'application...</p>
  </div>
  
  <!-- Fragment Loader - Dynamically loads all HTML fragments -->
  <script type="module">
    import FragmentLoader from './src/fragment-loader.js';
    
    // Listen for fragments to be loaded, then initialize the app
    document.addEventListener('fragmentsLoaded', () => {
      // Hide loader
      const loader = document.getElementById('appLoader');
      if (loader) loader.style.display = 'none';
      
      // Import and initialize main app module
      import('./src/index.js').catch(err => {
        console.error('Failed to load app module:', err);
      });
    });
    
    // Start loading fragments
    FragmentLoader.loadCommonFragments().catch(err => {
      console.error('Failed to load fragments:', err);
    });
  </script>
</body>

</html>

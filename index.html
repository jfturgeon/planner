<script>
// ═══════════════════════════════════════════════════════════════════════════
// KANBAN — Objectifs annuels
// localStorage keys:
//   ap_kb_statuses  → [{id, label, color}]
//   ap_kb_cards     → [{id, title, desc, year, statusId, order, color, createdAt}]
// ═══════════════════════════════════════════════════════════════════════════

const KB_STATUSES_KEY = 'ap_kb_statuses';
const KB_CARDS_KEY    = 'ap_kb_cards';
const KB_DEFAULT_STATUSES = [
  { id: 'todo',  label: 'À faire',  color: '#8b7355' },
  { id: 'doing', label: 'En cours', color: '#2d6bbf' },
  { id: 'done',  label: 'Complété', color: '#2a7a4b' },
];

let kbDragCard   = null;
let kbDragCol    = null;
let kbActiveYear = new Date().getFullYear();
let kbCompactView = false;

function kbLoadStatuses() { try { return JSON.parse(localStorage.getItem(KB_STATUSES_KEY)) || [...KB_DEFAULT_STATUSES]; } catch { return [...KB_DEFAULT_STATUSES]; } }
function kbSaveStatuses(s) { localStorage.setItem(KB_STATUSES_KEY, JSON.stringify(s)); }
function kbLoadCards() { try { return JSON.parse(localStorage.getItem(KB_CARDS_KEY)) || []; } catch { return []; } }
function kbSaveCards(c) { localStorage.setItem(KB_CARDS_KEY, JSON.stringify(c)); }
function kbUid() { return 'kb_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ── RENDER ──────────────────────────────────────────────────────────────────
function renderKanban() {
  const view = document.getElementById('kanbanView');
  view.innerHTML = '';

  const statuses = kbLoadStatuses();
  const allCards = kbLoadCards();

  // Toolbar: progress bar only
  const toolbar = document.createElement('div'); toolbar.className = 'kb-toolbar';
  const yearCards = allCards.filter(c => c.year === kbActiveYear);
  const doneStatus = statuses.find(s => s.id === 'done' || s.label.toLowerCase().includes('complét') || s.label.toLowerCase().includes('done'));
  const doneCount = doneStatus ? yearCards.filter(c => c.statusId === doneStatus.id).length : 0;
  const total = yearCards.length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;

  const progressWrap = document.createElement('div'); progressWrap.className = 'kb-progress-wrap';
  const progressLabel = document.createElement('span'); progressLabel.className = 'kb-progress-label';
  progressLabel.textContent = total ? `${kbActiveYear} · ${doneCount}/${total} · ${pct}%` : `${kbActiveYear} · 0 objectif`;
  const progressTrack = document.createElement('div'); progressTrack.className = 'kb-progress-track';
  const progressFill = document.createElement('div'); progressFill.className = 'kb-progress-fill';
  progressFill.style.cssText = `width:${pct}%;background:${doneStatus?.color||'#2a7a4b'};`;
  progressTrack.appendChild(progressFill);
  progressWrap.appendChild(progressLabel); progressWrap.appendChild(progressTrack);
  toolbar.appendChild(progressWrap);

  // Add New Column button + compact toggle in toolbar
  const spacer = document.createElement('div'); spacer.style.flex='1'; toolbar.appendChild(spacer);

  // Compact toggle lives INSIDE the kanban page toolbar (not in header)
  const compactToggleBtn = document.createElement('button');
  compactToggleBtn.className = 'kb-manage-btn';
  compactToggleBtn.textContent = kbCompactView ? '☰ Complet' : '▤ Compact';
  compactToggleBtn.title = kbCompactView ? 'Vue complète' : 'Vue compacte';
  compactToggleBtn.addEventListener('click', () => { kbCompactView = !kbCompactView; renderKanban(); });
  toolbar.appendChild(compactToggleBtn);

  const addColBtn = document.createElement('button'); addColBtn.className = 'kb-manage-btn'; addColBtn.textContent = '＋ Colonne';
  addColBtn.addEventListener('click', () => {
    const s = kbLoadStatuses();
    s.push({ id: kbUid(), label: 'Nouveau', color: '#888888' });
    kbSaveStatuses(s); renderKanban();
  });
  toolbar.appendChild(addColBtn);
  view.appendChild(toolbar);

  // Board
  const board = document.createElement('div');
  board.className = 'kb-board' + (kbCompactView ? ' kb-board-compact' : '');
  const cards = allCards.filter(c => c.year === kbActiveYear);
  statuses.forEach(status => board.appendChild(kbBuildColumn(status, cards)));
  view.appendChild(board);
}

// ── COLUMN ──────────────────────────────────────────────────────────────────
function kbBuildColumn(status, cards) {
  const colCards = cards.filter(c => c.statusId === status.id).sort((a,b) => (a.order||0)-(b.order||0));
  const col = document.createElement('div'); col.className = 'kb-col'; col.dataset.statusId = status.id;

  // Column drag-reorder
  col.draggable = true;
  col.addEventListener('dragstart', e => {
    if (e.target !== col && !e.target.closest('.kb-col-hd')) return;
    kbDragCol = status.id; setTimeout(() => col.classList.add('kb-col-dragging'), 0);
    e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('kb-col', status.id);
  });
  col.addEventListener('dragend', () => { kbDragCol = null; col.classList.remove('kb-col-dragging'); });
  col.addEventListener('dragover', e => {
    if (kbDragCol && kbDragCol !== status.id) { e.preventDefault(); col.classList.add('kb-col-drop-target'); }
    else if (kbDragCard) e.preventDefault();
  });
  col.addEventListener('dragleave', e => { if (!col.contains(e.relatedTarget)) col.classList.remove('kb-col-drop-target'); });
  col.addEventListener('drop', e => {
    col.classList.remove('kb-col-drop-target');
    if (kbDragCol && kbDragCol !== status.id) {
      e.preventDefault(); e.stopPropagation();
      const ss = kbLoadStatuses();
      const fi = ss.findIndex(s => s.id === kbDragCol), ti = ss.findIndex(s => s.id === status.id);
      if (fi >= 0 && ti >= 0) { const [m] = ss.splice(fi,1); ss.splice(ti,0,m); kbSaveStatuses(ss); renderKanban(); }
    }
  });

  // Header
  const hd = document.createElement('div'); hd.className = 'kb-col-hd';
  hd.style.borderLeft = `4px solid ${status.color}`;
  hd.style.background = `linear-gradient(90deg, ${status.color}18 0%, transparent 100%)`;

  const dot = document.createElement('span'); dot.className = 'kb-col-dot'; dot.style.background = status.color;
  const lbl = document.createElement('span'); lbl.className = 'kb-col-label'; lbl.textContent = status.label;
  const cnt = document.createElement('span'); cnt.className = 'kb-col-count'; cnt.style.cssText=`background:${status.color}33;color:${status.color};`; cnt.textContent = colCards.length;
  const addHdBtn = document.createElement('button'); addHdBtn.className = 'kb-col-add-btn'; addHdBtn.textContent = '＋';
  addHdBtn.style.setProperty('--col-color', status.color);
  addHdBtn.addEventListener('click', e => { e.stopPropagation(); kbShowCardModal(null, status.id); });
  const menuBtn = document.createElement('button'); menuBtn.className = 'kb-col-menu-btn'; menuBtn.textContent = '⋯';
  menuBtn.addEventListener('click', e => { e.stopPropagation(); kbShowColMenu(menuBtn, status); });
  hd.appendChild(dot); hd.appendChild(lbl); hd.appendChild(cnt); hd.appendChild(addHdBtn); hd.appendChild(menuBtn);
  col.appendChild(hd);

  // List
  const list = document.createElement('div'); list.className = 'kb-list'; list.dataset.statusId = status.id;
  list.addEventListener('dragover', e => {
    if (!kbDragCard) return; e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    const after = kbDragAfterElement(list, e.clientY);
    let ghost = list.querySelector('.kb-ghost');
    if (!ghost) { ghost = document.createElement('div'); ghost.className = 'kb-ghost'; }
    const addBtn = list.querySelector('.kb-add-card-btn');
    if (after) list.insertBefore(ghost, after);
    else if (addBtn) list.insertBefore(ghost, addBtn);
    else list.appendChild(ghost);
  });
  list.addEventListener('dragleave', e => { if (!list.contains(e.relatedTarget)) { const g=list.querySelector('.kb-ghost'); if(g) g.remove(); } });
  list.addEventListener('drop', e => {
    if (!kbDragCard) return; e.preventDefault();
    const ghost = list.querySelector('.kb-ghost');
    const afterEl = ghost ? ghost.nextSibling : null;
    if (ghost) ghost.remove();
    kbDropCard(status.id, afterEl?.dataset?.cardId || null);
  });

  colCards.forEach(card => list.appendChild(kbBuildCard(card, status)));
  col.appendChild(list);
  return col;
}

// ── COLUMN CONTEXT MENU ──────────────────────────────────────────────────────
function kbConfirm(colLabel, onYes) {
  kbRemoveModal();
  const overlay = kbMakeOverlay();
  const modal = document.createElement('div'); modal.className = 'kb-modal'; modal.style.maxWidth = '400px';

  // Header
  const hd = document.createElement('div'); hd.className = 'kb-modal-hd';
  const hdTitle = document.createElement('span'); hdTitle.className = 'kb-modal-title';
  hdTitle.textContent = 'Supprimer la colonne';
  hd.appendChild(hdTitle); hd.appendChild(kbCloseBtn());

  // Body
  const bd = document.createElement('div'); bd.className = 'kb-modal-bd';
  bd.style.gap = '6px';
  const line1 = document.createElement('p');
  line1.style.cssText = 'margin:0;font-size:.88rem;color:var(--text);line-height:1.6;';
  line1.innerHTML = 'Voulez-vous supprimer la colonne <strong>' + colLabel + '</strong> ?';
  const line2 = document.createElement('p');
  line2.style.cssText = 'margin:0;font-size:.82rem;color:var(--muted);line-height:1.5;';
  line2.textContent = 'Les objectifs dans cette colonne seront déplacés vers la première colonne.';
  bd.appendChild(line1); bd.appendChild(line2);

  // Footer
  const ft = document.createElement('div'); ft.className = 'kb-modal-ft';
  const cancelBtn = document.createElement('button'); cancelBtn.className = 'kb-modal-cancel';
  cancelBtn.textContent = 'Annuler';
  cancelBtn.addEventListener('click', kbRemoveModal);
  const delBtn = document.createElement('button'); delBtn.className = 'kb-modal-save';
  delBtn.style.cssText = 'background:#c0392b;';
  delBtn.textContent = 'Supprimer';
  delBtn.addEventListener('click', () => { kbRemoveModal(); onYes(); });
  ft.appendChild(cancelBtn); ft.appendChild(delBtn);

  modal.appendChild(hd); modal.appendChild(bd); modal.appendChild(ft);
  overlay.appendChild(modal); document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('visible'));
}

function kbShowColMenu(anchor, status) {
  document.querySelectorAll('.kb-col-dropdown').forEach(d => d.remove());
  const menu = document.createElement('div'); menu.className = 'kb-col-dropdown';
  const rect = anchor.getBoundingClientRect();
  menu.style.cssText = `position:fixed;top:${rect.bottom+4}px;left:${rect.left}px;z-index:1000;`;

  const mkItem = (icon, label, cb) => {
    const item = document.createElement('button'); item.className = 'kb-dropdown-item';
    item.innerHTML = `<span>${icon}</span> ${label}`;
    item.addEventListener('click', e => { e.stopPropagation(); menu.remove(); cb(); });
    menu.appendChild(item);
  };
  mkItem('\u270F', 'Renommer / couleur', () => kbShowEditStatusModal(status));
  mkItem('\u2715', 'Supprimer la colonne', () => {
    const statuses = kbLoadStatuses();
    if (statuses.length <= 1) { kbConfirm('Il faut au moins une colonne.', () => {}); return; }
    kbConfirm(status.label, () => {
      const fresh = kbLoadStatuses();
      const idx = fresh.findIndex(s => s.id === status.id);
      if (idx >= 0) fresh.splice(idx, 1);
      const first = fresh[0];
      const allCards = kbLoadCards();
      allCards.forEach(c => { if (c.statusId === status.id) c.statusId = first ? first.id : null; });
      kbSaveCards(allCards); kbSaveStatuses(fresh); renderKanban();
    });
  });
  document.body.appendChild(menu);
  const closeMenu = e => { if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', closeMenu); } };
  setTimeout(() => document.addEventListener('click', closeMenu), 0);
}

function kbShowEditStatusModal(status) {
  kbRemoveModal();
  const overlay = kbMakeOverlay();
  const modal = document.createElement('div'); modal.className = 'kb-modal'; modal.style.maxWidth = '340px';
  const mhd = document.createElement('div'); mhd.className = 'kb-modal-hd';
  const mt = document.createElement('div'); mt.className = 'kb-modal-title'; mt.textContent = '✏ Modifier le statut';
  const mc = kbCloseBtn(); mhd.appendChild(mt); mhd.appendChild(mc);
  const mbd = document.createElement('div'); mbd.className = 'kb-modal-bd';

  const nameIn = document.createElement('input'); nameIn.className = 'kb-field-input'; nameIn.value = status.label;
  const nw = document.createElement('div'); nw.style.cssText='display:flex;flex-direction:column;gap:4px;';
  const nl = document.createElement('label'); nl.className='kb-field-label'; nl.textContent='Nom';
  nw.appendChild(nl); nw.appendChild(nameIn); mbd.appendChild(nw);

  const cw = document.createElement('div'); cw.style.cssText='display:flex;flex-direction:column;gap:4px;margin-top:12px;';
  const cl = document.createElement('label'); cl.className='kb-field-label'; cl.textContent='Couleur';
  const cr = document.createElement('div'); cr.style.cssText='display:flex;align-items:center;gap:10px;';
  const colorIn = document.createElement('input'); colorIn.type='color'; colorIn.value=status.color; colorIn.style.cssText='width:42px;height:36px;border:none;border-radius:6px;cursor:pointer;';
  const colorPrev = document.createElement('span'); colorPrev.style.cssText=`flex:1;height:36px;border-radius:6px;background:${status.color};`;
  colorIn.addEventListener('input', e => colorPrev.style.background = e.target.value);
  cr.appendChild(colorIn); cr.appendChild(colorPrev); cw.appendChild(cl); cw.appendChild(cr); mbd.appendChild(cw);

  const mft = document.createElement('div'); mft.className = 'kb-modal-ft';
  const cancel = document.createElement('button'); cancel.className='kb-btn-cancel'; cancel.textContent='Annuler'; cancel.addEventListener('click', kbRemoveModal);
  const save = document.createElement('button'); save.className='kb-btn-save'; save.textContent='Enregistrer';
  save.addEventListener('click', () => {
    const ss = kbLoadStatuses(); const idx = ss.findIndex(s => s.id === status.id);
    if (idx >= 0) { ss[idx].label = nameIn.value.trim()||status.label; ss[idx].color = colorIn.value; }
    kbSaveStatuses(ss); kbRemoveModal(); renderKanban();
  });
  mft.appendChild(cancel); mft.appendChild(save);
  modal.appendChild(mhd); modal.appendChild(mbd); modal.appendChild(mft);
  overlay.appendChild(modal); document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('visible'));
  nameIn.focus();
}

// ── CARD ─────────────────────────────────────────────────────────────────────
function kbBuildCard(card, status) {
  const el = document.createElement('div');
  el.className = 'kb-card' + (kbCompactView ? ' kb-card-compact' : '');
  el.dataset.cardId = card.id;
  el.draggable = true;
  const cardColor = card.color || status.color;
  el.style.borderLeft = `4px solid ${cardColor}`;

  el.addEventListener('dragstart', e => {
    kbDragCard = card.id; setTimeout(()=>el.classList.add('dragging'),0);
    e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain', card.id);
  });
  el.addEventListener('dragend', () => { kbDragCard=null; el.classList.remove('dragging'); document.querySelectorAll('.kb-ghost').forEach(g=>g.remove()); });

  // Color dot (click to pick)
  const colorDot = document.createElement('span'); colorDot.className='kb-card-color-dot'; colorDot.style.background=cardColor;
  colorDot.title='Couleur de l\'objectif';
  colorDot.addEventListener('click', e => { e.stopPropagation(); kbPickCardColor(colorDot, card, el); });
  el.appendChild(colorDot);

  const title = document.createElement('div'); title.className='kb-card-title'; title.textContent=card.title; el.appendChild(title);
  if (!kbCompactView && card.desc) { const desc=document.createElement('div'); desc.className='kb-card-desc'; desc.textContent=card.desc; el.appendChild(desc); }

  const actions = document.createElement('div'); actions.className='kb-card-actions';
  const editBtn = document.createElement('button'); editBtn.className='kb-card-btn'; editBtn.title='Modifier'; editBtn.textContent='✏';
  editBtn.addEventListener('click', e => { e.stopPropagation(); kbShowCardModal(card); });
  const delBtn = document.createElement('button'); delBtn.className='kb-card-btn kb-card-btn-del'; delBtn.title='Supprimer'; delBtn.textContent='✕';
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (confirm(`Supprimer l'objectif "${card.title}" ?`)) { kbSaveCards(kbLoadCards().filter(c=>c.id!==card.id)); renderKanban(); }
  });
  actions.appendChild(editBtn); actions.appendChild(delBtn); el.appendChild(actions);
  return el;
}

function kbPickCardColor(dotEl, card, cardEl) {
  const input = document.createElement('input'); input.type='color'; input.value=card.color||'#888888';
  input.style.cssText='position:absolute;opacity:0;width:0;height:0;';
  document.body.appendChild(input);
  input.addEventListener('input', e => { card.color=e.target.value; dotEl.style.background=e.target.value; cardEl.style.borderLeft=`4px solid ${e.target.value}`; });
  input.addEventListener('change', () => {
    const cards=kbLoadCards(); const idx=cards.findIndex(c=>c.id===card.id); if(idx>=0) cards[idx].color=card.color; kbSaveCards(cards); input.remove();
  });
  input.click();
}

function kbDragAfterElement(container, y) {
  const els = [...container.querySelectorAll('.kb-card:not(.dragging)')];
  return els.reduce((closest, child) => {
    const box=child.getBoundingClientRect(), offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset) return {offset,element:child}; return closest;
  }, {offset:Number.NEGATIVE_INFINITY}).element;
}

function kbDropCard(targetStatusId, beforeCardId) {
  if (!kbDragCard) return;
  const cards=kbLoadCards(), card=cards.find(c=>c.id===kbDragCard); if(!card) return;
  card.statusId=targetStatusId;
  const colCards=cards.filter(c=>c.statusId===targetStatusId&&c.id!==kbDragCard).sort((a,b)=>(a.order||0)-(b.order||0));
  const insertIdx=beforeCardId?colCards.findIndex(c=>c.id===beforeCardId):colCards.length;
  colCards.splice(insertIdx<0?colCards.length:insertIdx,0,card);
  colCards.forEach((c,i)=>{c.order=i;}); kbSaveCards(cards); renderKanban();
}

// ── CARD MODAL ────────────────────────────────────────────────────────────────
function kbShowCardModal(card=null, defaultStatusId=null) {
  kbRemoveModal();
  const statuses=kbLoadStatuses(); const isEdit=!!card;
  const overlay=kbMakeOverlay(); const modal=document.createElement('div'); modal.className='kb-modal';
  const mhd=document.createElement('div'); mhd.className='kb-modal-hd';
  const mtitle=document.createElement('div'); mtitle.className='kb-modal-title'; mtitle.textContent=isEdit?'✏ Modifier l\'objectif':'＋ Nouvel objectif';
  const mclose=kbCloseBtn(); mhd.appendChild(mtitle); mhd.appendChild(mclose);
  const mbd=document.createElement('div'); mbd.className='kb-modal-bd';
  const mkField=(lbl,el)=>{ const w=document.createElement('div'); w.style.cssText='display:flex;flex-direction:column;gap:4px;'; const l=document.createElement('label'); l.className='kb-field-label'; l.textContent=lbl; w.appendChild(l); w.appendChild(el); return w; };

  const titleInput=document.createElement('input'); titleInput.className='kb-field-input'; titleInput.placeholder='Nom de l\'objectif…'; titleInput.value=card?.title||'';
  const descInput=document.createElement('textarea'); descInput.className='kb-field-textarea'; descInput.placeholder='Détails, notes…'; descInput.value=card?.desc||''; descInput.rows=3;
  const yearInput=document.createElement('input'); yearInput.className='kb-field-input'; yearInput.type='number'; yearInput.min=2020; yearInput.max=2099; yearInput.value=card?.year||kbActiveYear;
  const statusSel=document.createElement('select'); statusSel.className='kb-field-select';
  statuses.forEach(s=>{ const opt=document.createElement('option'); opt.value=s.id; opt.textContent=s.label; if((card?.statusId||defaultStatusId)===s.id) opt.selected=true; statusSel.appendChild(opt); });

  let currentColor=card?.color||'';
  const colorRow=document.createElement('div'); colorRow.style.cssText='display:flex;align-items:center;gap:10px;';
  const colorIn=document.createElement('input'); colorIn.type='color'; colorIn.value=currentColor||'#888888'; colorIn.style.cssText='width:42px;height:36px;border:none;border-radius:6px;cursor:pointer;';
  const colorPrev=document.createElement('span'); colorPrev.style.cssText=`flex:1;height:36px;border-radius:6px;background:${currentColor||'#e0ddd8'};`;
  const colorClear=document.createElement('button'); colorClear.className='kb-btn-cancel'; colorClear.style.cssText='padding:4px 10px;font-size:.75rem;'; colorClear.textContent='Par défaut';
  colorIn.addEventListener('input',e=>{currentColor=e.target.value;colorPrev.style.background=e.target.value;});
  colorClear.addEventListener('click',()=>{currentColor='';colorPrev.style.background='#e0ddd8';});
  colorRow.appendChild(colorIn); colorRow.appendChild(colorPrev); colorRow.appendChild(colorClear);

  mbd.appendChild(mkField('Objectif *',titleInput));
  mbd.appendChild(mkField('Description',descInput));
  mbd.appendChild(mkField('Année',yearInput));
  mbd.appendChild(mkField('Statut',statusSel));
  mbd.appendChild(mkField('Couleur de la carte',colorRow));

  const mft=document.createElement('div'); mft.className='kb-modal-ft';
  const cancelBtn=document.createElement('button'); cancelBtn.className='kb-btn-cancel'; cancelBtn.textContent='Annuler'; cancelBtn.addEventListener('click',kbRemoveModal);
  const saveBtn=document.createElement('button'); saveBtn.className='kb-btn-save'; saveBtn.textContent=isEdit?'Enregistrer':'Créer';
  saveBtn.addEventListener('click',()=>{
    const title=titleInput.value.trim(); if(!title){titleInput.style.borderColor='#e05';titleInput.focus();return;}
    const cards=kbLoadCards(); const yr=parseInt(yearInput.value)||kbActiveYear; const stId=statusSel.value;
    if(isEdit){ const idx=cards.findIndex(c=>c.id===card.id); if(idx>=0) Object.assign(cards[idx],{title,desc:descInput.value.trim(),year:yr,statusId:stId,color:currentColor||undefined}); }
    else { const cc=cards.filter(c=>c.statusId===stId&&c.year===yr); const mo=cc.length?Math.max(...cc.map(c=>c.order||0))+1:0; cards.push({id:kbUid(),title,desc:descInput.value.trim(),year:yr,statusId:stId,order:mo,color:currentColor||undefined,createdAt:new Date().toISOString()}); }
    kbSaveCards(cards); if(yr!==kbActiveYear) kbActiveYear=yr; kbRemoveModal(); renderKanban();
  });
  mft.appendChild(cancelBtn); mft.appendChild(saveBtn);
  modal.appendChild(mhd); modal.appendChild(mbd); modal.appendChild(mft);
  overlay.appendChild(modal); document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add('visible'));

}

// ── SETTINGS MODAL ────────────────────────────────────────────────────────────
function kbShowSettingsModal() {
  kbRemoveModal();
  const overlay=kbMakeOverlay(); const modal=document.createElement('div'); modal.className='kb-modal'; modal.style.maxWidth='400px';
  const mhd=document.createElement('div'); mhd.className='kb-modal-hd';
  const mtitle=document.createElement('div'); mtitle.className='kb-modal-title'; mtitle.textContent='⚙ Préférences';
  const mclose=kbCloseBtn(); mhd.appendChild(mtitle); mhd.appendChild(mclose);
  const mbd=document.createElement('div'); mbd.className='kb-modal-bd';
  const mkRow=(label,control)=>{ const r=document.createElement('div'); r.style.cssText='display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px solid var(--border);'; const l=document.createElement('span'); l.style.cssText='font-family:"DM Sans",sans-serif;font-size:.85rem;color:var(--text);font-weight:500;'; l.textContent=label; r.appendChild(l); r.appendChild(control); return r; };

  const viewSel=document.createElement('select'); viewSel.className='kb-field-select'; viewSel.style.width='auto';
  [['false','Complet (titre + desc)'],['true','Compact (titre seul)']].forEach(([v,t])=>{ const o=document.createElement('option'); o.value=v; o.textContent=t; if(String(kbCompactView)===v) o.selected=true; viewSel.appendChild(o); });
  mbd.appendChild(mkRow('Vue par défaut',viewSel));

  const wsSel=document.createElement('select'); wsSel.className='kb-field-select'; wsSel.style.width='auto';
  const wsVal=localStorage.getItem('ap_ws')||'0';
  [['0','Dimanche'],['1','Lundi']].forEach(([v,t])=>{ const o=document.createElement('option'); o.value=v; o.textContent=t; if(wsVal===v) o.selected=true; wsSel.appendChild(o); });
  mbd.appendChild(mkRow('Premier jour de la semaine',wsSel));

  const mft=document.createElement('div'); mft.className='kb-modal-ft';
  const cancelBtn=document.createElement('button'); cancelBtn.className='kb-btn-cancel'; cancelBtn.textContent='Annuler'; cancelBtn.addEventListener('click',kbRemoveModal);
  const saveBtn=document.createElement('button'); saveBtn.className='kb-btn-save'; saveBtn.textContent='Enregistrer';
  saveBtn.addEventListener('click',()=>{
    kbCompactView=viewSel.value==='true';
    const newWs=parseInt(wsSel.value);
    if(newWs!==parseInt(localStorage.getItem('ap_ws')||'0')){ localStorage.setItem('ap_ws',newWs); const ws2=document.getElementById('weekStart'); if(ws2){ws2.value=newWs;ws2.dispatchEvent(new Event('change'));} }
    kbRemoveModal(); renderKanban();
  });
  mft.appendChild(cancelBtn); mft.appendChild(saveBtn);
  modal.appendChild(mhd); modal.appendChild(mbd); modal.appendChild(mft);
  overlay.appendChild(modal); document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add('visible'));
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function kbMakeOverlay(){ const o=document.createElement('div'); o.className='kb-modal-overlay'; o.id='kbModalOverlay'; o.addEventListener('click',e=>{if(e.target===o)kbRemoveModal();}); return o; }
function kbCloseBtn(){ const b=document.createElement('button'); b.className='kb-modal-close'; b.textContent='✕'; b.addEventListener('click',kbRemoveModal); return b; }
function kbRemoveModal(){ const m=document.getElementById('kbModalOverlay'); if(m) m.remove(); }

// ── HOOK ─────────────────────────────────────────────────────────────────────
document.getElementById('btnKanban').addEventListener('click', () => {
  ['trackerView','kanbanView','contactsView','scrollArea','monthView','weeklyView'].forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display='none'; });
  const sw=document.querySelector('.strip-wrapper'); if(sw) sw.style.display='none';
  document.querySelectorAll('.btn-view').forEach(b=>b.classList.remove('active'));
  document.getElementById('btnKanban').classList.add('active');
  document.getElementById('kanbanView').style.display='flex';
  renderKanban();
});

// Wire Préférences button — always visible, always opens settings
document.addEventListener('DOMContentLoaded', () => {
  const pb = document.getElementById('btnPreferences');
  if (pb) pb.addEventListener('click', kbShowSettingsModal);
});
// Fallback if DOMContentLoaded already fired
(function() {
  const pb = document.getElementById('btnPreferences');
  if (pb && !pb._kbWired) { pb._kbWired = true; pb.addEventListener('click', kbShowSettingsModal); }
})();

const _kbOrigSwitchView = window.switchView;
window.switchView = function(mode) {
  const kv=document.getElementById('kanbanView'); if(kv) kv.style.display='none';
  _kbOrigSwitchView(mode);
};

const _kbOrigRender = window.render;
window.render = function() {
  _kbOrigRender();
  if (document.getElementById('btnKanban')?.classList.contains('active')) { kbActiveYear=CY; renderKanban(); }
};

</script>

// ── PERSISTENCE ──────────────────────────────────────────────────────────────
function ctLoadContacts() {
  try {
    const stored = JSON.parse(localStorage.getItem(CONTACTS_KEY));
    return stored && stored.length ? stored : CONTACTS_PRELOADED;
  } catch { return CONTACTS_PRELOADED; }
}
function ctSaveContacts(c) { localStorage.setItem(CONTACTS_KEY, JSON.stringify(c)); }

// Init on first load
if (!localStorage.getItem(CONTACTS_KEY)) {
  ctSaveContacts(CONTACTS_PRELOADED);
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
// Returns contacts whose birthday falls on a given month/day
function ctGetBirthdaysForDay(month, day) {
  return ctLoadContacts().filter(c => c.bm === month && c.bd === day);
}

// Build the display label for a contact birthday on a given year
function ctBuildBirthdayLabel(c, displayYear) {
  const fullName = [c.fn, c.ln].filter(Boolean).join(' ');

  if (c.dy) {
    // Deceased — show age at death
    const ageAtDeath = c.dy - (c.by || c.dy);
    const deathStr = c.dm && c.dd
      ? `${c.dy}-${String(c.dm).padStart(2,'0')}-${String(c.dd).padStart(2,'0')}`
      : c.dy;
    return `🕯 ${fullName} · né${c.by ? ' en ' + c.by : ''} · décédé ${deathStr} à ${ageAtDeath} ans`;
  }

  if (c.by) {
    const age = displayYear - c.by;
    return `🎂 ${fullName} · ${age} ans (${c.by})`;
  }

  return `🎂 ${fullName}`;
}

// ── INJECT BIRTHDAYS INTO WEEKLY VIEW EVENTS ─────────────────────────────────
function ctInjectBirthdaysIntoDay(evListEl, dk) {
  if (!evListEl) return;
  const parts = dk.split('-');
  const year  = parseInt(parts[0]);
  const month = parseInt(parts[1]);
  const day   = parseInt(parts[2]);

  const birthdays = ctGetBirthdaysForDay(month, day);
  if (!birthdays.length) return;

  // Remove existing birthday rows to avoid duplicates on re-render
  evListEl.querySelectorAll('.ct-bday-row').forEach(r => r.remove());

  birthdays.forEach(c => {
    const label = ctBuildBirthdayLabel(c, year);
    const isDeceased = !!c.dy;

    const row = document.createElement('div');
    row.className = 'wv-event-row ct-bday-row';
    row.style.cssText = `background:${isDeceased ? '#f5f0ea' : '#fff8f0'};border-left:3px solid ${isDeceased ? '#8b7355' : '#e8855a'};cursor:default;`;

    const titleSpan = document.createElement('span');
    titleSpan.className = 'wv-row-label';
    titleSpan.style.cssText = `font-size:.75rem;color:${isDeceased ? '#6b5840' : '#8b4513'};flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:6px;`;
    titleSpan.textContent = label;
    titleSpan.title = label;

    row.appendChild(titleSpan);

    // Insert before first empty row, or append
    const firstEmpty = evListEl.querySelector('.wv-event-row:not(.ct-bday-row)');
    if (firstEmpty) evListEl.insertBefore(row, firstEmpty);
    else evListEl.appendChild(row);
  });
}

// ── HOOK INTO renderWvDays ────────────────────────────────────────────────────
// Tag event list containers with data-evlist attribute in planner2026.js
// We inject after render using MutationObserver fallback + direct call
function ctInjectAllBirthdays() {
  const strip = document.getElementById('wvDays');
  if (!strip) return;
  strip.querySelectorAll('[data-evlist]').forEach(el => {
    ctInjectBirthdaysIntoDay(el, el.dataset.evlist);
  });
}

// Patch renderWvDays to inject birthdays after each render
const _ctOrigRenderWvDays = window.renderWvDays;
window.renderWvDays = function(dates, wk, wdata) {
  _ctOrigRenderWvDays(dates, wk, wdata);
  ctInjectAllBirthdays();
};

// Initial injection (page load)
ctInjectAllBirthdays();

// ── CSV IMPORT ────────────────────────────────────────────────────────────────
function ctImportCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const lines = text.split(/\r?\n/);
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));

      const idx = (name) => headers.indexOf(name);
      const idxFirst = idx('First Name'), idxLast = idx('Last Name'), idxBday = idx('Birthday');

      if (idxBday < 0) throw new Error('Colonne "Birthday" introuvable');

      const contacts = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = ctParseCSVLine(lines[i]);
        if (!cols || cols.length < 3) continue;
        const fname = (cols[idxFirst]||'').trim();
        const lname = (cols[idxLast]||'').trim();
        const bday  = (cols[idxBday]||'').trim();
        if (!bday || bday.startsWith('--') || (!fname && !lname)) continue;

        let by = null, bm = null, bd = null;
        const bp = bday.split('-');
        if (bp.length === 3 && bp[0]) { by = parseInt(bp[0]); bm = parseInt(bp[1]); bd = parseInt(bp[2]); }
        if (!bm || !bd) continue;

        // Find death date
        let dy = null, dm = null, dd = null;
        for (let ei = 1; ei <= 4; ei++) {
          const lbl = (cols[idx(`Event ${ei} - Label`)]||'').trim().toLowerCase();
          const val = (cols[idx(`Event ${ei} - Value`)]||'').trim();
          if (['décès','died','death','deces'].includes(lbl) && val) {
            const dp = val.split('-');
            try { dy = parseInt(dp[0]); dm = parseInt(dp[1]); dd = parseInt(dp[2]); } catch {}
            break;
          }
        }
        contacts.push({fn:fname, ln:lname, by, bm, bd, dy, dm, dd});
      }

      if (!contacts.length) throw new Error("Aucun contact avec date d'anniversaire trouvé");

      if (confirm(`Importer ${contacts.length} contacts avec anniversaire ?\nCeci remplacera les contacts actuels.`)) {
        ctSaveContacts(contacts);
        ctInjectAllBirthdays();
        alert(`✅ ${contacts.length} anniversaires importés !`);
        // Re-render weekly view to reflect new contacts
        if (window.renderWeeklyView) renderWeeklyView();
      }
    } catch(err) {
      alert('❌ Erreur import : ' + err.message);
    }
  };
  reader.readAsText(file);
}

function ctParseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"' && !inQ) { inQ = true; }
    else if (ch === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
    else if (ch === '"' && inQ) { inQ = false; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

// ═══════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════
// CONTACTS TAB VIEW — Multi-tags, soft-edit, ×clear, colored pills
// Data model: contact.tags = [] (array of strings) — replaces .grp
// ═══════════════════════════════════════════════════════════════════════════

let ctSortField   = 'fn';
let ctSortAsc     = true;
let ctFilter      = '';
let ctTagFilter   = '';   // '' = tous, tag name = filter by tag
let ctPage        = 1;
const CT_PAGE_SIZE = 25;

const CT_GROUPS_KEY    = 'ap_ct_groups';
const CT_DEFAULT_GROUPS = ['Famille', 'Ami', 'Célébrité'];

function ctLoadGroups() {
  try { return JSON.parse(localStorage.getItem(CT_GROUPS_KEY)) || [...CT_DEFAULT_GROUPS]; }
  catch { return [...CT_DEFAULT_GROUPS]; }
}
function ctSaveGroups(g) { localStorage.setItem(CT_GROUPS_KEY, JSON.stringify(g)); }

// Migrate old .grp string field → .tags array on first access
function ctMigrateContact(c) {
  if (!c.tags) {
    c.tags = c.grp ? [c.grp] : [];
    delete c.grp;
  }
  return c;
}

// ── COLOR PALETTE FOR TAGS ────────────────────────────────────────────────────
const CT_TAG_COLORS = [
  '#7cb9e8','#8dd4a0','#e8a87c','#c4a8e8',
  '#e8d47c','#e889b8','#7ce8d4','#a8b8e8',
  '#e88888','#b8e88d','#e8c47c','#8ab8e8',
];
function ctTagColor(tag, groups) {
  const idx = groups.indexOf(tag);
  return CT_TAG_COLORS[idx >= 0 ? idx % CT_TAG_COLORS.length : (tag.charCodeAt(0) % CT_TAG_COLORS.length)];
}
function ctTagBg(tag, groups) {
  const col = ctTagColor(tag, groups);
  return col + '28'; // ~16% opacity
}

// Identity key
function ctKey(c) { return `${c.fn}|${c.ln}|${c.bm}|${c.bd}|${c.by}`; }

// ── VIEW STATE ────────────────────────────────────────────────────────────────
let _ctViewInit = false;
let _ctTableBody = null;
let _ctPagerEl   = null;
let _ctPillsEl   = null;

// ── INIT VIEW (called once) ───────────────────────────────────────────────────
function ctInitView() {
  const view = document.getElementById('contactsView');
  if (_ctViewInit) return;
  _ctViewInit = true;
  view.innerHTML = '';

  const wrap = document.createElement('div'); wrap.className = 'ct-view';

  // ── Toolbar ──
  const toolbar = document.createElement('div'); toolbar.className = 'ct-toolbar';
  const title = document.createElement('div'); title.className = 'ct-view-title'; title.textContent = '👥 Contacts';
  toolbar.appendChild(title);

  // Search with × clear
  const searchWrap = document.createElement('div'); searchWrap.className = 'ct-search-wrap';
  const searchIn = document.createElement('input'); searchIn.type = 'text';
  searchIn.className = 'ct-search-input'; searchIn.id = 'ctSearchInput';
  searchIn.placeholder = 'Rechercher…'; searchIn.value = ctFilter;
  const clearBtn = document.createElement('button'); clearBtn.className = 'ct-search-clear'; clearBtn.textContent = '✕';
  clearBtn.title = 'Effacer le filtre';
  clearBtn.addEventListener('click', () => {
    ctFilter = ''; searchIn.value = ''; searchWrap.classList.remove('has-value');
    ctPage = 1; ctRenderBody(); ctRenderPager();
    searchIn.focus();
  });
  searchIn.addEventListener('input', () => {
    ctFilter = searchIn.value;
    searchWrap.classList.toggle('has-value', !!ctFilter);
    ctPage = 1; ctRenderBody(); ctRenderPager();
  });
  if (ctFilter) searchWrap.classList.add('has-value');
  searchWrap.appendChild(searchIn); searchWrap.appendChild(clearBtn);
  toolbar.appendChild(searchWrap);

  const spacer = document.createElement('div'); spacer.style.flex='1'; toolbar.appendChild(spacer);

  const addBtn = document.createElement('button'); addBtn.className = 'ct-add-btn'; addBtn.textContent = '＋ Ajouter';
  addBtn.addEventListener('click', () => ctShowContactModal(null));
  toolbar.appendChild(addBtn);

  const grpBtn = document.createElement('button');
  grpBtn.style.cssText = 'padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-family:"DM Sans",sans-serif;font-size:.82rem;cursor:pointer;white-space:nowrap;';
  grpBtn.textContent = '⚙ Tags';
  grpBtn.addEventListener('click', ctShowGroupsModal);
  toolbar.appendChild(grpBtn);
  wrap.appendChild(toolbar);

  // ── Tag Pills ──
  _ctPillsEl = document.createElement('div'); _ctPillsEl.id = 'ctGroupPills'; _ctPillsEl.className = 'ct-group-pills';
  wrap.appendChild(_ctPillsEl);

  // ── Table ──
  const tableWrap = document.createElement('div'); tableWrap.className = 'ct-table-wrap';
  const table = document.createElement('table'); table.className = 'ct-table';

  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  const cols = [
    {key:'fn', label:'Prénom'}, {key:'ln', label:'Nom'}, {key:'tags', label:'Tags'},
    {key:'bday', label:'Anniversaire'}, {key:'dday', label:'Décès'}, {key:null, label:''}
  ];
  cols.forEach(col => {
    const th = document.createElement('th'); th.className = 'ct-th' + (col.key ? ' ct-th-sort' : '');
    th.innerHTML = col.label + (col.key ? `<span class="ct-sort-icon">${col.key===ctSortField?(ctSortAsc?'▲':'▼'):'▲▼'}</span>` : '');
    if (col.key) th.addEventListener('click', () => {
      if (ctSortField === col.key) ctSortAsc = !ctSortAsc; else { ctSortField = col.key; ctSortAsc = true; }
      ctPage = 1; ctRenderBody(); ctRenderPager();
      thead.querySelectorAll('.ct-sort-icon').forEach((ic,i) => {
        ic.textContent = cols[i].key === ctSortField ? (ctSortAsc?'▲':'▼') : '▲▼';
      });
    });
    hrow.appendChild(th);
  });
  thead.appendChild(hrow); table.appendChild(thead);

  _ctTableBody = document.createElement('tbody');
  table.appendChild(_ctTableBody);
  tableWrap.appendChild(table); wrap.appendChild(tableWrap);

  // ── Pager ──
  _ctPagerEl = document.createElement('div'); _ctPagerEl.className = 'ct-pager';
  wrap.appendChild(_ctPagerEl);

  view.appendChild(wrap);
  ctRenderPills(); ctRenderBody(); ctRenderPager();
}

// ── TAG PILLS ─────────────────────────────────────────────────────────────────
function ctRenderPills() {
  if (!_ctPillsEl) return;
  const groups = ctLoadGroups();
  const contacts = ctLoadContacts().map(ctMigrateContact);
  _ctPillsEl.innerHTML = '';

  const mkPill = (label, filterVal, count, color) => {
    const pill = document.createElement('button'); pill.className = 'ct-group-pill' + (ctTagFilter === filterVal ? ' active' : '');
    if (color && ctTagFilter !== filterVal) {
      pill.style.borderColor = color;
      pill.style.color = color;
    }
    if (color && ctTagFilter === filterVal) {
      pill.style.background = color;
      pill.style.borderColor = color;
    }

    if (color) {
      const dot = document.createElement('span'); dot.className = 'ct-pill-dot';
      dot.style.background = color; pill.appendChild(dot);
    }
    const lbl = document.createElement('span'); lbl.textContent = `${label} (${count})`; pill.appendChild(lbl);

    pill.addEventListener('click', () => {
      ctTagFilter = ctTagFilter === filterVal ? '' : filterVal;
      ctPage = 1; ctRenderPills(); ctRenderBody(); ctRenderPager();
    });
    _ctPillsEl.appendChild(pill);
  };

  mkPill('Tous', '', contacts.length, null);
  groups.forEach(g => {
    const n = contacts.filter(c => (c.tags||[]).includes(g)).length;
    mkPill(g, g, n, ctTagColor(g, groups));
  });
  const noTag = contacts.filter(c => !(c.tags||[]).length).length;
  if (noTag > 0) mkPill('Sans tag', '__none__', noTag, '#bbb');
}

// ── TABLE BODY ────────────────────────────────────────────────────────────────
function ctRenderBody() {
  if (!_ctTableBody) return;
  const groups  = ctLoadGroups();
  let contacts  = ctLoadContacts().map(ctMigrateContact);

  // Tag filter
  if (ctTagFilter === '__none__') contacts = contacts.filter(c => !(c.tags||[]).length);
  else if (ctTagFilter) contacts = contacts.filter(c => (c.tags||[]).includes(ctTagFilter));

  // Text filter
  if (ctFilter) {
    const q = ctFilter.toLowerCase();
    contacts = contacts.filter(c => (c.fn||'').toLowerCase().includes(q) || (c.ln||'').toLowerCase().includes(q));
  }

  // Sort
  contacts.sort((a,b) => {
    let va, vb;
    if (ctSortField === 'bday') { va = (a.bm||0)*100+(a.bd||0); vb = (b.bm||0)*100+(b.bd||0); }
    else if (ctSortField === 'dday') { va = a.dy||0; vb = b.dy||0; }
    else if (ctSortField === 'tags') { va = (a.tags||[]).join(','); vb = (b.tags||[]).join(','); }
    else { va = (a[ctSortField]||'').toString().toLowerCase(); vb = (b[ctSortField]||'').toString().toLowerCase(); }
    if (va < vb) return ctSortAsc ? -1 : 1;
    if (va > vb) return ctSortAsc ? 1 : -1;
    return 0;
  });

  const total = contacts.length;
  const start = (ctPage-1) * CT_PAGE_SIZE;
  const pageContacts = contacts.slice(start, start + CT_PAGE_SIZE);

  _ctTableBody.innerHTML = '';
  if (!pageContacts.length) {
    const emptyRow = document.createElement('tr');
    const emptyTd = document.createElement('td'); emptyTd.colSpan = 6; emptyTd.className = 'ct-empty';
    emptyTd.textContent = ctFilter || ctTagFilter ? 'Aucun résultat.' : 'Aucun contact.';
    emptyRow.appendChild(emptyTd); _ctTableBody.appendChild(emptyRow); return;
  }

  pageContacts.forEach(c => {
    const key = ctKey(c);
    const tr = document.createElement('tr'); tr.className = 'ct-tr' + (c.dy ? ' ct-tr-deceased' : '');

    const mkEditableTd = (field, displayVal, editVal) => {
      const td = document.createElement('td'); td.className = 'ct-td'; td.textContent = displayVal;
      td.title = 'Cliquer pour modifier'; td.style.cursor = 'pointer';
      td.addEventListener('click', () => {
        td.innerHTML = '';
        const inp = document.createElement('input'); inp.className = 'ct-inline-input';
        inp.value = editVal !== undefined ? editVal : displayVal;
        td.appendChild(inp); inp.focus(); inp.select();
        const commit = () => {
          const val = inp.value.trim();
          const all = ctLoadContacts().map(ctMigrateContact);
          const idx = all.findIndex(x => ctKey(x) === key);
          if (idx >= 0) { all[idx][field] = val; ctSaveContacts(all); }
          ctRenderBody(); ctRenderPager();
          if (window.ctInjectAllBirthdays) ctInjectAllBirthdays();
        };
        inp.addEventListener('blur', commit);
        inp.addEventListener('keydown', e => { if (e.key==='Enter') inp.blur(); if (e.key==='Escape') ctRenderBody(); });
      });
      return td;
    };

    const mkDateTd = (y, m, d, fieldY, fieldM, fieldD) => {
      const td = document.createElement('td'); td.className = 'ct-td';
      const isBday = fieldY === 'by'; // birthday gets age calculation
      let display = '';
      if (m && d) {
        display = `${String(d).padStart(2,'0')}-${String(m).padStart(2,'0')}`;
        if (y) {
          display += `-${y}`;
          if (isBday) {
            const thisYear = new Date().getFullYear();
            const age = thisYear - y;
            display += ` (${age} ans)`;
          }
        }
      }
      td.textContent = display; td.style.cursor = 'pointer'; td.title = 'Cliquer pour modifier';
      td.addEventListener('click', () => {
        td.innerHTML = '';
        const current = y&&m&&d ? `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}` : '';
        const inp = document.createElement('input'); inp.className = 'ct-inline-date';
        inp.type = 'text'; inp.placeholder = 'YYYY-MM-DD'; inp.value = current;
        td.appendChild(inp); inp.focus(); inp.select();
        const commit = () => {
          const val = inp.value.trim();
          const all = ctLoadContacts().map(ctMigrateContact);
          const idx = all.findIndex(x => ctKey(x) === key);
          if (idx >= 0) {
            if (!val) { all[idx][fieldY]=null; all[idx][fieldM]=null; all[idx][fieldD]=null; }
            else {
              const parts = val.split('-');
              if (parts.length===3) { all[idx][fieldY]=parseInt(parts[0])||null; all[idx][fieldM]=parseInt(parts[1])||null; all[idx][fieldD]=parseInt(parts[2])||null; }
            }
            ctSaveContacts(all);
          }
          ctRenderBody(); if (window.ctInjectAllBirthdays) ctInjectAllBirthdays();
        };
        inp.addEventListener('blur', commit);
        inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); if(e.key==='Escape') ctRenderBody(); });
      });
      return td;
    };

    // Tags cell — inline multi-tag editor
    const mkTagsTd = () => {
      const td = document.createElement('td'); td.className = 'ct-td';
      const renderTags = () => {
        td.innerHTML = '';
        const tags = c.tags || [];
        const cell = document.createElement('div'); cell.className = 'ct-tags-cell';
        tags.forEach(tag => {
          const badge = document.createElement('span'); badge.className = 'ct-grp-badge';
          const col = ctTagColor(tag, groups);
          badge.style.cssText = `background:${ctTagBg(tag,groups)};color:${col};border-color:${col};`;
          badge.textContent = tag; cell.appendChild(badge);
        });
        if (!tags.length) { const empty = document.createElement('span'); empty.style.color='#bbb'; empty.style.fontSize='.75rem'; empty.textContent='—'; cell.appendChild(empty); }
        td.appendChild(cell);
      };
      renderTags();
      td.style.cursor = 'pointer'; td.title = 'Cliquer pour modifier les tags';
      td.addEventListener('click', (e) => {
        e.stopPropagation();
        td.innerHTML = '';
        const picker = document.createElement('div'); picker.className = 'ct-tags-picker';
        const curTags = [...(c.tags||[])];
        groups.forEach(g => {
          const btn = document.createElement('button'); btn.className = 'ct-tag-toggle' + (curTags.includes(g)?' selected':'');
          btn.textContent = g;
          const col = ctTagColor(g, groups);
          if (curTags.includes(g)) btn.style.background = col;
          btn.addEventListener('click', e2 => { e2.stopPropagation();
            const idx = curTags.indexOf(g);
            if (idx >= 0) curTags.splice(idx,1); else curTags.push(g);
            btn.classList.toggle('selected', curTags.includes(g));
            btn.style.background = curTags.includes(g) ? col : '';
          });
          picker.appendChild(btn);
        });
        td.appendChild(picker);
        const save = () => {
          c.tags = curTags;
          const all = ctLoadContacts().map(ctMigrateContact);
          const idx = all.findIndex(x => ctKey(x) === key);
          if (idx >= 0) { all[idx].tags = curTags; ctSaveContacts(all); }
          ctRenderPills(); ctRenderBody();
        };
        // Save on click outside — use setTimeout to skip the current event
        setTimeout(() => document.addEventListener('click', function outsideClick(e) {
          if (!td.contains(e.target)) { document.removeEventListener('click', outsideClick); save(); }
        }), 0);
      });
      return td;
    };

    const bdayStr = c.bm&&c.bd ? `${String(c.bm).padStart(2,'0')}-${String(c.bd).padStart(2,'0')}${c.by?' ('+c.by+')':''}` : '';
    const ddayStr = c.dy&&c.dm&&c.dd ? `${c.dy}-${String(c.dm).padStart(2,'0')}-${String(c.dd).padStart(2,'0')}` : '';

    tr.appendChild(mkEditableTd('fn', c.fn||'', c.fn||''));
    tr.appendChild(mkEditableTd('ln', c.ln||'', c.ln||''));
    tr.appendChild(mkTagsTd());
    tr.appendChild(mkDateTd(c.by, c.bm, c.bd, 'by', 'bm', 'bd'));
    tr.appendChild(mkDateTd(c.dy, c.dm, c.dd, 'dy', 'dm', 'dd'));

    // Actions
    const actTd = document.createElement('td'); actTd.className = 'ct-td-actions';
    const editBtn = document.createElement('button'); editBtn.className = 'ct-row-btn'; editBtn.textContent = '✏'; editBtn.title = 'Modifier';
    editBtn.addEventListener('click', e => { e.stopPropagation(); ctShowContactModal(c); });
    const delBtn = document.createElement('button'); delBtn.className = 'ct-row-btn ct-row-btn-del'; delBtn.textContent = '✕'; delBtn.title = 'Supprimer';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm(`Supprimer ${c.fn||''} ${c.ln||''} ?`)) {
        const all = ctLoadContacts().map(ctMigrateContact);
        ctSaveContacts(all.filter(x => ctKey(x) !== key));
        ctRenderPills(); ctRenderBody(); ctRenderPager();
        if (window.ctInjectAllBirthdays) ctInjectAllBirthdays();
      }
    });
    actTd.appendChild(editBtn); actTd.appendChild(delBtn); tr.appendChild(actTd);
    _ctTableBody.appendChild(tr);
  });
}

// ── PAGER ─────────────────────────────────────────────────────────────────────
function ctRenderPager() {
  if (!_ctPagerEl) return;
  const groups   = ctLoadGroups();
  let contacts   = ctLoadContacts().map(ctMigrateContact);
  if (ctTagFilter === '__none__') contacts = contacts.filter(c => !(c.tags||[]).length);
  else if (ctTagFilter) contacts = contacts.filter(c => (c.tags||[]).includes(ctTagFilter));
  if (ctFilter) { const q=ctFilter.toLowerCase(); contacts=contacts.filter(c=>(c.fn||'').toLowerCase().includes(q)||(c.ln||'').toLowerCase().includes(q)); }

  const total = contacts.length;
  const pages = Math.ceil(total / CT_PAGE_SIZE) || 1;
  if (ctPage > pages) ctPage = pages;
  _ctPagerEl.innerHTML = '';

  const info = document.createElement('span'); info.className = 'ct-pager-info';
  const s = (ctPage-1)*CT_PAGE_SIZE+1, e = Math.min(ctPage*CT_PAGE_SIZE, total);
  info.textContent = total ? `${s}–${e} sur ${total}` : '0 contact';
  _ctPagerEl.appendChild(info);

  if (pages <= 1) return;
  const btns = document.createElement('div'); btns.className = 'ct-pager-btns';

  const mk = (label, page, active=false, disabled=false) => {
    const b = document.createElement('button'); b.className = 'ct-pager-btn' + (active?' active':'');
    b.textContent = label; b.disabled = disabled;
    b.addEventListener('click', () => { ctPage = page; ctRenderBody(); ctRenderPager(); });
    btns.appendChild(b);
  };
  const dots = () => { const d=document.createElement('span'); d.className='ct-pager-dots'; d.textContent='…'; btns.appendChild(d); };

  mk('‹', ctPage-1, false, ctPage<=1);
  for (let i=1; i<=pages; i++) {
    if (i===1||i===pages||Math.abs(i-ctPage)<=1) mk(i, i, i===ctPage);
    else if (i===2&&ctPage>4) dots();
    else if (i===pages-1&&ctPage<pages-3) dots();
  }
  mk('›', ctPage+1, false, ctPage>=pages);
  _ctPagerEl.appendChild(btns);
}

// ── GROUPS MODAL ──────────────────────────────────────────────────────────────
function ctShowGroupsModal() {
  document.getElementById('ctGrpModal')?.remove();
  const groups = ctLoadGroups().map((g,i) => ({name:g, color:ctTagColor(g, ctLoadGroups())}));

  const overlay = document.createElement('div');
  overlay.id = 'ctGrpModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;';

  const modal = document.createElement('div');
  modal.style.cssText = 'background:var(--bg);border-radius:14px;width:90%;max-width:380px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);';

  const mhd = document.createElement('div');
  mhd.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;';
  const mt = document.createElement('div'); mt.style.cssText='font-family:"DM Serif Display",serif;font-size:1rem;color:var(--text);'; mt.textContent = '⚙ Gérer les tags';
  const mc = document.createElement('button'); mc.textContent='✕'; mc.style.cssText='width:28px;height:28px;border-radius:7px;border:none;background:var(--surface);color:var(--muted);cursor:pointer;';
  mc.addEventListener('click', () => overlay.remove());
  mhd.appendChild(mt); mhd.appendChild(mc);

  const mbd = document.createElement('div');
  mbd.style.cssText = 'padding:18px 20px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;';

  let localGroups = ctLoadGroups();

  const buildList = () => {
    mbd.innerHTML = '';
    localGroups.forEach((g, i) => {
      const row = document.createElement('div'); row.className = 'ct-grp-row';
      const col = ctTagColor(g, localGroups);

      // Color dot
      const colorWrap = document.createElement('span'); colorWrap.style.cssText='position:relative;display:inline-flex;';
      const colorDot = document.createElement('span');
      colorDot.style.cssText = `width:18px;height:18px;border-radius:50%;background:${col};flex-shrink:0;cursor:pointer;border:2px solid rgba(0,0,0,.12);`;
      const colorIn = document.createElement('input'); colorIn.type='color'; colorIn.value=col;
      colorIn.style.cssText='position:absolute;opacity:0;width:0;height:0;';
      colorDot.addEventListener('click', ()=>colorIn.click());
      colorIn.addEventListener('change', ()=>{ colorDot.style.background=colorIn.value; });
      colorWrap.appendChild(colorDot); colorWrap.appendChild(colorIn);

      const inp = document.createElement('input');
      inp.style.cssText='flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-family:"DM Sans",sans-serif;font-size:.84rem;color:var(--text);background:var(--bg);outline:none;';
      inp.value = g;
      inp.addEventListener('input', () => localGroups[i] = inp.value);

      const del = document.createElement('button'); del.textContent='✕';
      del.style.cssText='width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;flex-shrink:0;';
      del.addEventListener('click', () => { localGroups.splice(i,1); buildList(); });

      row.appendChild(colorWrap); row.appendChild(inp); row.appendChild(del);
      mbd.appendChild(row);
    });

    const addRow = document.createElement('button');
    addRow.style.cssText='padding:8px 14px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:.8rem;cursor:pointer;width:100%;';
    addRow.textContent = '＋ Nouveau tag';
    addRow.addEventListener('click', () => { localGroups.push('Nouveau'); buildList(); });
    mbd.appendChild(addRow);
  };
  buildList();

  const mft = document.createElement('div');
  mft.style.cssText = 'display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;';
  const cancel = document.createElement('button'); cancel.className='kb-btn-cancel'; cancel.textContent='Annuler'; cancel.addEventListener('click',()=>overlay.remove());
  const save = document.createElement('button'); save.className='kb-btn-save'; save.textContent='Enregistrer';
  save.addEventListener('click', () => {
    ctSaveGroups(localGroups.filter(g=>g.trim()));
    overlay.remove();
    ctRenderPills(); ctRenderBody();
  });
  mft.appendChild(cancel); mft.appendChild(save);
  modal.appendChild(mhd); modal.appendChild(mbd); modal.appendChild(mft);
  overlay.appendChild(modal); document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
}

// ── CONTACT MODAL (add/edit) ──────────────────────────────────────────────────
function ctShowContactModal(contact) {
  document.getElementById('ctContactModal')?.remove();
  const isEdit = !!contact;
  const groups = ctLoadGroups();

  const overlay = document.createElement('div');
  overlay.id = 'ctContactModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;';

  const modal = document.createElement('div');
  modal.style.cssText = 'background:var(--bg);border-radius:14px;width:90%;max-width:440px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);';

  const mhd = document.createElement('div');
  mhd.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;';
  const mt = document.createElement('div'); mt.style.cssText='font-family:"DM Serif Display",serif;font-size:1rem;color:var(--text);'; mt.textContent = isEdit ? '✏ Modifier le contact' : '＋ Nouveau contact';
  const mc = document.createElement('button'); mc.textContent='✕'; mc.style.cssText='width:28px;height:28px;border-radius:7px;border:none;background:var(--surface);color:var(--muted);cursor:pointer;';
  mc.addEventListener('click', ()=>overlay.remove());
  mhd.appendChild(mt); mhd.appendChild(mc);

  const mbd = document.createElement('div');
  mbd.style.cssText = 'padding:18px 20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;flex:1;';

  const mkField = (label, el) => {
    const w = document.createElement('div'); w.style.cssText='display:flex;flex-direction:column;gap:5px;';
    const l = document.createElement('label'); l.style.cssText='font-family:"DM Sans",sans-serif;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;'; l.textContent=label;
    w.appendChild(l); w.appendChild(el); return w;
  };
  const mkInput = (val, placeholder='') => {
    const i = document.createElement('input'); i.className='kb-field-input'; i.value=val||''; i.placeholder=placeholder; return i;
  };

  const fnIn = mkInput(contact?.fn||'', 'Prénom');
  const lnIn = mkInput(contact?.ln||'', 'Nom');

  // Tags picker
  const tagsPicker = document.createElement('div'); tagsPicker.className='ct-tags-picker';
  let selectedTags = [...(contact?.tags||[])];
  groups.forEach(g => {
    const col = ctTagColor(g, groups);
    const btn = document.createElement('button'); btn.className='ct-tag-toggle'+(selectedTags.includes(g)?' selected':'');
    btn.textContent = g; btn.type='button';
    if (selectedTags.includes(g)) btn.style.background = col;
    btn.addEventListener('click', () => {
      const idx = selectedTags.indexOf(g);
      if (idx>=0) selectedTags.splice(idx,1); else selectedTags.push(g);
      btn.classList.toggle('selected', selectedTags.includes(g));
      btn.style.background = selectedTags.includes(g) ? col : '';
    });
    tagsPicker.appendChild(btn);
  });

  // Birthday row
  const bdRow = document.createElement('div'); bdRow.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;';
  const bmIn = mkInput(contact?.bm||'', 'Mois (1-12)'); bmIn.type='number'; bmIn.min=1; bmIn.max=12;
  const bdIn = mkInput(contact?.bd||'', 'Jour (1-31)'); bdIn.type='number'; bdIn.min=1; bdIn.max=31;
  const byIn = mkInput(contact?.by||'', 'Année'); byIn.type='number'; byIn.min=1900; byIn.max=2099;
  bdRow.appendChild(bmIn); bdRow.appendChild(bdIn); bdRow.appendChild(byIn);

  // Death date
  const ddRow = document.createElement('div'); ddRow.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;';
  const dmIn = mkInput(contact?.dm||'', 'Mois'); dmIn.type='number'; dmIn.min=1; dmIn.max=12;
  const ddIn = mkInput(contact?.dd||'', 'Jour'); ddIn.type='number'; ddIn.min=1; ddIn.max=31;
  const dyIn = mkInput(contact?.dy||'', 'Année'); dyIn.type='number'; dyIn.min=1900; dyIn.max=2099;
  ddRow.appendChild(dmIn); ddRow.appendChild(ddIn); ddRow.appendChild(dyIn);

  mbd.appendChild(mkField('Prénom *', fnIn));
  mbd.appendChild(mkField('Nom', lnIn));
  mbd.appendChild(mkField('Tags', tagsPicker));
  mbd.appendChild(mkField('Anniversaire (Mois / Jour / Année)', bdRow));
  mbd.appendChild(mkField('Décès (Mois / Jour / Année)', ddRow));

  const mft = document.createElement('div');
  mft.style.cssText='display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;';
  const cancel = document.createElement('button'); cancel.className='kb-btn-cancel'; cancel.textContent='Annuler'; cancel.addEventListener('click',()=>overlay.remove());
  const saveBtn = document.createElement('button'); saveBtn.className='kb-btn-save'; saveBtn.textContent=isEdit?'Enregistrer':'Créer';
  saveBtn.addEventListener('click', () => {
    const fn=fnIn.value.trim(); if(!fn){fnIn.style.borderColor='#e05';fnIn.focus();return;}
    const newC = {
      fn, ln:lnIn.value.trim(),
      tags: selectedTags,
      bm: parseInt(bmIn.value)||null, bd: parseInt(bdIn.value)||null, by: parseInt(byIn.value)||null,
      dm: parseInt(dmIn.value)||null, dd: parseInt(ddIn.value)||null, dy: parseInt(dyIn.value)||null,
    };
    const all = ctLoadContacts().map(ctMigrateContact);
    if (isEdit) {
      const k = ctKey(contact); const idx=all.findIndex(x=>ctKey(x)===k);
      if(idx>=0) all[idx]=newC; else all.push(newC);
    } else all.push(newC);
    ctSaveContacts(all); overlay.remove();
    ctRenderPills(); ctRenderBody(); ctRenderPager();
    if(window.ctInjectAllBirthdays) ctInjectAllBirthdays();
  });
  fnIn.addEventListener('keydown', e=>{if(e.key==='Enter')saveBtn.click();});
  mft.appendChild(cancel); mft.appendChild(saveBtn);
  modal.appendChild(mhd); modal.appendChild(mbd); modal.appendChild(mft);
  overlay.appendChild(modal); document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{if(e.target===overlay)overlay.remove();});
  fnIn.focus();
}

// ── CONTACTS TAB BUTTON ───────────────────────────────────────────────────────
document.getElementById('btnContacts').addEventListener('click', () => {
  ['trackerView','kanbanView','scrollArea','monthView','weeklyView'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  const sw=document.querySelector('.strip-wrapper'); if(sw) sw.style.display='none';
  document.querySelectorAll('.btn-view').forEach(b=>b.classList.remove('active'));
  document.getElementById('btnContacts').classList.add('active');
  // Hide kanban-specific header buttons
  // Prefs button stays visible always (it's a global settings button)
  const cv=document.getElementById('contactsView'); cv.style.display='flex';
  ctInitView();
  ctRenderPills(); ctRenderBody(); ctRenderPager();
});

// Expose globally for use by planner
window.ctInjectAllBirthdays = ctInjectAllBirthdays;

</script>

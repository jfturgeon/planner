<script>
const MONTHS_FR   = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MONTHS_SH   = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const DAYS_FULL   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAYS_SUN    = ['D','L','M','M','J','V','S'];
const COL_W       = 220;

// Month color palettes (softer):
// [rowBg, rowText, rowWeBg, rowWeText, calBg, calText, calWeBg, calWeText, calDataBg, calWeDataBg]
const MONTH_PALETTE = [
  ['#edf4fe','#3b62a8','#dce8fc','#2952a3','#edf4fe','#3b62a8','#dce8fc','#2952a3','#c8d9f5','#b8c9e8'], // Jan — blue
  ['#fdf0f8','#a0306a','#fbe2f2','#8f2060','#fdf0f8','#a0306a','#fbe2f2','#8f2060','#f5c8e4','#edbadc'], // Feb — pink
  ['#edf8f2','#2e7a54','#d8f2e4','#246843','#edf8f2','#2e7a54','#d8f2e4','#246843','#b8e8cc','#a8d8bc'], // Mar — green
  ['#fefdf0','#7a5c14','#fdf8d0','#6a4c0a','#fefdf0','#7a5c14','#fdf8d0','#6a4c0a','#f4e898','#ead888'], // Apr — yellow
  ['#fef5ec','#8c4018','#feecd8','#7a3010','#fef5ec','#8c4018','#feecd8','#7a3010','#f8d4b0','#f0c4a0'], // May — orange
  ['#ecf7fe','#1a5c84','#d4eefb','#144c74','#ecf7fe','#1a5c84','#d4eefb','#144c74','#b0dcf4','#9cccec'], // Jun — sky
  ['#f4f0fe','#5024a0','#e8e0fc','#4018908','#f4f0fe','#5024a0','#e8e0fc','#401890','#d0c0f4','#c0b0e8'], // Jul — purple
  ['#fef0f0','#8c2020','#fde0e0','#7c1818','#fef0f0','#8c2020','#fde0e0','#7c1818','#f8c0c0','#f0b0b0'], // Aug — red
  ['#ecfcf8','#186854','#d4f8f0','#106048','#ecfcf8','#186854','#d4f8f0','#106048','#a8ecd8','#98dcc8'], // Sep — teal
  ['#fefdf0','#6c4010','#fdf8d0','#5c3008','#fefdf0','#6c4010','#fdf8d0','#5c3008','#f4dc90','#e8cc80'], // Oct — amber
  ['#fdf0f5','#8c2050','#fbe0ec','#7c1840','#fdf0f5','#8c2050','#fbe0ec','#7c1840','#f4c0d8','#e8b0c8'], // Nov — rose
  ['#edf2fe','#263c88','#dce8fc','#1c2c78','#edf2fe','#263c88','#dce8fc','#1c2c78','#c4d0f4','#b4c0e8'], // Dec — indigo
];

// ── PERSISTENCE ────────────────────────────────────────────────────────────
function loadData()      { try{ return JSON.parse(localStorage.getItem('ap_data')||'{}'); }catch{ return {}; } }
function saveData(d)     { localStorage.setItem('ap_data', JSON.stringify(d)); }

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, icon='✓', duration=1800){
  let el = document.getElementById('appToast');
  if(!el){
    el = document.createElement('div'); el.id='appToast';
    document.body.appendChild(el);
  }
  // Compact mode for checkboxes (msg IS the icon, no label text)
  const isCompact = (msg==='✓' || msg==='○');
  if(isCompact){
    el.classList.add('toast-compact');
    el.innerHTML = `<span class="toast-icon">${msg}</span>`;
  } else {
    el.classList.remove('toast-compact');
    el.innerHTML = `<span class="toast-icon">${icon}</span><span>${msg}</span>`;
  }
  el.classList.remove('toast-hide');
  el.classList.add('toast-show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>{ el.classList.remove('toast-show'); el.classList.add('toast-hide'); }, duration);
}

function getYear()       { return parseInt(localStorage.getItem('ap_year')||new Date().getFullYear()); }
function storeYear(y)    { localStorage.setItem('ap_year', y); }
function getWS()         { return parseInt(localStorage.getItem('ap_ws')||'0'); }
function storeWS(v)      { localStorage.setItem('ap_ws', v); }

let appData = loadData();
let CY      = getYear();   // current year
let currentKey  = null;
let modalTasks  = [];
const TODAY = new Date();

// ── HELPERS ────────────────────────────────────────────────────────────────
function dkey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function dkDow(dk){ const [y,mo,d]=dk.split('-').map(Number); return new Date(y,mo-1,d).getDay(); } // parse local, no UTC shift
function dim(m)      { return new Date(CY,m+1,0).getDate(); }
function isToday(m,d){ return TODAY.getFullYear()===CY&&TODAY.getMonth()===m&&TODAY.getDate()===d; }
function isWE(dow)   { return dow===0||dow===6; }
function esc(s)      { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function pendingCount(m){
  let c=0;
  for(let d=1;d<=dim(m);d++){
    const e=appData[dkey(CY,m,d)];
    if(e&&e.tasks) c+=e.tasks.filter(t=>!t.done).length;
  }
  return c;
}
function monthOffset(m){
  const ws=getWS(), fd=new Date(CY,m,1).getDay();
  return ws===0 ? fd : (fd===0?6:fd-1);
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const ydEl=document.getElementById('yearDisp'); if(ydEl) ydEl.textContent=CY;
  const wsEl=document.getElementById('weekStart'); if(wsEl) wsEl.value=getWS();
  renderClassicBar('annualView', 'year', String(CY));
  renderStrip();
  renderColumns();
  bindScrollSync();
}

function renderStrip(){
  const strip = document.getElementById('strip');
  strip.innerHTML='';
  strip.style.width = `calc(${COL_W*12}px + ${13} * calc(var(--col-w) / 7))`;
  const GAP = COL_W/7;
  for(let m=0;m<12;m++){
    const tab=document.createElement('div');
    tab.className=`m-tab m-${m}`;
    tab.dataset.m=m;
    const p=pendingCount(m);
    tab.innerHTML=`<span>${MONTHS_SH[m]}</span>${p>0?`<span class="task-badge">${p}</span>`:''}`;
    tab.addEventListener('click',()=>{
      // scroll to column: padding + m * (col + gap)
      const scrollX = GAP + m * (COL_W + GAP);
      document.getElementById('scrollArea').scrollTo({left:scrollX,behavior:'smooth'});
    });
    strip.appendChild(tab);
  }
}

function renderColumns(){
  const ws   = getWS();
  const wrap = document.getElementById('colWrap');
  wrap.innerHTML='';
  // total width = 12 cols + 11 gaps + 2 side paddings, each gap/padding = COL_W/7
  wrap.style.width=`calc(${COL_W*12}px + ${13} * calc(var(--col-w) / 7))`;

  const dowLabels = ws===0 ? DAYS_SUN : [...DAYS_SUN.slice(1), DAYS_SUN[0]];

  for(let m=0;m<12;m++){
    const col=document.createElement('div');
    col.className=`month-col m-${m}`; col.id=`col-${m}`;
    // Inject per-month CSS vars for mini-calendar
    const [_rb,_rt,_rwb,_rwt,calBg,calText,calWeBg,calWeText,calDataBg,calWeDataBg] = MONTH_PALETTE[m];
    col.style.cssText=[
      `--mc-bg:${calBg}`,`--mc-text:${calText}`,
      `--mc-we-bg:${calWeBg}`,`--mc-we-text:${calWeText}`,
      `--mc-data-bg:${calDataBg}`,`--mc-we-data-bg:${calWeDataBg}`,
      `--mc-empty:${calBg}cc`
    ].join(';');

    // DOW header
    const dhr=document.createElement('div'); dhr.className='dow-row';
    for(let i=0;i<7;i++){
      const lbl=document.createElement('div'); lbl.className='dow-lbl';
      const dow=ws===0?i:(i+1)%7;
      lbl.textContent=DAYS_SUN[dow];
      if(isWE(dow)) lbl.classList.add('we');
      dhr.appendChild(lbl);
    }
    col.appendChild(dhr);

    // Mini-calendar
    const cal=document.createElement('div'); cal.className='mini-cal';
    const off=monthOffset(m);
    const days=dim(m);
    for(let i=0;i<off;i++){
      const e=document.createElement('div'); e.className='dc empty'; cal.appendChild(e);
    }
    for(let d=1;d<=days;d++){
      const dow=new Date(CY,m,d).getDay();
      const dc=document.createElement('div');
      const key=dkey(CY,m,d); const entry=appData[key];
      const dcHasData = !!(entry && ((entry.notes && entry.notes.trim()) || (entry.tasks && entry.tasks.length)));
      dc.className='dc'+(isWE(dow)?' we-day':'')+(isToday(m,d)?' is-today':'')+(dcHasData?' has-data':'');
      const num=document.createElement('div'); num.className='dc-num'; num.textContent=d;
      dc.appendChild(num);
      if(entry&&entry.tasks&&entry.tasks.length){
        const dots=document.createElement('div'); dots.className='dc-dots';
        entry.tasks.slice(0,4).forEach(t=>{
          const dot=document.createElement('div');
          dot.className='dot'+(t.done?' done':'')+(t.priority==='urgent'?' urgent':'');
          dots.appendChild(dot);
        });
        dc.appendChild(dots);
      }
      dc.addEventListener('click',()=>openModal(m,d));
      cal.appendChild(dc);
    }
    // pad to always 42 cells (6 rows)
    const totalCells = off + days;
    const remainder  = 42 - totalCells;
    for(let i=0;i<remainder;i++){
      const e=document.createElement('div'); e.className='dc empty'; cal.appendChild(e);
    }
    col.appendChild(cal);

    // Day list — screenshot style: num | DOW | label (soft-edit on click)
    const [palBg, palText, palWeBg, palWeText] = MONTH_PALETTE[m];
    for(let d=1;d<=days;d++){
      const dow=new Date(CY,m,d).getDay();
      const key=dkey(CY,m,d); const entry=appData[key];
      const we=isWE(dow); const today=isToday(m,d);
      const hasData=!!(entry&&((entry.notes&&entry.notes.trim())||(entry.tasks&&entry.tasks.length)));
      const firstTask=entry&&entry.tasks&&entry.tasks.length?entry.tasks[0]:null;
      const noteText=entry&&entry.notes&&entry.notes.trim()?entry.notes.trim():null;
      const labelText=firstTask?firstTask.text:(noteText?noteText:'');

      const row=document.createElement('div'); row.className='ann-row';
      // Colors
      const bg   = today ? '#fde68a' : we ? palWeBg  : palBg;
      const text = today ? '#92400e'   : we ? palWeText : palText;
      row.style.cssText=`background:${bg};color:${text};`;
      if(today) row.style.fontWeight='700';

      // num cell
      const numCell=document.createElement('div'); numCell.className='ann-num';
      numCell.style.cssText=`color:${text};font-weight:${(we||today)?'700':'400'};`;
      numCell.textContent=d;

      // dow cell
      const dowCell=document.createElement('div'); dowCell.className='ann-dow';
      dowCell.style.color=text;
      dowCell.textContent=DAYS_SUN[dow]; // single letter

      // label cell — soft edit
      const labelCell=document.createElement('div'); labelCell.className='ann-label';
      if(hasData) labelCell.style.cssText=`color:${today?'#92400e':we?palWeText:palText};font-weight:${today||firstTask?.priority==='urgent'?'600':'400'};`;
      else labelCell.style.color='transparent'; // empty, show on hover

      const labelSpan=document.createElement('span');
      labelSpan.textContent=labelText;
      labelCell.appendChild(labelSpan);

      // click → soft-edit inline
      row.addEventListener('click', e => {
        if(row.querySelector('.ann-input')) return;
        labelCell.innerHTML='';
        const inp=document.createElement('input'); inp.className='ann-input';
        inp.value=labelText;
        inp.style.cssText=`background:transparent;border:none;outline:none;width:100%;font-family:inherit;font-size:inherit;color:${text};`;
        labelCell.appendChild(inp);
        inp.focus(); inp.select();
        const commit=()=>{
          const val=inp.value.trim();
          const all=loadData();
          if(val){
            const ex=all[key]||{notes:'',tasks:[]};
            if(!ex.tasks) ex.tasks=[];
            if(ex.tasks.length>0) ex.tasks[0].text=val;
            else ex.tasks.push({text:val,priority:'normal',done:false});
            all[key]=ex;
          } else {
            if(all[key]){
              if(all[key].tasks&&all[key].tasks.length===1&&!all[key].notes) delete all[key];
              else if(all[key].tasks) all[key].tasks=all[key].tasks.slice(1);
            }
          }
          saveData(all); appData=all; renderColumns(); if(txt) showToast('Étiquette mise à jour');
        };
        inp.addEventListener('blur',commit);
        inp.addEventListener('keydown',e2=>{ if(e2.key==='Enter'){inp.blur();} if(e2.key==='Escape'){labelCell.innerHTML=''; labelCell.appendChild(labelSpan); } });
        e.stopPropagation();
      });

      row.appendChild(numCell); row.appendChild(dowCell); row.appendChild(labelCell);
      col.appendChild(row);
    }
    wrap.appendChild(col);
  }
}

function bindScrollSync(){
  const sa=document.getElementById('scrollArea');
  const strip=document.getElementById('strip');
  // remove old listener by replacing element clone — instead use a flag
  sa.onscroll=()=>{
    strip.style.transform=`translateX(-${sa.scrollLeft}px)`;
    const GAP2 = COL_W/7;
    const idx=Math.min(11,Math.max(0,Math.round((sa.scrollLeft - GAP2/2) / (COL_W + GAP2))));
    strip.querySelectorAll('.m-tab').forEach((t,i)=>t.classList.toggle('active-tab',i===idx));
  };
  // init
  const idx=Math.min(11,Math.round(sa.scrollLeft/COL_W));
  strip.querySelectorAll('.m-tab')[idx]?.classList.add('active-tab');
}

function openModal(m,d){

function renderModalTasks(){
  const list=document.getElementById('taskList'); list.innerHTML='';
  modalTasks.forEach((t,i)=>{
    const el=document.createElement('div');
    el.className=`ti ${t.done?'done':''} ${t.priority==='urgent'?'urgent':''}`;
    el.innerHTML=`
      <input type="checkbox" ${t.done?'checked':''} data-i="${i}">
      <span class="ti-text">${esc(t.text)}</span>
      <span class="p-badge ${t.priority}">${t.priority==='normal'?'Normal':t.priority==='urgent'?'Urgent':'Faible'}</span>
      <button class="btn-del-t" data-i="${i}">✕</button>`;
    el.querySelector('input').addEventListener('change',e=>{ modalTasks[+e.target.dataset.i].done=e.target.checked; renderModalTasks(); });
    el.querySelector('.btn-del-t').addEventListener('click',e=>{ modalTasks.splice(+e.target.dataset.i,1); renderModalTasks(); });
    list.appendChild(el);
  });

function addTask(){
  const text=document.getElementById('taskInput').value.trim();
  if(!text) return;
  modalTasks.push({text,priority:document.getElementById('taskPriority').value,done:false});
  renderModalTasks();
  document.getElementById('taskInput').value='';
  document.getElementById('taskInput').focus();
}
function saveModal(){
  const notes=document.getElementById('dayNotes').value.trim();
  if(notes||modalTasks.length) appData[currentKey]={notes,tasks:modalTasks};
  else delete appData[currentKey];
  saveData(appData);
  closeModal();
  if(viewMode==='annual'){
    render();
    const m=parseInt(currentKey?.split('-')[1])-1;

// ── UNIFIED VIEW SYSTEM ────────────────────────────────────────────────────
// vueScope:  'day' | 'week' | 'month' | 'year'
// vueStyle:  'classic' | 'calendar'
// Available styles per scope:
//   day   → calendar only
//   week  → classic, calendar
//   month → classic, calendar
//   year  → classic, calendar
let vueScope = 'week';
let vueStyle = 'classic';

// Map scope+style → internal viewMode
function scopeStyleToMode(scope, style){
  if(scope==='day' && style==='habits') return 'habits';
  if(scope==='day')   return 'gcal';
  if(scope==='week')  return style==='classic' ? 'weekly' : 'gcal';
  if(scope==='month') return style==='classic' ? 'month'  : 'gcal';
  if(scope==='year')  return style==='classic' ? 'annual' : 'gcal';
  return 'weekly';
}

// Map internal viewMode back to scope
function modeToScope(mode){
  if(mode==='weekly') return 'week';
  if(mode==='month')  return 'month';
  if(mode==='annual') return 'year';
  if(mode==='gcal')   return vueScope; // keep current scope
  return 'week';
}

// Available styles for each scope
const SCOPE_STYLES = {
  day:   [{ val:'calendar', label:'Vue jour'   }, { val:'habits',   label:'Habitudes'  }],
  week:  [{ val:'classic',  label:'Planning'   }, { val:'calendar', label:'Calendrier' }],
  month: [{ val:'classic',  label:'Planning'   }, { val:'calendar', label:'Calendrier' }],
  year:  [{ val:'classic',  label:'Annuel'     }, { val:'calendar', label:'Calendrier' }],
};

const SCOPE_LABELS = { day:'Jour', week:'Semaine', month:'Mois', year:'Année' }; // period names

function updateStyleDropdown(scope){ /* sub-header removed */ }

function updateSubPeriodLabel(){} // sub-header removed

function applyVueScope(scope, style){
  vueScope = scope; vueStyle = style;
  const mode = scopeStyleToMode(scope, style);
  switchView(mode);
  // Sync gcView when going to gcal
  if(mode==='gcal'){
    if(typeof gcView!=='undefined'){
      if(scope==='day')    gcView='day';
      else if(scope==='week')  gcView='week';
      else if(scope==='month') gcView='month';
      else if(scope==='year')  gcView='year';
    }
    // Always rebuild gcal root (creates bar + gcContent), then render
    if(typeof renderGcal==='function') renderGcal();
  }
  // Update dropdown labels
  updateSubPeriodLabel();
  // Mark active items

}

// Used by both renderClassicBar (classic views) and renderGcal (calendar view)
// scope: 'year'|'month'|'week'|'day'   style: 'classic'|'calendar'
function buildBarDropdowns(barEl, scope, style){
  // Unified dropdown with all scope+style combinations
  const MENU_OPTIONS = [
    {scope:'year',  style:'classic', label:'Année / Annuel'},
    {scope:'year',  style:'calendar', label:'Année / Calendrier'},
    {scope:'month', style:'classic', label:'Mois / Planning'},
    {scope:'month', style:'calendar', label:'Mois / Calendrier'},
    {scope:'week',  style:'classic', label:'Semaine / Planning'},
    {scope:'week',  style:'calendar', label:'Semaine / Calendrier'},
    {scope:'day',   style:'calendar', label:'Jour / Vue jour'},
    {scope:'day',   style:'habits',   label:'Jour / Habitudes'},
  ];

  const right = barEl.querySelector('.gc-bar-right');
  if(!right) return;
  right.innerHTML = '';

  // ── Unified dropdown ──
  const ddWrap = document.createElement('div'); ddWrap.className='gc-dd-wrap';
  const ddBtn  = document.createElement('button'); ddBtn.className='gc-dd-btn';
  const curOption = MENU_OPTIONS.find(o=>o.scope===scope && o.style===style) || MENU_OPTIONS[0];
  ddBtn.innerHTML=`<span class="gc-dd-label">${curOption.label}</span><svg class="gc-dd-arrow" viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z" fill="currentColor"/></svg>`;
  const ddMenu = document.createElement('div'); ddMenu.className='gc-dd-menu';
  MENU_OPTIONS.forEach(opt=>{
    const item=document.createElement('div');
    const isActive = opt.scope===scope && opt.style===style;
    item.className='gc-dd-item'+(isActive?' active':'');
    item.textContent=opt.label;
    item.addEventListener('click',()=>{
      closeBarDropdowns(barEl);
      applyVueScope(opt.scope, opt.style);
    });
    ddMenu.appendChild(item);
  });
  ddBtn.addEventListener('click',e=>{ e.stopPropagation(); toggleBarDropdown(barEl, ddMenu); });
  ddWrap.appendChild(ddBtn); ddWrap.appendChild(ddMenu);
  right.appendChild(ddWrap);

  // Add Event button
  const addEventBtn = document.createElement('button');
  addEventBtn.textContent = '+ Événement';
  addEventBtn.style.cssText = `
    padding: 8px 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
  `;
  addEventBtn.addEventListener('click', () => {
    // Import and call showEventModal from calendars-system.js
    if (typeof showEventModal === 'function') {
      showEventModal();
    }
  });
  right.appendChild(addEventBtn);

  // Close on outside click (scoped to document, deduped)
  if(!barEl._barClickHandler){
    barEl._barClickHandler=()=>closeBarDropdowns(barEl);
    document.addEventListener('click', barEl._barClickHandler);
  }
}

function toggleBarDropdown(barEl, menu){
  const isOpen=menu.classList.contains('open');
  closeBarDropdowns(barEl);
  if(!isOpen) menu.classList.add('open');

function renderClassicBar(containerId, scope, label){
  const container = document.getElementById(containerId);
  if(!container) return;
  const existing = container.querySelector('.gc-bar');
  if(existing) existing.remove();
  const bar = document.createElement('div'); bar.className='gc-bar';
  bar.innerHTML=`
    <div class="gc-bar-left">
      <button class="gc-btn-today" id="clToday">Aujourd'hui</button>
      <button class="gc-nav-btn" id="clPrev">&#8249;</button>
      <button class="gc-nav-btn" id="clNext">&#8250;</button>
      <span class="gc-bar-label">${label}</span>
    </div>
    <div class="gc-bar-right"></div>`;
  container.insertBefore(bar, container.firstChild);

  buildBarDropdowns(bar, scope, 'classic');

  document.getElementById('clToday').onclick=()=>{
    if(scope==='year'){ CY=TODAY.getFullYear(); storeYear(CY); render(); }
    else if(scope==='month'){ monthViewMonth=TODAY.getMonth(); monthViewYear=TODAY.getFullYear(); renderMonthView(); }
    else if(scope==='week'){ weekOffset=0; calOffset=0; renderWeeklyView(); }
  };
  document.getElementById('clPrev').onclick=()=>{
    if(scope==='year'){ CY--; storeYear(CY); render(); }
    else if(scope==='month'){ monthViewMonth--; if(monthViewMonth<0){monthViewMonth=11;monthViewYear--;} renderMonthView(); }
    else if(scope==='week'){ weekOffset--; calOffset=0; renderWeeklyView(); }
  };
  document.getElementById('clNext').onclick=()=>{
    if(scope==='year'){ CY++; storeYear(CY); render(); }
    else if(scope==='month'){ monthViewMonth++; if(monthViewMonth>11){monthViewMonth=0;monthViewYear++;} renderMonthView(); }
    else if(scope==='week'){ weekOffset++; calOffset=0; renderWeeklyView(); }
  };
}

    const isTod = isToday(m,d) && y===TODAY.getFullYear();

    const row = document.createElement('div');
    row.className='mv-list-row'+(isWE(dow)?' mv-lr-we':'')+(isTod?' mv-lr-today':'')+(hasData?' mv-lr-data':'');

    let cont='';
    if(entry&&entry.notes&&entry.notes.trim())
      cont+=`<div class="mv-lr-note">📝 ${esc(entry.notes.trim().substring(0,45))}${entry.notes.trim().length>45?'…':''}</div>`;
    if(entry&&entry.tasks&&entry.tasks.length)
      entry.tasks.forEach(t=>{ cont+=`<div class="mv-lr-task ${t.done?'done':''} ${t.priority==='urgent'?'urgent':''}">${esc(t.text)}</div>`; });
    else if(!hasData)
      cont=`<div class="mv-lr-empty">Cliquer pour ajouter…</div>`;

    row.innerHTML=`<div class="mv-lr-left"><span class="mv-lr-dname">${DAYS_FULL[dow].substring(0,3).toUpperCase()}</span><span class="mv-lr-dnum">${d}</span></div><div class="mv-lr-content">${cont}</div>`;
    row.addEventListener('click',()=>{ openModal(m,d); });
    list.appendChild(row);
  }
}


// ── WEEKLY DATA HELPERS ────────────────────────────────────────────────────
function wkey(k){ return 'w_'+k; } // storage keys for weekly-specific data

function loadWeekly(k)    { return JSON.parse(localStorage.getItem('ap_w_'+k)||'null'); }
function saveWeekly(k,v)  { localStorage.setItem('ap_w_'+k, JSON.stringify(v)); }

// Get Monday (or Sunday) of week containing date
function getWeekStart(date){
  const ws=getWS(), d=new Date(date);
  const day=d.getDay();
  const diff = ws===1 ? (day===0?-6:1-day) : -day;
  d.setDate(d.getDate()+diff); d.setHours(0,0,0,0);
  return d;
}
function getWeekDates(offset=0){
  const start=getWeekStart(TODAY);
  start.setDate(start.getDate()+offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d; });
}
function weekKey(dates){ return `${dates[0].getFullYear()}-W${String(getISOWeek(dates[0])).padStart(2,'0')}`; }
function getISOWeek(d){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=date.getUTCDay()||7;
  date.setUTCDate(date.getUTCDate()+4-day);
  const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

// ── RENDER WEEKLY VIEW ─────────────────────────────────────────────────────
function renderWeeklyView(){
  const wv=document.getElementById('weeklyView');
  const dates=getWeekDates(weekOffset);
  const wk=weekKey(dates);
  const startD=dates[0], endD=dates[6];

  // Week data: habits list, weekly todos
  let wdata=loadWeekly(wk)||{habits:[],weekTodos:[]};

  const fmt=d=>`${d.getDate()} ${MONTHS_FR[d.getMonth()]}`;
  const weekLabel=`${fmt(startD)} – ${fmt(endD)} ${endD.getFullYear()}`;

  wv.innerHTML=`
  <div class="wv-layout">
    <div class="wv-left" id="wvLeft"></div>
    <div class="wv-right"><div class="wv-days-strip" id="wvDays"></div></div>
  </div>`;

  // Shared classic bar — week label in bar, toggle button appended to bar-left
  renderClassicBar('weeklyView', 'week', weekLabel);
  // Add panel toggle button BEFORE Aujourd'hui in gc-bar-left
  const barLeft = document.querySelector('#weeklyView .gc-bar-left');
  const toggleBtn = document.createElement('button');
  toggleBtn.className='gc-nav-btn wv-toggle-left-btn'; toggleBtn.id='wvToggleLeft';
  if(barLeft) barLeft.insertBefore(toggleBtn, barLeft.firstChild);

  let leftVisible = localStorage.getItem('ap_left_panel')!=='0';
  const wvLeft=document.getElementById('wvLeft');
  const applyLeftState=()=>{
    wvLeft.style.display=leftVisible?'':'none';
    toggleBtn.textContent=leftVisible?'◀':'▶';
    toggleBtn.title=leftVisible?'Masquer le panneau':'Afficher le panneau';
    toggleBtn.classList.toggle('active', !leftVisible);
    document.querySelector('.wv-layout').style.gridTemplateColumns=leftVisible?'auto 1fr':'1fr';
  };
  toggleBtn.addEventListener('click',()=>{ leftVisible=!leftVisible; localStorage.setItem('ap_left_panel',leftVisible?'1':'0'); applyLeftState(); });
  applyLeftState();

  renderWvLeft(dates, wk, wdata);
  renderWvDays(dates, wk, wdata);
}

// ── GLOBAL HABITS ─────────────────────────────────────────────────────────
const HABITS_KEY = 'ap_global_habits';
function loadHabits(){ try{ return JSON.parse(localStorage.getItem(HABITS_KEY)||'[]'); }catch{ return []; } }
function saveHabits(h){ localStorage.setItem(HABITS_KEY, JSON.stringify(h)); }

// Track the mini-calendar offset (months from current)
let calOffset = 0;

function renderWvLeft(dates, wk, wdata){
  const left=document.getElementById('wvLeft');
  left.innerHTML='';

  // ── 2 Mini calendars: calOffset month and calOffset+1 month ──
  // Base month from the current week's first day
  const baseDate = new Date(dates[0]);
  baseDate.setMonth(baseDate.getMonth() + calOffset);
  const baseYear  = baseDate.getFullYear();
  const baseMonth = baseDate.getMonth();

  // Calendars side by side in wv-cals-row
  const calsRow = document.createElement('div'); calsRow.className='wv-cals-row';

  // Build both calendars
  for(let ci=0;ci<2;ci++){
    let cm=baseMonth+ci, cy=baseYear;
    if(cm>11){ cm-=12; cy++; }

    const card=document.createElement('div'); card.className='wv-card';
    const hd=document.createElement('div'); hd.className='wv-card-hd';
    if(ci===0){
      hd.innerHTML=`<button class="mv-nav-btn" id="calNavPrev" style="padding:2px 8px;">‹</button><span>${MONTHS_FR[cm]} ${cy}</span><span></span>`;
    } else {
      hd.innerHTML=`<span></span><span>${MONTHS_FR[cm]} ${cy}</span><button class="mv-nav-btn" id="calNavNext" style="padding:2px 8px;">›</button>`;
    }
    card.appendChild(hd);
    const cal=document.createElement('div'); cal.className='wv-mini-cal';
    const dg=document.createElement('div'); dg.className='mc-grid';
    const ws=getWS();

    // DOW headers
    for(let i=0;i<7;i++){
      const dow=ws===0?i:(i+1)%7;
      const lbl=document.createElement('div');
      lbl.className='mc-dow'+(isWE(dow)?' we':'');
      lbl.textContent=DAYS_SUN[dow]; dg.appendChild(lbl);
    }

    const fd=new Date(cy,cm,1).getDay();
    const off=ws===0?fd:(fd===0?6:fd-1);
    const daysInM=new Date(cy,cm+1,0).getDate();

    // Empty cells
    for(let i=0;i<off;i++){
      const e=document.createElement('div'); e.className='mc-day'; dg.appendChild(e);
    }

    // Day cells – group by week row for hover effect
    // We'll attach data-weekstart to each cell for hover grouping
    for(let d=1;d<=daysInM;d++){
      const dow=new Date(cy,cm,d).getDay();
      const dt=new Date(cy,cm,d);
      const inWeek=dates.some(wd=>wd.toDateString()===dt.toDateString());
      const isTod=dt.toDateString()===TODAY.toDateString();

      // Compute week-start key for this day
      const ws2=getWS();
      const tmpDay=dt.getDay();
      const tmpDiff=ws2===1?(tmpDay===0?-6:1-tmpDay):-tmpDay;
      const wStart=new Date(dt); wStart.setDate(wStart.getDate()+tmpDiff);
      const wStartKey=wStart.toDateString();

      const cell=document.createElement('div');
      cell.className='mc-day'+(isWE(dow)?' mc-we':'')+(isTod?' mc-today':inWeek?' mc-in-week':'');
      cell.textContent=d;
      cell.dataset.weekstart=wStartKey;
      cell.dataset.date=dt.toDateString();
      dg.appendChild(cell);
    }

    // Week hover + click: delegate on the grid
    dg.addEventListener('mouseover',e=>{
      const cell=e.target.closest('.mc-day[data-weekstart]');
      if(!cell) return;
      const ws=cell.dataset.weekstart;
      dg.querySelectorAll('.mc-day[data-weekstart]').forEach(c=>{
        if(c.dataset.weekstart===ws && !c.classList.contains('mc-today') && !c.classList.contains('mc-in-week'))
          c.classList.add('mc-hover-week');
      });
    });
    dg.addEventListener('mouseout',e=>{
      const cell=e.target.closest('.mc-day[data-weekstart]');
      if(!cell) return;
      dg.querySelectorAll('.mc-hover-week').forEach(c=>c.classList.remove('mc-hover-week'));
    });
    dg.addEventListener('click',e=>{
      const cell=e.target.closest('.mc-day[data-weekstart]');
      if(!cell) return;
      // Compute weekOffset for the clicked week
      const clickedDate=new Date(cell.dataset.date);
      const currentWeekStart=getWeekStart(TODAY);
      const clickedWeekStart=getWeekStart(clickedDate);
      const diff=Math.round((clickedWeekStart-currentWeekStart)/(7*24*3600*1000));
      weekOffset=diff;
      calOffset=0;
      renderWeeklyView();
    });

    cal.appendChild(dg);
    card.appendChild(cal);
    calsRow.appendChild(card);
  }
  left.appendChild(calsRow);

  // Wire calendar nav buttons
  const prevBtn=left.querySelector('#calNavPrev');
  const nextBtn=left.querySelector('#calNavNext');
  if(prevBtn) prevBtn.onclick=()=>{ calOffset--; renderWvLeft(dates,wk,wdata); };
  if(nextBtn) nextBtn.onclick=()=>{ calOffset++; renderWvLeft(dates,wk,wdata); };

  // ── CALENDARS CARD ──
  const calCard = document.createElement('div'); calCard.className = 'wv-card';
  
  const calHeader = document.createElement('div');
  calHeader.className = 'wv-card-hd';
  calHeader.style.cssText = 'display: flex; align-items: center; gap: 8px; cursor: pointer;';
  
  // Title (left)
  const calTitle = document.createElement('span');
  calTitle.textContent = 'Calendriers';
  calTitle.style.cssText = 'flex: 1;';
  calHeader.appendChild(calTitle);
  
  // Add button (before toggle)
  const calAddBtn = document.createElement('button');
  calAddBtn.textContent = '+';
  calAddBtn.style.cssText = `
    padding: 4px 8px;

    border-radius: 4px;
    cursor: pointer;

    font-size: 0.9rem;
    color: var(--text);
    flex-shrink: 0;

  calAddBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const name = prompt('Nom du calendrier:');
    if (name) {

      calendars.push({
        id: 'cal_' + Date.now(),

  calHeader.appendChild(calToggle);
  
  let calListVisible = localStorage.getItem('ap_wv_calendars_visible') !== '0';
  
  const calBody = document.createElement('div');
  calBody.id = 'wv-calendars-list';
  calBody.style.cssText = calListVisible ? '' : 'display: none;';
  
  const updateCalendarsList = () => {

    const cals = loadCalendars();
    
    cals.forEach(cal => {

      checkbox.style.cssText = 'flex-shrink: 0;';

        cal.visible = checkbox.checked;

          allCals[idx].visible = checkbox.checked;
          saveCalendars(allCals);
          updateCalendarsList();
        }
      });
      item.appendChild(checkbox);
      
      const colorBox = document.createElement('div');
      colorBox.style.cssText = `
        width: 8px;
        height: 8px;
        background: ${cal.color || '#3b82f6'};
        border-radius: 2px;
        flex-shrink: 0;
      `;
      item.appendChild(colorBox);
      
      const label = document.createElement('span');
      label.textContent = cal.name;
      label.style.cssText = 'flex: 1; color: var(--text);';
      item.appendChild(label);
      
      calBody.appendChild(item);
    });
  };
  
  updateCalendarsList();
  
  calHeader.addEventListener('click', () => {
    calListVisible = !calListVisible;
    localStorage.setItem('ap_wv_calendars_visible', calListVisible ? '1' : '0');
    calBody.style.display = calListVisible ? '' : 'none';
    calToggle.textContent = calListVisible ? '▼' : '▶';
  });
  
  calCard.appendChild(calHeader);
  calCard.appendChild(calBody);
  left.appendChild(calCard);

  // ── FILTERS CARD ──
  const filterCard = document.createElement('div'); filterCard.className = 'wv-card';
  
  const filterHeader = document.createElement('div');
  filterHeader.className = 'wv-card-hd';
  filterHeader.style.cssText = 'display: flex; align-items: center; gap: 8px; cursor: pointer;';
  
  const filterTitle = document.createElement('span');
  filterTitle.textContent = 'Filtres';
  filterTitle.style.cssText = 'flex: 1;';
  filterHeader.appendChild(filterTitle);
  
  const filterToggle = document.createElement('span');
  filterToggle.textContent = '▼';
  filterToggle.style.cssText = 'font-size: 0.9rem; flex-shrink: 0;';
  filterHeader.appendChild(filterToggle);
  
  let filterListVisible = localStorage.getItem('ap_wv_filters_visible') !== '0';
  
  const filterBody = document.createElement('div');
  filterBody.id = 'wv-filters-list';
  filterBody.style.cssText = filterListVisible ? '' : 'display: none;';
  
  // Filter options
  const filterOptions = [
    { id: 'tasks', label: '✓ Tâches' },
    { id: 'events', label: '📅 Événements' },
    { id: 'birthdays', label: '🎂 Anniversaires' },
    { id: 'episodes', label: '📺 Épisodes' }
  ];
  
  filterOptions.forEach(option => {
    const item = document.createElement('div');
    item.style.cssText = `
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      font-size: 0.75rem;
    `;
    
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = localStorage.getItem(`ap_wv_filter_${option.id}`) !== '0';
    checkbox.style.cssText = 'flex-shrink: 0;';
    checkbox.addEventListener('change', () => {
      localStorage.setItem(`ap_wv_filter_${option.id}`, checkbox.checked ? '1' : '0');
    });
    item.appendChild(checkbox);
    
    const label = document.createElement('span');
    label.textContent = option.label;
    label.style.cssText = 'color: var(--text);';
    item.appendChild(label);
    
    filterBody.appendChild(item);
  });
  
  filterHeader.addEventListener('click', () => {
    filterListVisible = !filterListVisible;
    localStorage.setItem('ap_wv_filters_visible', filterListVisible ? '1' : '0');
    filterBody.style.display = filterListVisible ? '' : 'none';
    filterToggle.textContent = filterListVisible ? '▼' : '▶';
  });
  
  filterCard.appendChild(filterHeader);
  filterCard.appendChild(filterBody);
  left.appendChild(filterCard);

  // ── Daily habits (GLOBAL – shared across all weeks) ──

  const habCard=document.createElement('div'); habCard.className='wv-card';
  habCard.innerHTML=`<div class="wv-card-hd"><span>Habitudes quotidiennes</span></div>`;
  const habBody=document.createElement('div'); habBody.className='wv-habits-body';

  // Header row
  const hdr=document.createElement('div');
  hdr.className='wv-habits-header-row';
  hdr.innerHTML=`<span class="col-name">Habitude</span>${dates.map(d=>`<span>${DAYS_FULL[d.getDay()][0]}</span>`).join('')}<span></span>`;
  habBody.appendChild(hdr);

  const habList=document.createElement('div'); habList.id='habList';
  const renderHabitRows=()=>{
    const habits=loadHabits();
    habList.innerHTML='';
    if(habits.length===0){
      habList.innerHTML=`<div style="font-size:.72rem;color:#bbb;font-style:italic;padding:6px 0;">Aucune habitude — ajoutez-en ci-dessous</div>`;
    }
    habits.forEach((hab,hi)=>{
      const row=document.createElement('div'); row.className='wv-habit-row';

      // Name cell — click to edit
      const nameSpan=document.createElement('span');
      nameSpan.className='wv-habit-name'; nameSpan.title=hab.name; nameSpan.textContent=hab.name;
      nameSpan.style.cursor='text';
      nameSpan.addEventListener('click',()=>{
        const inp=document.createElement('input');
        inp.type='text'; inp.value=hab.name;
        inp.style.cssText='flex:1;border:none;border-bottom:2px solid var(--accent2);background:transparent;font-family:\'DM Sans\',sans-serif;font-size:.76rem;color:var(--text);outline:none;padding:1px 2px;width:100%;';
        nameSpan.replaceWith(inp);
        inp.focus(); inp.select();
        const commit=()=>{
          const txt=inp.value.trim();
          const h=loadHabits();
          if(txt){ if(h[hi].name!==txt){ h[hi].name=txt; showToast('Habitude renommée'); } }
          else { h.splice(hi,1); showToast('Habitude supprimée','🗑'); }
          saveHabits(h); renderHabitRows();
        };
        inp.addEventListener('blur',commit);
        inp.addEventListener('keydown',e=>{ if(e.key==='Enter') inp.blur(); if(e.key==='Escape') renderHabitRows(); });
      });
      row.appendChild(nameSpan);

      // Checkboxes per day
      dates.forEach((dt)=>{
        const dk=dkey(dt.getFullYear(),dt.getMonth(),dt.getDate());
        const checked=!!(wdata.habitChecks&&wdata.habitChecks[dk]&&wdata.habitChecks[dk][hi]);
        const cbColor=DAY_COLORS[dt.getDay()];
        const span=document.createElement('span'); span.className='wv-habit-cb';
        const cb=document.createElement('input'); cb.type='checkbox';
        cb.style.setProperty('--cb-color', cbColor);
        cb.dataset.hi=hi; cb.dataset.dk=dk;
        if(checked) cb.checked=true;
        cb.addEventListener('change',()=>{
          if(!wdata.habitChecks) wdata.habitChecks={};
          if(!wdata.habitChecks[dk]) wdata.habitChecks[dk]={};

          saveWeekly(wk,wdata);
          showToast((cb.checked?'✓ ':'✗ ')+hab.name+', '+GC_DAYS_LONG[dkDow(dk)], '', 1600);

  const todoBody=document.createElement('div'); todoBody.className='wv-todo-body';

  const todoList=document.createElement('div'); todoList.id='wkTodoList';
  const renderTodoRows=()=>{
    todoList.innerHTML='';

      const item=document.createElement('div'); item.className='wv-todo-item'+(t.done?' done':'');

        wdata.weekTodos[ti].done=cb.checked;
        saveWeekly(wk,wdata); renderTodoRows();

  const todoBtn=document.createElement('button'); todoBtn.textContent='+';
  addTodo.appendChild(todoInput); addTodo.appendChild(todoBtn);
  const doAddTodo=()=>{
    const txt=todoInput.value.trim(); if(!txt) return;
    if(!wdata.weekTodos) wdata.weekTodos=[];
    wdata.weekTodos.push({text:txt,done:false});
    saveWeekly(wk,wdata); todoInput.value=''; showToast('Tâche ajoutée','＋'); renderTodoRows(); todoInput.focus();

  todoBody.appendChild(addTodo);
  todoCard.appendChild(todoBody);
  left.appendChild(todoCard);
}

// Day palette (index = day of week 0-6)
const DAY_COLORS = ['#e8a87c','#7cb9e8','#8dd4a0','#c4a8e8','#e8d47c','#e889b8','#7ce8d4'];

function renderWvDays(dates, wk, wdata){
  const strip=document.getElementById('wvDays');
  strip.innerHTML='';

  // Update habit checkbox colors to match day colors
  // We'll store the dates globally for the habit renderer to use
  window._wvDates = dates;

  dates.forEach((dt,di)=>{
    const y=dt.getFullYear(), m=dt.getMonth(), d=dt.getDate();
    const dk=dkey(y,m,d);
    const isT=dt.toDateString()===TODAY.toDateString();
    const dow=dt.getDay();
    const dayColor=DAY_COLORS[dow];
    const entry=appData[dk]||{notes:'',tasks:[]};
    let dayExtra=JSON.parse(localStorage.getItem('ap_de_'+dk)||'{"events":[]}');
    if(!dayExtra.events) dayExtra.events=[];

    const col=document.createElement('div'); col.className='wv-day-col'+(isT?' today':'');

    // Header
    const hd=document.createElement('div');
    hd.className='wv-day-hd dc-'+dow+(isT?' today-hd':'');
    hd.innerHTML=`<div class="wdn">${DAYS_FULL[dow].toUpperCase()}</div><div class="wdd">${d}</div><div class="wdm">${MONTHS_FR[m]} ${y}</div>`;
    col.appendChild(hd);

    // ── EVENTS SECTION ──
    const evSec=document.createElement('div'); evSec.className='wv-day-section';
    evSec.style.borderTop=`3px solid ${dayColor}`;
    const evHd=document.createElement('div'); evHd.className='wv-sec-title';
    evHd.innerHTML=`<span>Événements</span>`;
    evSec.appendChild(evHd);

    const evList=document.createElement('div');
    evList.dataset.evlist = dk;
    evList.className='wv-ev-scroll';
    const NUM_EV_ROWS=6;

    const saveEvents=()=>{ localStorage.setItem('ap_de_'+dk,JSON.stringify(dayExtra)); };

    const renderEvRows=()=>{
      evList.innerHTML='';
      // Re-inject birthdays after clearing (contacts.js will handle this)
      const sorted=[...dayExtra.events].sort((a,b)=>{
        const aAll=a.allDay||!a.time; const bAll=b.allDay||!b.time;
        if(aAll&&!bAll) return -1; if(!aAll&&bAll) return 1;
        return (a.time||'').localeCompare(b.time||'');
      });
      const total=Math.max(NUM_EV_ROWS, sorted.length);
      for(let ri=0;ri<total;ri++){
        const ev=sorted[ri]||null;
        const row=document.createElement('div'); row.className='wv-event-row';
        const isAllDay=ev&&(ev.allDay||!ev.time);

        const timeSpan=document.createElement('span');
        timeSpan.className='wv-row-time'+(ev?'':' empty');
        if(!ev) timeSpan.textContent='--:--';
        else if(isAllDay){ timeSpan.textContent='Jour'; timeSpan.style.cssText='color:#aaa;font-size:.65rem;font-weight:600;min-width:58px;flex-shrink:0;'; }
        else timeSpan.textContent=ev.time;

        const labelSpan=document.createElement('span');
        labelSpan.className='wv-row-label'+(ev?'':' empty');
        labelSpan.textContent=ev?ev.title:'';

        const delBtn=document.createElement('button');
        delBtn.className='wv-row-del'; delBtn.textContent='✕';

        row.appendChild(timeSpan); row.appendChild(labelSpan); row.appendChild(delBtn);

        const startEdit=(focusTime=false)=>{
          row.innerHTML='';

          // All-day toggle checkbox
          const allDayWrap=document.createElement('label');
          allDayWrap.style.cssText='display:flex;align-items:center;gap:3px;flex-shrink:0;cursor:pointer;font-size:.65rem;color:var(--muted);white-space:nowrap;';
          const allDayCb=document.createElement('input'); allDayCb.type='checkbox';
          allDayCb.style.cssText='width:11px;height:11px;cursor:pointer;accent-color:var(--accent2);';
          allDayCb.checked=ev?!!(ev.allDay||!ev.time):false;
          const allDayLbl=document.createElement('span'); allDayLbl.textContent='Jour';
          allDayWrap.appendChild(allDayCb); allDayWrap.appendChild(allDayLbl);

          const timeIn=document.createElement('input');
          timeIn.type='time'; timeIn.className='wv-row-time-edit';
          timeIn.value=(ev&&!ev.allDay&&ev.time)?ev.time:'';
          timeIn.style.display=allDayCb.checked?'none':'';

          const labelIn=document.createElement('input');
          labelIn.type='text'; labelIn.className='wv-row-edit-input';
          labelIn.placeholder='Titre de l\'événement…';
          labelIn.value=ev?ev.title:'';

          allDayCb.addEventListener('change',()=>{ timeIn.style.display=allDayCb.checked?'none':''; if(!allDayCb.checked) timeIn.focus(); });

          row.appendChild(allDayWrap); row.appendChild(timeIn); row.appendChild(labelIn);
          if(focusTime&&!allDayCb.checked) timeIn.focus(); else { labelIn.focus(); labelIn.select(); }

          let committed=false;
          const commit=()=>{
            if(committed) return; committed=true;
            const t=labelIn.value.trim();
            const isAD=allDayCb.checked;
            const tm=isAD?'':timeIn.value||'00:00';
            if(ev){
              const idx=dayExtra.events.indexOf(ev);
              if(t){ if(idx>-1){ dayExtra.events[idx].title=t; dayExtra.events[idx].time=tm; dayExtra.events[idx].allDay=isAD; } }
              else { if(idx>-1) dayExtra.events.splice(idx,1); }
            } else if(t){ dayExtra.events.push({time:tm,title:t,allDay:isAD}); }
            saveEvents(); renderEvRows();
            // Re-inject birthdays
            if(window.ctInjectAllBirthdays) ctInjectAllBirthdays();
          };
          const blurHandler=()=>{ setTimeout(()=>{ if(!row.contains(document.activeElement)) commit(); }, 150); };
          timeIn.addEventListener('blur', blurHandler);
          labelIn.addEventListener('blur', blurHandler);
          allDayCb.addEventListener('blur', blurHandler);
          labelIn.addEventListener('keydown',e=>{ if(e.key==='Enter'){ labelIn.blur(); } if(e.key==='Escape'){ committed=true; renderEvRows(); if(window.ctInjectAllBirthdays) ctInjectAllBirthdays(); } });
          timeIn.addEventListener('keydown',e=>{ if(e.key==='Enter'){ labelIn.focus(); } if(e.key==='Escape'){ committed=true; renderEvRows(); if(window.ctInjectAllBirthdays) ctInjectAllBirthdays(); } });
        };

        timeSpan.addEventListener('click',e=>{ e.stopPropagation(); startEdit(true); });
        labelSpan.addEventListener('click',e=>{ e.stopPropagation(); startEdit(false); });
        row.addEventListener('click',e=>{ if(e.target===row) startEdit(false); });

        if(ev){
          delBtn.addEventListener('click',e=>{
            e.stopPropagation();
            const idx=dayExtra.events.indexOf(ev);
            if(idx>-1) dayExtra.events.splice(idx,1);
            saveEvents(); renderEvRows();
            if(window.ctInjectAllBirthdays) ctInjectAllBirthdays();
          });
        }

        evList.appendChild(row);
      }
    };
    renderEvRows();
    evSec.appendChild(evList);
    col.appendChild(evSec);

    // ── TASKS SECTION ──
    const taskSec=document.createElement('div'); taskSec.className='wv-day-section';
    taskSec.style.borderTop=`3px solid ${dayColor}`;
    const taskHd=document.createElement('div'); taskHd.className='wv-sec-title';
    taskHd.innerHTML=`<span>Tâches</span>`;
    taskSec.appendChild(taskHd);

    const taskList=document.createElement('div');
    taskList.className='wv-task-scroll';
    taskList.dataset.taskrows = dk;
    const NUM_TASK_ROWS=25;

    const saveTasks=()=>{ appData[dk]=entry; saveData(appData); };
    const deleteSaveTasks=()=>{
      if(entry.tasks&&entry.tasks.length===0&&!entry.notes){
        delete appData[dk];
      } else {
        appData[dk]=entry;
      }
      saveData(appData);
    };

    const renderTaskRows=()=>{
      taskList.innerHTML='';
      if(!entry.tasks) entry.tasks=[];
      const tasks=entry.tasks;
      const epCount=(dow>=1&&dow<=5)?6:0;
      const taskSlots=Math.max(0, NUM_TASK_ROWS - epCount);
      const total=Math.max(taskSlots, tasks.length);
      for(let ri=0;ri<total;ri++){
        const t=tasks[ri]||null;
        const row=document.createElement('div');
        row.className='wv-task-row'+(t&&t.done?' done':'');

        // Drag handle + draggable (only for real tasks)
        if(t){
          row.draggable=true;
          row.dataset.taskDk=dk;
          row.dataset.taskIdx=String(ri);
          row.addEventListener('dragstart',e=>{
            e.dataTransfer.effectAllowed='move';
            e.dataTransfer.setData('text/plain', JSON.stringify({srcDk:dk, taskIdx:ri, task:t}));
            row.classList.add('wv-drag-active');
          });
          row.addEventListener('dragend',()=>row.classList.remove('wv-drag-active'));
        }

        const cb=document.createElement('input');
        cb.type='checkbox'; cb.className='wv-row-cb';
        cb.style.cssText=`width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:${dayColor};`;
        cb.style.visibility=t?'visible':'hidden';
        if(t&&t.done) cb.checked=true;

        const labelSpan=document.createElement('span');
        labelSpan.className='wv-row-label'+(t?'':' empty');
        labelSpan.textContent=t?t.text:'';

        const delBtn=document.createElement('button');
        delBtn.className='wv-row-del'; delBtn.textContent='✕';
        delBtn.style.visibility=t?'visible':'hidden';

        row.appendChild(cb); row.appendChild(labelSpan); row.appendChild(delBtn);

        if(t){
          cb.addEventListener('change',()=>{
            tasks[ri].done=cb.checked;
            saveTasks(); renderTaskRows();
            showToast((cb.checked?'✓ ':'✗ ')+t.text+', '+GC_DAYS_LONG[dkDow(dk)], '', 1600);
          });
          delBtn.addEventListener('click',e=>{
            e.stopPropagation();
            const _delLabel=t.text;
            tasks.splice(ri,1);
            deleteSaveTasks();
            renderTaskRows();
            showToast('🗑 '+_delLabel, '', 1600);
          });
        }

        const startTaskEdit=()=>{
          row.innerHTML='';
          const cbNew=document.createElement('input');
          cbNew.type='checkbox'; cbNew.style.cssText=`width:14px;height:14px;flex-shrink:0;accent-color:${dayColor};`;
          cbNew.style.visibility=t?'visible':'hidden';
          if(t&&t.done) cbNew.checked=true;
          const labelIn=document.createElement('input');
          labelIn.type='text'; labelIn.className='wv-row-edit-input';
          labelIn.placeholder='Nouvelle tâche…';
          labelIn.value=t?t.text:'';
          row.appendChild(cbNew); row.appendChild(labelIn);
          labelIn.focus(); labelIn.select();

          const commit=()=>{
            const txt=labelIn.value.trim();
            if(t){
              if(txt){ if(tasks[ri]&&tasks[ri].text!==txt){ tasks[ri].text=txt; showToast('Tâche renommée'); } }
              else { tasks.splice(ri,1); showToast('Tâche supprimée','🗑'); }
            } else if(txt){
              tasks.push({text:txt,priority:'normal',done:false});
              showToast('Tâche ajoutée','＋');
            }
            deleteSaveTasks();
            renderTaskRows();
          };
          labelIn.addEventListener('blur',commit);
          labelIn.addEventListener('keydown',e=>{ if(e.key==='Enter') labelIn.blur(); if(e.key==='Escape') renderTaskRows(); });
        };

        row.addEventListener('click',e=>{ if(e.target!==cb&&e.target!==delBtn) startTaskEdit(); });

        taskList.appendChild(row);
      }

      // ── Drop zone setup on taskList ──
      taskList.addEventListener('dragover',e=>{
        e.preventDefault(); e.dataTransfer.dropEffect='move';
        taskList.classList.add('wv-drop-target');
      });
      taskList.addEventListener('dragleave',()=>taskList.classList.remove('wv-drop-target'));
      taskList.addEventListener('drop',e=>{
        e.preventDefault(); taskList.classList.remove('wv-drop-target');
        try {
          const data=JSON.parse(e.dataTransfer.getData('text/plain'));
          if(!data||!data.srcDk) return;
          if(data.srcDk===dk) return; // same day, no-op

          if(data.isEpisode) {
            // Episodes come from the scheduler — just add as plain task in dest
            const destEntry = appData[dk] || {notes:'', tasks:[]};
            if(!destEntry.tasks) destEntry.tasks=[];
            destEntry.tasks.push(data.task);
            appData[dk] = destEntry;
            saveData(appData);
            renderTaskRows();
          } else {
            // Regular task: remove from source, add to dest
            const srcEntry=appData[data.srcDk]||{tasks:[]};
            if(!srcEntry.tasks) srcEntry.tasks=[];
            if(data.taskIdx < 0 || data.taskIdx >= srcEntry.tasks.length) return;
            const removed=srcEntry.tasks.splice(data.taskIdx,1)[0];
            if(!removed) return;
            if(!srcEntry.tasks.length&&!srcEntry.notes) delete appData[data.srcDk];
            else appData[data.srcDk]=srcEntry;
            if(!entry.tasks) entry.tasks=[];
            entry.tasks.push(removed);
            appData[dk]=entry;
            saveData(appData);
            renderTaskRows();
            const srcTaskList=document.querySelector(`[data-taskrows="${data.srcDk}"]`);
            if(srcTaskList) srcTaskList.dispatchEvent(new CustomEvent('wv-rerender',{bubbles:false}));
            showToast('↗ '+removed.text+' → '+GC_DAYS_LONG[dkDow(dk)],'',2000);
          }
        } catch(err){ console.warn('drop error',err); }
      });

      // Re-inject episode rows after every task render
      if (window.renderDayScheduleInTasks) renderDayScheduleInTasks(taskList, dk, dow, dayColor);
    };
    renderTaskRows();
    taskList._rerender = renderTaskRows;
    taskList.addEventListener('wv-rerender', renderTaskRows);
    taskSec.appendChild(taskList);
    col.appendChild(taskSec);

    strip.appendChild(col);
  });
}

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  GCAL — Vue Calendrier style Google Calendar
//  Mois / Semaine / Jour  — intégré au planner existant
// ═══════════════════════════════════════════════════════════════════════════

const GC_DAYS_FR   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const GC_DAYS_LONG = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const GC_MONTHS    = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const GC_MONTHS_SH = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

let gcView = 'month';
let gcDate = new Date(); gcDate.setHours(0,0,0,0);

function gcDkey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function gcIsToday(d){ return d.getFullYear()===TODAY.getFullYear()&&d.getMonth()===TODAY.getMonth()&&d.getDate()===TODAY.getDate(); }
function gcIsWE(dow){ return dow===0||dow===6; }

function gcGetWeekStart(d){
  const ws=getWS(), day=d.getDay();
  const diff=ws===1?(day===0?-6:1-day):-day;
  const r=new Date(d); r.setDate(r.getDate()+diff); r.setHours(0,0,0,0); return r;
}

function gcGetAllEvents(dk){
  const entry=appData[dk]||{};
  const evs=[];
  try{
    const de=JSON.parse(localStorage.getItem('ap_de_'+dk)||'{"events":[]}');
    (de.events||[]).forEach(e=>{ evs.push({kind:'event',text:e.title||'',time:e.time||'',allDay:!!(e.allDay||!e.time)}); });
  }catch(ex){}
  (entry.tasks||[]).forEach(t=>{ evs.push({kind:'task',text:t.text,done:t.done,priority:t.priority,allDay:true}); });
  if(entry.notes&&entry.notes.trim()){ evs.push({kind:'note',text:'📝 '+entry.notes.trim(),allDay:true}); }
  evs.sort((a,b)=>{ if(!a.allDay&&b.allDay) return -1; if(a.allDay&&!b.allDay) return 1; return (a.time||'').localeCompare(b.time||''); });
  return evs;
}

// ── MAIN ENTRY ───────────────────────────────────────────────────────────────
function renderGcal(){
  const root=document.getElementById('gcalView');
  root.innerHTML=''; root.className='gc-root';

  const bar=document.createElement('div'); bar.className='gc-bar';
  bar.innerHTML=`
    <div class="gc-bar-left">
      <button class="gc-btn-today" id="gcToday">Aujourd'hui</button>
      <button class="gc-nav-btn" id="gcPrev">&#8249;</button>
      <button class="gc-nav-btn" id="gcNext">&#8250;</button>
      <span class="gc-bar-label" id="gcLabel"></span>
    </div>
    <div class="gc-bar-right"></div>`;
  root.appendChild(bar);

  const contentEl=document.createElement('div'); contentEl.className='gc-content'; contentEl.id='gcContent';
  root.appendChild(contentEl);

  // Build dropdowns using shared builder
  if(typeof buildBarDropdowns==='function') buildBarDropdowns(bar, gcView, 'calendar');

  document.getElementById('gcToday').onclick=()=>{ gcDate=new Date(); gcDate.setHours(0,0,0,0); gcRender(); };
  document.getElementById('gcPrev').onclick=()=>gcNavigate(-1);
  document.getElementById('gcNext').onclick=()=>gcNavigate(1);

  gcRender();
}

function gcRender(){
  gcUpdateBar();
  const c=document.getElementById('gcContent'); if(!c) return;
  c.innerHTML='';
  if(gcView==='year') gcRenderYear(c);
  else if(gcView==='month') gcRenderMonth(c);
  else if(gcView==='week') gcRenderWeek(c);
  else gcRenderDay(c);
}

function gcUpdateBar(){
  // Update gc-bar label
  const lbl=document.getElementById('gcLabel');
  let text='';
  if(gcView==='year'){ text=`${gcDate.getFullYear()}`; }
  else if(gcView==='month'){ text=`${GC_MONTHS[gcDate.getMonth()]} ${gcDate.getFullYear()}`; }
  else if(gcView==='week'){
    const ws=gcGetWeekStart(gcDate), we=new Date(ws); we.setDate(we.getDate()+6);
    text=ws.getMonth()===we.getMonth()
      ?`${GC_MONTHS_SH[ws.getMonth()]} ${ws.getDate()}–${we.getDate()} ${ws.getFullYear()}`
      :`${GC_MONTHS_SH[ws.getMonth()]} ${ws.getDate()} – ${GC_MONTHS_SH[we.getMonth()]} ${we.getDate()}, ${ws.getFullYear()}`;
  } else { text=`${GC_DAYS_LONG[gcDate.getDay()]} ${gcDate.getDate()} ${GC_MONTHS[gcDate.getMonth()]} ${gcDate.getFullYear()}`; }
  if(lbl) lbl.textContent=text;
  // Also update the sub-header period label

  // Rebuild gc-bar dropdowns to reflect new gcView
  const gcBarEl=document.querySelector('#gcalView .gc-bar');
  if(gcBarEl && typeof buildBarDropdowns==='function') buildBarDropdowns(gcBarEl, gcView, 'calendar');
  // Sync sub-header dropdowns
  const GC_SCOPE_LABELS={day:'Jour',week:'Semaine',month:'Mois',year:'Année'};

}

function gcGoToday(){ gcDate=new Date(); gcDate.setHours(0,0,0,0); gcRender(); }

function gcNavigate(dir){
  const d=new Date(gcDate);
  if(gcView==='year'){d.setFullYear(d.getFullYear()+dir);d.setMonth(0);d.setDate(1);}
  else if(gcView==='month'){d.setDate(1);d.setMonth(d.getMonth()+dir);}
  else if(gcView==='week'){d.setDate(d.getDate()+dir*7);}
  else{d.setDate(d.getDate()+dir);}
  gcDate=d; gcRender();
}

// ── MONTH ────────────────────────────────────────────────────────────────────
function gcRenderMonth(root){
  const y=gcDate.getFullYear(), m=gcDate.getMonth();
  const ws=getWS(), fd=new Date(y,m,1).getDay();
  const off=ws===0?fd:(fd===0?6:fd-1);
  const days=new Date(y,m+1,0).getDate(), prevDays=new Date(y,m,0).getDate();

  const wrap=document.createElement('div'); wrap.className='gcm-wrap';

  const dhr=document.createElement('div'); dhr.className='gcm-dow-row';
  for(let i=0;i<7;i++){
    const dow=ws===0?i:(i+1)%7;
    const h=document.createElement('div'); h.className='gcm-dow'+(gcIsWE(dow)?' we':'');
    h.textContent=GC_DAYS_FR[dow]; dhr.appendChild(h);
  }
  wrap.appendChild(dhr);

  const grid=document.createElement('div'); grid.className='gcm-grid';
  const totalCells=Math.ceil((off+days)/7)*7;

  for(let i=0;i<totalCells;i++){
    let dt, overflow=false;
    if(i<off){dt=new Date(y,m-1,prevDays-off+1+i);overflow=true;}
    else if(i<off+days){dt=new Date(y,m,i-off+1);}
    else{dt=new Date(y,m+1,i-off-days+1);overflow=true;}
    const dk=gcDkey(dt), evs=gcGetAllEvents(dk);
    const today=gcIsToday(dt), isWE=gcIsWE(dt.getDay());

    const cell=document.createElement('div');
    cell.className='gcm-cell'+(overflow?' gcm-overflow':'')+(today?' gcm-today':'')+(isWE?' gcm-we':'');

    const numRow=document.createElement('div'); numRow.className='gcm-num-row';
    if(today){ const b=document.createElement('span'); b.className='gcm-today-badge'; b.textContent=dt.getDate(); numRow.appendChild(b); }
    else numRow.textContent=dt.getDate();
    cell.appendChild(numRow);

    evs.slice(0,3).forEach(ev=>{
      const chip=document.createElement('div');
      let cls='gcm-chip';
      if(ev.kind==='task') cls+=ev.done?' gcm-done':ev.priority==='urgent'?' gcm-urgent':' gcm-task';
      else if(ev.kind==='note') cls+=' gcm-note';
      else cls+=' gcm-event';
      chip.className=cls; chip.textContent=(ev.time&&!ev.allDay?ev.time+' ':'')+ev.text; chip.title=ev.text;
      chip.addEventListener('click',e=>{e.stopPropagation();openModal(dt.getMonth(),dt.getDate());});
      cell.appendChild(chip);
    });
    if(evs.length>3){
      const more=document.createElement('div'); more.className='gcm-more';
      more.textContent=`+${evs.length-3} de plus`;
      more.addEventListener('click',e=>{e.stopPropagation();gcDate=new Date(dt);gcView='day';gcRender();});
      cell.appendChild(more);
    }
    cell.addEventListener('click',()=>{gcDate=new Date(dt);gcView='day';gcRender();});
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  root.appendChild(wrap);
}

// ── WEEK ─────────────────────────────────────────────────────────────────────
function gcRenderWeek(root){
  const ws=gcGetWeekStart(gcDate);
  const dates=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d;});

  const wrap=document.createElement('div'); wrap.className='gcw-wrap';

  // Fixed header
  const hdrOuter=document.createElement('div'); hdrOuter.className='gcw-hdr-outer';
  const g0=document.createElement('div'); g0.className='gcw-gutter-hdr'; hdrOuter.appendChild(g0);
  dates.forEach(dt=>{
    const col=document.createElement('div');
    col.className='gcw-hdr-col'+(gcIsToday(dt)?' today':'')+(gcIsWE(dt.getDay())?' we':'');
    const top=document.createElement('div'); top.className='gcw-hdr-top';
    const abbr=document.createElement('span'); abbr.className='gcw-hdr-abbr'; abbr.textContent=GC_DAYS_FR[dt.getDay()];
    const num=gcIsToday(dt)?Object.assign(document.createElement('span'),{className:'gcw-today-badge',textContent:dt.getDate()}):Object.assign(document.createElement('span'),{className:'gcw-hdr-num',textContent:dt.getDate()});
    top.appendChild(abbr); top.appendChild(num); col.appendChild(top);
    const adr=document.createElement('div'); adr.className='gcw-allday-row';
    const dk=gcDkey(dt);
    gcGetAllEvents(dk).filter(e=>e.allDay).forEach(ev=>{
      const chip=document.createElement('div');
      chip.className='gcw-allday-chip'+(ev.done?' gcw-chip-done':'')+(ev.priority==='urgent'?' gcw-chip-urgent':'');
      chip.textContent=ev.text; chip.title=ev.text;
      chip.addEventListener('click',e=>{e.stopPropagation();openModal(dt.getMonth(),dt.getDate());});
      adr.appendChild(chip);
    });
    col.appendChild(adr); hdrOuter.appendChild(col);
  });
  wrap.appendChild(hdrOuter);

  // Scrollable body
  const body=document.createElement('div'); body.className='gcw-body';
  const tg=document.createElement('div'); tg.className='gcw-time-grid';
  for(let h=0;h<24;h++){
    const row=document.createElement('div'); row.className='gcw-row';
    const gutter=document.createElement('div'); gutter.className='gcw-gutter';
    if(h>0){ const t=document.createElement('span'); t.className='gcw-time-lbl'; t.textContent=h<12?`${h}h`:`${h}h`; gutter.appendChild(t); }
    row.appendChild(gutter);
    dates.forEach(dt=>{
      const cell=document.createElement('div');
      cell.className='gcw-cell'+(gcIsToday(dt)?' today':'')+(gcIsWE(dt.getDay())?' we':'');
      const dk=gcDkey(dt);
      gcGetAllEvents(dk).filter(e=>!e.allDay&&e.time&&parseInt(e.time.split(':')[0])===h).forEach(ev=>{
        const chip=document.createElement('div'); chip.className='gcw-timed-chip';
        chip.textContent=ev.time+' '+ev.text; chip.title=ev.text;
        chip.addEventListener('click',e=>{e.stopPropagation();openModal(dt.getMonth(),dt.getDate());});
        cell.appendChild(chip);
      });
      cell.addEventListener('click',()=>{gcDate=new Date(dt);openModal(dt.getMonth(),dt.getDate());});
      row.appendChild(cell);
    });
    tg.appendChild(row);
  }
  // Now line
  const todayIdx=dates.findIndex(d=>gcIsToday(d));
  if(todayIdx>=0){
    const now=new Date(), pct=(now.getHours()*60+now.getMinutes())/(24*60)*100;
    const nl=document.createElement('div'); nl.className='gcw-now-line';
    nl.style.cssText=`top:${pct}%;left:calc(56px + ${todayIdx/7*100}% + 2px);width:calc(${1/7*100}% - 4px);`;
    tg.appendChild(nl);
  }
  body.appendChild(tg); wrap.appendChild(body); root.appendChild(wrap);
  requestAnimationFrame(()=>{ body.scrollTop=7*52; });
}

// ── DAY ──────────────────────────────────────────────────────────────────────
function gcRenderDay(root){
  const dk=gcDkey(gcDate), evs=gcGetAllEvents(dk);
  const allDayEvs=evs.filter(e=>e.allDay), timedEvs=evs.filter(e=>!e.allDay);

  const wrap=document.createElement('div'); wrap.className='gcd-wrap';

  // Header
  const hdrOuter=document.createElement('div'); hdrOuter.className='gcd-hdr-outer';
  const g0=document.createElement('div'); g0.className='gcd-gutter-hdr'; hdrOuter.appendChild(g0);
  const dayCol=document.createElement('div'); dayCol.className='gcd-hdr-col'+(gcIsToday(gcDate)?' today':'');
  const top=document.createElement('div'); top.className='gcd-hdr-top';
  const abbr=document.createElement('span'); abbr.className='gcd-hdr-abbr'; abbr.textContent=GC_DAYS_FR[gcDate.getDay()];
  const num=gcIsToday(gcDate)?Object.assign(document.createElement('span'),{className:'gcd-today-badge',textContent:gcDate.getDate()}):Object.assign(document.createElement('span'),{className:'gcd-hdr-num',textContent:gcDate.getDate()});
  top.appendChild(abbr); top.appendChild(num); dayCol.appendChild(top);
  // All-day strip
  const adr=document.createElement('div'); adr.className='gcd-allday-row';
  const adLabel=document.createElement('div'); adLabel.className='gcd-allday-label'; adLabel.textContent='Jour entier'; adr.appendChild(adLabel);
  const adChips=document.createElement('div'); adChips.className='gcd-allday-chips';
  allDayEvs.forEach(ev=>{
    const chip=document.createElement('div');
    chip.className='gcd-allday-chip'+(ev.done?' gcw-chip-done':'')+(ev.priority==='urgent'?' gcw-chip-urgent':'');
    chip.textContent=ev.text; chip.title=ev.text;
    chip.addEventListener('click',()=>openModal(gcDate.getMonth(),gcDate.getDate()));
    adChips.appendChild(chip);
  });
  if(!allDayEvs.length){
    const hint=document.createElement('span'); hint.className='gcd-allday-hint';
    hint.textContent='Cliquer pour ajouter…';
    hint.addEventListener('click',()=>openModal(gcDate.getMonth(),gcDate.getDate()));
    adChips.appendChild(hint);
  }
  adr.appendChild(adChips); dayCol.appendChild(adr); hdrOuter.appendChild(dayCol);
  wrap.appendChild(hdrOuter);

  // Scrollable body
  const body=document.createElement('div'); body.className='gcd-body';
  const tg=document.createElement('div'); tg.className='gcd-time-grid';
  for(let h=0;h<24;h++){
    const row=document.createElement('div'); row.className='gcd-row';
    const gutter=document.createElement('div'); gutter.className='gcd-gutter';
    if(h>0){ const t=document.createElement('span'); t.className='gcd-time-lbl'; t.textContent=h<12?`${h}h`:`${h}h`; gutter.appendChild(t); }
    const cell=document.createElement('div'); cell.className='gcd-cell'+(gcIsToday(gcDate)?' today':'');
    timedEvs.filter(e=>e.time&&parseInt(e.time.split(':')[0])===h).forEach(ev=>{
      const chip=document.createElement('div'); chip.className='gcd-timed-chip';
      const ts=document.createElement('span'); ts.className='gcd-chip-time'; ts.textContent=ev.time;
      const tx=document.createElement('span'); tx.textContent=' '+ev.text;
      chip.appendChild(ts); chip.appendChild(tx);
      chip.addEventListener('click',e=>{e.stopPropagation();openModal(gcDate.getMonth(),gcDate.getDate());});
      cell.appendChild(chip);
    });
    cell.addEventListener('click',()=>openModal(gcDate.getMonth(),gcDate.getDate()));
    row.appendChild(gutter); row.appendChild(cell); tg.appendChild(row);
  }
  if(gcIsToday(gcDate)){
    const now=new Date(), pct=(now.getHours()*60+now.getMinutes())/(24*60)*100;
    const nl=document.createElement('div'); nl.className='gcd-now-line'; nl.style.top=pct+'%';
    const dot=document.createElement('div'); dot.className='gcd-now-dot'; dot.style.top=pct+'%';
    tg.appendChild(nl); tg.appendChild(dot);
  }
  body.appendChild(tg); wrap.appendChild(body); root.appendChild(wrap);
  requestAnimationFrame(()=>{ body.scrollTop=7*52; });
}

// ── YEAR VIEW ─────────────────────────────────────────────────────────────────
function gcRenderYear(root){
  const y = gcDate.getFullYear();
  const ws = getWS();

  const wrap = document.createElement('div'); wrap.className='gcy-wrap';

  for(let m=0; m<12; m++){
    const block = document.createElement('div'); block.className='gcy-block';

    // Month title
    const title = document.createElement('div'); title.className='gcy-title';
    title.textContent = GC_MONTHS[m];
    title.addEventListener('click',()=>{ gcDate=new Date(y,m,1); gcView='month'; gcRender(); });
    block.appendChild(title);

    // DOW header
    const dhr = document.createElement('div'); dhr.className='gcy-dow-row';
    for(let i=0;i<7;i++){
      const dow = ws===0 ? i : (i+1)%7;
      const h = document.createElement('div'); h.className='gcy-dow'+(gcIsWE(dow)?' we':'');
      h.textContent = GC_DAYS_FR[dow][0]; // single letter
      dhr.appendChild(h);
    }
    block.appendChild(dhr);

    // Day grid
    const fd = new Date(y,m,1).getDay();
    const off = ws===0 ? fd : (fd===0 ? 6 : fd-1);
    const days = new Date(y,m+1,0).getDate();
    const prevDays = new Date(y,m,0).getDate();
    const totalCells = Math.ceil((off+days)/7)*7;

    const grid = document.createElement('div'); grid.className='gcy-grid';

    for(let i=0;i<totalCells;i++){
      let dt, overflow=false;
      if(i<off){ dt=new Date(y,m-1,prevDays-off+1+i); overflow=true; }
      else if(i<off+days){ dt=new Date(y,m,i-off+1); }
      else{ dt=new Date(y,m+1,i-off-days+1); overflow=true; }

      const today = gcIsToday(dt);
      const isWE  = gcIsWE(dt.getDay());
      const dk    = gcDkey(dt);
      const evs   = gcGetAllEvents(dk);
      const hasData = evs.length > 0;

      const cell = document.createElement('div');
      cell.className = 'gcy-cell'
        +(overflow?' gcy-overflow':'')
        +(today?' gcy-today':'')
        +(isWE&&!overflow?' gcy-we':'')
        +(hasData&&!overflow?' gcy-has-data':'');
      cell.textContent = dt.getDate();
      cell.title = hasData ? evs.map(e=>e.text).join('\n') : '';
      cell.addEventListener('click',()=>{ gcDate=new Date(dt); gcView='day'; gcRender(); });
      grid.appendChild(cell);
    }
    block.appendChild(grid);
    wrap.appendChild(block);
  }
  root.appendChild(wrap);
}

// ── OSCARS STATE ──────────────────────────────────────────────────────────────
let oscarsYear = 2025;
let oscarsCatFilter = 'all';
const OSCARS_WATCHED_KEY = 'ap_oscars_watched'; // {year_filmTitle: true}

function oscarsLoadWatched() {
  try { return JSON.parse(localStorage.getItem(OSCARS_WATCHED_KEY)||'{}'); } catch(e){ return {}; }
}
function oscarsSaveWatched(w) { localStorage.setItem(OSCARS_WATCHED_KEY, JSON.stringify(w)); }
function oscarsKey(year, film) { return `${year}__${film}`; }

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function renderOscarsSection(container) {
  // Clear tracker-specific content below header, insert oscars panel
  const panel = document.createElement('div');
  panel.className = 'os-panel';
  container.appendChild(panel);

  const data = OSCARS_DATA.find(d => d.year === oscarsYear);

  // ── Year selector ──
  const yearRow = document.createElement('div'); yearRow.className = 'os-year-row';

  const prevBtn = document.createElement('button'); prevBtn.className = 'gc-nav-btn'; prevBtn.innerHTML = '&#8249;';
  prevBtn.onclick = () => { const idx = OSCARS_DATA.findIndex(d=>d.year===oscarsYear); if(idx<OSCARS_DATA.length-1){ oscarsYear=OSCARS_DATA[idx+1].year; renderOscarsSection(null, panel); } };

  const nextBtn = document.createElement('button'); nextBtn.className = 'gc-nav-btn'; nextBtn.innerHTML = '&#8250;';
  nextBtn.onclick = () => { const idx = OSCARS_DATA.findIndex(d=>d.year===oscarsYear); if(idx>0){ oscarsYear=OSCARS_DATA[idx-1].year; renderOscarsSection(null, panel); } };

  const yearLabel = document.createElement('span'); yearLabel.className = 'os-year-label';
  yearLabel.innerHTML = `<span style="font-family:'DM Serif Display',serif;font-size:1.5rem;">${oscarsYear}</span> <span style="font-size:.8rem;color:#999;">— ${data?.ceremony}e cérémonie</span>`;

  yearRow.appendChild(prevBtn);
  yearRow.appendChild(yearLabel);
  yearRow.appendChild(nextBtn);

  // Year pills
  const yearPills = document.createElement('div'); yearPills.className = 'os-year-pills';
  OSCARS_DATA.forEach(d => {
    const pill = document.createElement('button');
    pill.className = 'os-year-pill' + (d.year === oscarsYear ? ' active' : '');
    pill.textContent = d.year;
    pill.onclick = () => { oscarsYear = d.year; panel.innerHTML=''; _buildOscarsContent(panel); };
    yearPills.appendChild(pill);
  });

  yearRow.appendChild(yearPills);
  panel.appendChild(yearRow);

  _buildOscarsContent(panel);
}

function _buildOscarsContent(panel) {
  // Remove everything except year-row
  Array.from(panel.children).forEach(el => { if(!el.classList.contains('os-year-row')) el.remove(); });

  const data = OSCARS_DATA.find(d => d.year === oscarsYear);
  if(!data) { panel.appendChild(Object.assign(document.createElement('div'),{textContent:'Données non disponibles', className:'os-empty'})); return; }

  const watched = oscarsLoadWatched();

  // ── Category filter pills ──
  const catBar = document.createElement('div'); catBar.className = 'os-cat-bar';
  const allCats = [{id:'all', name:'Toutes'}].concat(data.categories.map(c=>({id:c.id, name:c.name})));
  allCats.forEach(cat => {
    const p = document.createElement('button'); p.className='os-cat-pill'+(oscarsCatFilter===cat.id?' active':'');
    p.textContent = cat.name;
    p.onclick = () => { oscarsCatFilter=cat.id; panel.innerHTML=''; const yr=panel._yr; panel._yr=yr; _rebuildOscarsYearRow(panel); _buildOscarsContent(panel); };
    catBar.appendChild(p);
  });
  panel.appendChild(catBar);

  // ── Stats bar ──
  let totalFilms=0, watchedFilms=0;
  const allFilmsSet = new Set();
  data.categories.forEach(cat => cat.nominees.forEach(n => allFilmsSet.add(n.film)));
  allFilmsSet.forEach(film => {
    totalFilms++;
    if(watched[oscarsKey(oscarsYear,film)]) watchedFilms++;
  });
  const pct = totalFilms ? Math.round(watchedFilms/totalFilms*100) : 0;

  const statsRow = document.createElement('div'); statsRow.className = 'os-stats-row';
  statsRow.innerHTML = `
    <div class="os-stat"><span class="os-stat-num">${watchedFilms}/${totalFilms}</span><span class="os-stat-lbl">Films vus</span></div>
    <div class="os-stat"><span class="os-stat-num">${pct}%</span><span class="os-stat-lbl">Progression</span></div>
    <div class="os-stat-bar-wrap"><div class="os-stat-bar"><div class="os-stat-bar-fill" style="width:${pct}%"></div></div></div>`;
  panel.appendChild(statsRow);

  // ── Categories grid ──
  const grid = document.createElement('div'); grid.className = 'os-grid';

  const catsToShow = oscarsCatFilter==='all' ? data.categories : data.categories.filter(c=>c.id===oscarsCatFilter);

  catsToShow.forEach(cat => {
    const card = document.createElement('div'); card.className = 'os-card';

    const cardHdr = document.createElement('div'); cardHdr.className = 'os-card-hdr';
    cardHdr.textContent = cat.name;
    card.appendChild(cardHdr);

    cat.nominees.forEach(nom => {
      const filmKey = oscarsKey(oscarsYear, nom.film);
      const isWatched = !!watched[filmKey];
      const row = document.createElement('div');
      row.className = 'os-nominee' + (nom.winner ? ' winner' : '') + (isWatched ? ' seen' : '');

      const cb = document.createElement('input'); cb.type='checkbox'; cb.className='os-cb'; cb.checked=isWatched;
      cb.addEventListener('change', () => {
        const w = oscarsLoadWatched();
        if(cb.checked) w[filmKey]=true; else delete w[filmKey];
        oscarsSaveWatched(w);
        row.classList.toggle('seen', cb.checked);
        if(typeof showToast==='function') showToast((cb.checked?'✓ ':'✗ ')+nom.film,'',1600);
        // refresh stats without full re-render
        _refreshOscarsStats(panel, oscarsYear);
      });

      const label = document.createElement('div'); label.className = 'os-nominee-label';

      const filmSpan = document.createElement('span'); filmSpan.className = 'os-film-name';
      filmSpan.textContent = nom.film;

      label.appendChild(filmSpan);

      if(nom.person) {
        const personSpan = document.createElement('span'); personSpan.className = 'os-person-name';
        personSpan.textContent = nom.person;
        label.appendChild(personSpan);
      }

      if(nom.winner) {
        const trophy = document.createElement('span'); trophy.className = 'os-trophy'; trophy.textContent = '🏆';
        row.appendChild(cb); row.appendChild(label); row.appendChild(trophy);
      } else {
        row.appendChild(cb); row.appendChild(label);
      }

      card.appendChild(row);
    });

    grid.appendChild(card);
  });

  panel.appendChild(grid);
}

function _rebuildOscarsYearRow(panel) {
  // Rebuild year row for re-render after cat filter
  const existing = panel.querySelector('.os-year-row');
  if(existing) return; // already there
}

function _refreshOscarsStats(panel, year) {
  const watched = oscarsLoadWatched();
  const data = OSCARS_DATA.find(d=>d.year===year); if(!data) return;
  const allFilms = new Set();
  data.categories.forEach(cat=>cat.nominees.forEach(n=>allFilms.add(n.film)));
  let tot=allFilms.size, wat=0;
  allFilms.forEach(f=>{ if(watched[oscarsKey(year,f)]) wat++; });
  const pct = tot ? Math.round(wat/tot*100) : 0;
  const statNum = panel.querySelector('.os-stats-row .os-stat-num');
  if(statNum) statNum.textContent = `${wat}/${tot}`;
  const statNum2 = panel.querySelectorAll('.os-stats-row .os-stat-num')[1];
  if(statNum2) statNum2.textContent = pct+'%';
  const fill = panel.querySelector('.os-stat-bar-fill');
  if(fill) fill.style.width = pct+'%';
}

</script>

const TR_KEY = 'ap_tracker_watched'; // { [showId_seriesId_s_e]: true }
const TR_SCHED_KEY = 'ap_tracker_sched'; // { [YYYY-MM-DD]: { trek: [{sid,sn,en}], xf: [{sn,en}] } }

function trLoadWatched() {
  return JSON.parse(localStorage.getItem(TR_KEY) || '{}');
}
function trSaveWatched(d) {
  localStorage.setItem(TR_KEY, JSON.stringify(d));
}
function epKey(showId, seriesId, sn, en) {
  return `${showId}_${seriesId}_s${sn}e${en}`;
}
function trLoadSched() {
  return JSON.parse(localStorage.getItem(TR_SCHED_KEY) || '{}');
}
function trSaveSched(d) {
  localStorage.setItem(TR_SCHED_KEY, JSON.stringify(d));
}

// Pre-check already-watched episodes (TNG S3E4-6, X-Files S6E4-6)
(function initWatched() {
  const w = trLoadWatched();
  let changed = false;
  // TNG S3 E4, E5, E6
  [4,5,6].forEach(e => {
    const k = epKey('startrek','tng',3,e);
    if (!w[k]) { w[k] = true; changed = true; }
  });
  // X-Files S6 E4, E5, E6
  [4,5,6].forEach(e => {
    const k = epKey('xfiles','xf',6,e);
    if (!w[k]) { w[k] = true; changed = true; }
  });
  if (changed) trSaveWatched(w);
})();

      checkAllBtn.textContent = allChecked ? '☐ Tout décocher' : '☑ Tout cocher';

      const bar = document.createElement('span'); bar.className = 'tr-season-bar'; bar.style.width = pct+'%';

        epDiv.className = 'tr-ep' + (isW ? ' watched' : '');

        const num = document.createElement('span'); num.className = 'tr-ep-num';

          epDiv.appendChild(ttl);

        const toggle = () => {
          const w = trLoadWatched();
          if (w[k]) delete w[k]; else w[k] = true;

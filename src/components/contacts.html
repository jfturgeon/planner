<!-- Contacts View Component -->
<div class="ct-view">
  <!-- Toolbar -->
  <div class="ct-toolbar">
    <h2 class="ct-view-title">Contacts</h2>
    <div class="ct-search-wrap">
      <input type="text" class="ct-search-input" id="ctSearchInput" placeholder="Chercher...">
    </div>
    <button class="ct-add-btn" id="ctAddBtn">＋ Ajouter</button>
  </div>

  <!-- Pills (Categories/Tags) -->
  <div id="ctPillsContainer"></div>

  <!-- Table wrapper -->
  <div class="ct-table-wrap">
    <table class="ct-table">
      <thead id="ctTableHead"></thead>
      <tbody id="ctTableBody"></tbody>
    </table>
  </div>

  <!-- Pager -->
  <div id="ctPagerContainer"></div>
</div>

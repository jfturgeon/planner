<!-- LOGIN/SIGNUP VIEW -->
<div id="loginView" class="login-overlay">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">📅 Planificateur</div>
      
      <!-- Login Form -->
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="ton@email.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Mot de passe</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">Se connecter</button>
        <div id="loginError" class="form-error"></div>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="login-form" style="display:none">
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="ton@email.com" required>
        </div>
        <div class="form-group">
          <label for="signupPassword">Mot de passe</label>
          <input type="password" id="signupPassword" placeholder="••••••••" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="signupPassword2">Confirmer mot de passe</label>
          <input type="password" id="signupPassword2" placeholder="••••••••" minlength="6" required>
        </div>
        <button type="submit" class="btn-submit">S'inscrire</button>
        <div id="signupError" class="form-error"></div>
      </form>

      <!-- Toggle Login/Signup -->
      <div class="login-toggle">
        <span id="toggleText">Pas encore inscrit?</span>
        <button type="button" id="toggleForm" class="toggle-btn">Créer un compte</button>
      </div>
    </div>
  </div>
</div>
